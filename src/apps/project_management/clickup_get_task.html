<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClickUp Task</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-violet-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden">
      <div class="bg-white rounded-xl border border-violet-200 shadow-sm overflow-hidden">
        <div class="bg-gradient-to-r from-violet-600 to-violet-700 px-5 py-3 flex items-center gap-3">
          <svg class="w-5 h-5 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
          <span class="text-white font-bold text-sm">ClickUp Task</span>
          <span id="task-id" class="ml-auto text-xs font-medium bg-white/20 text-white px-2 py-0.5 rounded-full"></span>
        </div>
        <div class="p-5 space-y-4">
          <h2 id="task-name" class="text-lg font-semibold text-slate-800"></h2>
          <div class="flex flex-wrap gap-2">
            <span id="status-badge" class="hidden inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-violet-100 text-violet-700"></span>
          </div>
          <div id="details-grid" class="grid grid-cols-2 gap-3 text-sm"></div>
          <div id="description-section" class="hidden">
            <p class="text-xs font-medium text-slate-500 mb-1">Description</p>
            <p id="task-description" class="text-sm text-slate-600 leading-relaxed bg-slate-50 rounded-lg p-3"></p>
          </div>
          <a id="task-link" class="hidden inline-flex items-center gap-1 text-xs text-violet-600 hover:text-violet-800 hover:underline" target="_blank" rel="noopener noreferrer">
            Open in ClickUp &rarr;
          </a>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function createDetailItem(label, value) {
      const wrapper = document.createElement('div');
      const labelEl = document.createElement('p');
      labelEl.className = 'text-xs text-slate-400';
      labelEl.textContent = label;
      const valueEl = document.createElement('p');
      valueEl.className = 'text-slate-700 font-medium';
      valueEl.textContent = value;
      wrapper.appendChild(labelEl);
      wrapper.appendChild(valueEl);
      return wrapper;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('task-id').textContent = data.id || '';
      document.getElementById('task-name').textContent = data.name || '';

      if (data.status) {
        const badge = document.getElementById('status-badge');
        badge.textContent = data.status;
        badge.classList.remove('hidden');
      }

      const grid = document.getElementById('details-grid');
      if (data.assignees && data.assignees.length > 0) {
        grid.appendChild(createDetailItem('Assignees', data.assignees.join(', ')));
      }

      if (data.description) {
        document.getElementById('description-section').classList.remove('hidden');
        document.getElementById('task-description').textContent = data.description;
      }

      if (data.url) {
        const link = document.getElementById('task-link');
        link.href = data.url;
        link.classList.remove('hidden');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
