<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitbucket Repositories</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-blue-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-blue-700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Bitbucket Repositories</h2>
        <span id="total-badge" class="hidden text-xs font-medium bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full"></span>
      </div>
      <div id="results-container" class="space-y-2"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      if (data.total != null) {
        const badge = document.getElementById('total-badge');
        badge.textContent = data.total + ' repos';
        badge.classList.remove('hidden');
      }

      const container = document.getElementById('results-container');
      const repos = data.repos || [];

      if (repos.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No repositories found';
        container.appendChild(empty);
        return;
      }

      repos.forEach(repo => {
        const row = document.createElement('div');
        row.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-blue-300 hover:shadow-sm transition-all';

        const top = document.createElement('div');
        top.className = 'flex items-center gap-3 mb-1';

        const name = document.createElement('span');
        name.className = 'text-sm font-semibold text-blue-700';
        name.textContent = repo.full_name || repo.name || '';
        top.appendChild(name);

        if (repo.is_private) {
          const privateBadge = document.createElement('span');
          privateBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700';
          privateBadge.textContent = 'Private';
          top.appendChild(privateBadge);
        } else {
          const publicBadge = document.createElement('span');
          publicBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700';
          publicBadge.textContent = 'Public';
          top.appendChild(publicBadge);
        }

        if (repo.url) {
          const link = document.createElement('a');
          link.href = repo.url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className = 'text-xs text-blue-500 hover:underline ml-auto';
          link.textContent = 'View';
          top.appendChild(link);
        }

        row.appendChild(top);

        if (repo.description) {
          const desc = document.createElement('p');
          desc.className = 'text-xs text-slate-500 mt-1 line-clamp-2';
          desc.textContent = repo.description;
          row.appendChild(desc);
        }

        container.appendChild(row);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
