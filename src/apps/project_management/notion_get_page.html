<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-stone-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden">
      <div class="bg-white rounded-xl border border-stone-200 shadow-sm overflow-hidden">
        <div class="bg-gradient-to-r from-stone-700 to-stone-800 px-5 py-3 flex items-center gap-3">
          <svg class="w-5 h-5 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span class="text-white font-bold text-sm">Notion Page</span>
        </div>
        <div class="p-5 space-y-4">
          <h2 id="page-title" class="text-lg font-semibold text-slate-800"></h2>
          <div id="details-grid" class="grid grid-cols-2 gap-3 text-sm"></div>
          <div id="content-section" class="hidden">
            <p class="text-xs font-medium text-slate-500 mb-1">Content</p>
            <div id="page-content" class="text-sm text-slate-600 leading-relaxed bg-slate-50 rounded-lg p-3 max-h-64 overflow-y-auto"></div>
          </div>
          <a id="page-link" class="hidden inline-flex items-center gap-1 text-xs text-stone-600 hover:text-stone-800 hover:underline" target="_blank" rel="noopener noreferrer">
            Open in Notion &rarr;
          </a>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function createDetailItem(label, value) {
      const wrapper = document.createElement('div');
      const labelEl = document.createElement('p');
      labelEl.className = 'text-xs text-slate-400';
      labelEl.textContent = label;
      const valueEl = document.createElement('p');
      valueEl.className = 'text-slate-700 font-medium';
      valueEl.textContent = value;
      wrapper.appendChild(labelEl);
      wrapper.appendChild(valueEl);
      return wrapper;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('page-title').textContent = data.title || '';

      const grid = document.getElementById('details-grid');
      if (data.id) {
        grid.appendChild(createDetailItem('Page ID', data.id));
      }
      if (data.parent_id) {
        grid.appendChild(createDetailItem('Parent', data.parent_id));
      }

      if (data.content) {
        document.getElementById('content-section').classList.remove('hidden');
        document.getElementById('page-content').textContent = data.content;
      }

      if (data.url) {
        const link = document.getElementById('page-link');
        link.href = data.url;
        link.classList.remove('hidden');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
