<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trello Boards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-sky-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-sky-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="12" rx="1"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Trello Boards</h2>
        <span id="total-badge" class="hidden text-xs font-medium bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full"></span>
      </div>
      <div id="results-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      if (data.total != null) {
        const badge = document.getElementById('total-badge');
        badge.textContent = data.total + ' boards';
        badge.classList.remove('hidden');
      }

      const container = document.getElementById('results-container');
      const boards = data.boards || [];

      if (boards.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm col-span-2';
        empty.textContent = 'No boards found';
        container.appendChild(empty);
        return;
      }

      boards.forEach(board => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-sky-300 hover:shadow-sm transition-all';

        const name = document.createElement('h3');
        name.className = 'text-sm font-semibold text-slate-800 mb-1';
        name.textContent = board.name || '';
        card.appendChild(name);

        if (board.description) {
          const desc = document.createElement('p');
          desc.className = 'text-xs text-slate-500 mb-2 line-clamp-2';
          desc.textContent = board.description;
          card.appendChild(desc);
        }

        const meta = document.createElement('div');
        meta.className = 'flex items-center gap-2';

        if (board.closed) {
          const closedBadge = document.createElement('span');
          closedBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-500';
          closedBadge.textContent = 'Closed';
          meta.appendChild(closedBadge);
        } else {
          const activeBadge = document.createElement('span');
          activeBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700';
          activeBadge.textContent = 'Active';
          meta.appendChild(activeBadge);
        }

        if (board.url) {
          const link = document.createElement('a');
          link.href = board.url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className = 'text-xs text-sky-500 hover:underline ml-auto';
          link.textContent = 'Open';
          meta.appendChild(link);
        }

        card.appendChild(meta);
        container.appendChild(card);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
