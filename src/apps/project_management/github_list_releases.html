<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Releases</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-gray-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-gray-700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Releases</h2>
        <span id="total-badge" class="hidden text-xs font-medium bg-gray-100 text-gray-700 px-2 py-0.5 rounded-full"></span>
      </div>
      <div id="results-container" class="space-y-2"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      if (data.total != null) {
        const badge = document.getElementById('total-badge');
        badge.textContent = data.total + ' releases';
        badge.classList.remove('hidden');
      }

      const container = document.getElementById('results-container');
      const releases = data.releases || [];

      if (releases.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No releases found';
        container.appendChild(empty);
        return;
      }

      releases.forEach(release => {
        const row = document.createElement('div');
        row.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-gray-300 hover:shadow-sm transition-all';

        const top = document.createElement('div');
        top.className = 'flex items-center gap-3 mb-1';

        const tag = document.createElement('code');
        tag.className = 'text-xs font-mono text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded';
        tag.textContent = release.tag_name || '';
        top.appendChild(tag);

        const name = document.createElement('span');
        name.className = 'text-sm font-medium text-slate-800 truncate flex-1';
        name.textContent = release.name || release.tag_name || '';
        top.appendChild(name);

        if (release.prerelease) {
          const pre = document.createElement('span');
          pre.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700';
          pre.textContent = 'Pre-release';
          top.appendChild(pre);
        }
        if (release.draft) {
          const draft = document.createElement('span');
          draft.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600';
          draft.textContent = 'Draft';
          top.appendChild(draft);
        }

        row.appendChild(top);

        const meta = document.createElement('div');
        meta.className = 'flex items-center gap-3 text-xs text-slate-400 mt-1';

        if (release.published_at) {
          const date = document.createElement('span');
          date.textContent = new Date(release.published_at).toLocaleDateString();
          meta.appendChild(date);
        }

        if (release.url) {
          const link = document.createElement('a');
          link.href = release.url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className = 'text-gray-500 hover:underline ml-auto';
          link.textContent = 'View';
          meta.appendChild(link);
        }

        row.appendChild(meta);
        container.appendChild(row);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
