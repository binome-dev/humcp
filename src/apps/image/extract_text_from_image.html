<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extracted Text (OCR)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <h2 class="text-sm font-semibold text-slate-700">OCR Result</h2>
        </div>
        <div class="flex items-center gap-3">
          <span id="confidence-badge" class="hidden inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"></span>
          <span id="language-badge" class="hidden inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600"></span>
        </div>
      </div>

      <div class="text-xs text-slate-400 font-mono" id="image-path"></div>

      <div class="bg-slate-900 rounded-lg overflow-hidden">
        <div class="flex items-center justify-between px-4 py-2 bg-slate-800 border-b border-slate-700">
          <span class="text-xs text-slate-400 font-medium">Extracted Text</span>
          <button id="copy-btn" class="text-xs text-slate-400 hover:text-slate-200 transition-colors flex items-center gap-1">
            <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span id="copy-text">Copy</span>
          </button>
        </div>
        <pre class="p-4 overflow-x-auto max-h-[500px] overflow-y-auto"><code id="text-content" class="text-sm text-slate-300 font-mono whitespace-pre-wrap"></code></pre>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('image-path').textContent = data.image_path || '';

      const extractedText = data.extracted_text || '';
      document.getElementById('text-content').textContent = extractedText;

      if (data.confidence != null) {
        const badge = document.getElementById('confidence-badge');
        badge.classList.remove('hidden');
        const pct = Math.round(data.confidence * 100);
        badge.textContent = pct + '% confidence';
        if (pct >= 80) {
          badge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700';
        } else if (pct >= 50) {
          badge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700';
        } else {
          badge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700';
        }
      }

      if (data.language) {
        const langBadge = document.getElementById('language-badge');
        langBadge.classList.remove('hidden');
        langBadge.textContent = data.language;
      }

      document.getElementById('copy-btn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(extractedText);
          document.getElementById('copy-text').textContent = 'Copied!';
          setTimeout(() => { document.getElementById('copy-text').textContent = 'Copy'; }, 2000);
        } catch (err) {
          // Clipboard API may not be available in iframe
        }
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
