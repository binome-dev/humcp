<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airflow DAGs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-gray-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="dag-count" class="text-sm text-slate-500"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400">
        <svg class="w-8 h-8 mx-auto mb-2 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <p class="text-sm">No DAGs found</p>
      </div>

      <div id="dags-list" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const dags = data.dags || [];
      const count = data.count != null ? data.count : dags.length;
      document.getElementById('dag-count').textContent = count + ' DAG' + (count !== 1 ? 's' : '');

      if (dags.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const list = document.getElementById('dags-list');
      while (list.firstChild) { list.removeChild(list.firstChild); }

      dags.forEach(function(dag) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-gray-400 hover:shadow-sm transition-all';

        const header = document.createElement('div');
        header.className = 'flex items-start justify-between gap-3 mb-2';

        const nameEl = document.createElement('p');
        nameEl.className = 'text-sm font-semibold text-slate-800';
        nameEl.textContent = dag.dag_id || '';
        header.appendChild(nameEl);

        const pauseBadge = document.createElement('span');
        if (dag.is_paused === true) {
          pauseBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700';
          pauseBadge.textContent = 'paused';
        } else if (dag.is_paused === false) {
          pauseBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700';
          pauseBadge.textContent = 'active';
        } else {
          pauseBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700';
          pauseBadge.textContent = 'unknown';
        }
        header.appendChild(pauseBadge);

        card.appendChild(header);

        if (dag.description) {
          const descEl = document.createElement('p');
          descEl.className = 'text-sm text-slate-600 mb-2';
          descEl.textContent = dag.description;
          card.appendChild(descEl);
        }

        const meta = document.createElement('div');
        meta.className = 'flex flex-wrap gap-x-4 gap-y-1 text-xs text-slate-500';

        if (dag.schedule_interval || dag.schedule) {
          const schedEl = document.createElement('span');
          schedEl.textContent = 'Schedule: ' + (dag.schedule_interval || dag.schedule);
          meta.appendChild(schedEl);
        }

        if (meta.childNodes.length > 0) {
          card.appendChild(meta);
        }

        list.appendChild(card);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
