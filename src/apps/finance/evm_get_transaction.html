<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-emerald-50 via-white to-emerald-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Transaction Details</h2>
        <span id="status-badge" class="text-xs font-medium px-2 py-0.5 rounded-full"></span>
      </div>

      <div class="bg-white rounded-xl border border-emerald-200 p-5 space-y-3">
        <div class="flex items-start gap-3">
          <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0 pt-0.5">Tx Hash</span>
          <span id="tx-hash" class="text-sm text-slate-700 font-mono break-all"></span>
        </div>
        <div id="from-row" class="hidden">
          <div class="flex items-start gap-3">
            <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0 pt-0.5">From</span>
            <span id="from-value" class="text-sm text-slate-600 font-mono break-all"></span>
          </div>
        </div>
        <div id="to-row" class="hidden">
          <div class="flex items-start gap-3">
            <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0 pt-0.5">To</span>
            <span id="to-value" class="text-sm text-slate-600 font-mono break-all"></span>
          </div>
        </div>
        <div id="value-row" class="hidden">
          <div class="flex items-start gap-3">
            <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0 pt-0.5">Value (Wei)</span>
            <span id="value-amount" class="text-sm font-medium text-slate-700 font-mono"></span>
          </div>
        </div>
        <div id="block-row" class="hidden">
          <div class="flex items-start gap-3">
            <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0 pt-0.5">Block</span>
            <span id="block-value" class="text-sm text-slate-600"></span>
          </div>
        </div>
        <div id="gas-row" class="hidden">
          <div class="flex items-start gap-3">
            <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0 pt-0.5">Gas Used</span>
            <span id="gas-value" class="text-sm text-slate-600"></span>
          </div>
        </div>
        <div id="chain-row" class="hidden">
          <div class="flex items-start gap-3">
            <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0 pt-0.5">Chain</span>
            <span id="chain-value" class="text-sm text-slate-600"></span>
          </div>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function showField(rowId, valueId, value) {
      if (value == null) return;
      document.getElementById(rowId).classList.remove('hidden');
      document.getElementById(valueId).textContent = String(value);
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('tx-hash').textContent = data.tx_hash || '';

      const badge = document.getElementById('status-badge');
      if (data.status != null) {
        const isSuccess = data.status === 1;
        badge.textContent = isSuccess ? 'Success' : 'Failed';
        badge.className = 'text-xs font-medium px-2 py-0.5 rounded-full ' +
          (isSuccess ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700');
      } else {
        badge.classList.add('hidden');
      }

      showField('from-row', 'from-value', data.from_address);
      showField('to-row', 'to-value', data.to_address);
      showField('value-row', 'value-amount', data.value_wei);
      showField('block-row', 'block-value', data.block_number);
      showField('gas-row', 'gas-value', data.gas_used != null ? Number(data.gas_used).toLocaleString('en-US') : null);
      showField('chain-row', 'chain-value', data.chain);
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
