<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dividend History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-emerald-50 via-white to-emerald-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>
          <h2 id="symbol-header" class="text-lg font-semibold text-slate-800"></h2>
        </div>
        <span id="dividend-count" class="text-xs text-slate-400"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No dividend data found</div>

      <div id="dividends-table" class="hidden bg-white rounded-xl border border-emerald-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-emerald-50 text-left">
              <th class="px-4 py-2.5 text-xs font-medium text-slate-500 uppercase tracking-wide">Date</th>
              <th class="px-4 py-2.5 text-xs font-medium text-slate-500 uppercase tracking-wide text-right">Dividend</th>
            </tr>
          </thead>
          <tbody id="dividends-body"></tbody>
        </table>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('symbol-header').textContent = (data.symbol || '') + ' Dividends';
      const dividends = data.dividends || [];
      const count = data.count != null ? data.count : dividends.length;
      document.getElementById('dividend-count').textContent = count + ' payment' + (count !== 1 ? 's' : '');

      if (dividends.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      document.getElementById('dividends-table').classList.remove('hidden');
      const tbody = document.getElementById('dividends-body');
      tbody.textContent = '';

      const recent = dividends.slice(-20).reverse();
      recent.forEach((d, i) => {
        const tr = document.createElement('tr');
        tr.className = i % 2 === 0 ? 'bg-white' : 'bg-slate-50';
        const tdDate = document.createElement('td');
        tdDate.className = 'px-4 py-2 text-slate-700';
        tdDate.textContent = d.date || '';
        const tdDiv = document.createElement('td');
        tdDiv.className = 'px-4 py-2 text-right font-medium text-emerald-700';
        tdDiv.textContent = d.dividend != null ? '$' + Number(d.dividend).toFixed(4) : '-';
        tr.appendChild(tdDate);
        tr.appendChild(tdDiv);
        tbody.appendChild(tr);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
