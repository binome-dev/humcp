<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Statements</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-emerald-50 via-white to-emerald-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <h2 id="data-header" class="text-lg font-semibold text-slate-800"></h2>
          <span id="period-badge" class="text-xs font-medium bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full"></span>
        </div>
        <span id="statement-count" class="text-xs text-slate-400"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No financial statements available</div>

      <div id="statements-container" class="space-y-4"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function formatValue(val) {
      if (val == null) return '-';
      if (typeof val === 'number') {
        if (Math.abs(val) >= 1e9) return (val / 1e9).toFixed(2) + 'B';
        if (Math.abs(val) >= 1e6) return (val / 1e6).toFixed(2) + 'M';
        if (Math.abs(val) >= 1e3) return (val / 1e3).toFixed(1) + 'K';
        return Number(val).toLocaleString('en-US');
      }
      return String(val);
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('data-header').textContent = data.ticker || '';
      document.getElementById('period-badge').textContent = data.period || '';

      const statements = data.statements || [];
      document.getElementById('statement-count').textContent = statements.length + ' statement' + (statements.length !== 1 ? 's' : '');

      if (statements.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const container = document.getElementById('statements-container');
      container.innerHTML = statements.map((stmt, idx) => {
        const stmtData = stmt.data || {};
        const entries = Object.entries(stmtData);

        const headerLabel = stmt.ticker + (stmt.period ? ' - ' + stmt.period : '');

        const rows = entries.map(([key, val]) =>
          '<tr class="border-b border-emerald-100 last:border-0 hover:bg-emerald-50/50">' +
            '<td class="px-4 py-2 text-slate-600">' + escapeHtml(key.replace(/_/g, ' ')) + '</td>' +
            '<td class="px-4 py-2 text-right font-medium text-slate-700">' + escapeHtml(formatValue(val)) + '</td>' +
          '</tr>'
        ).join('');

        return '<div class="border border-emerald-200 rounded-lg overflow-hidden">' +
          '<div class="bg-emerald-50 px-4 py-2 border-b border-emerald-200">' +
            '<span class="text-sm font-medium text-emerald-700">' + escapeHtml(headerLabel) + '</span>' +
          '</div>' +
          '<table class="w-full text-sm">' +
            '<thead><tr class="border-b border-emerald-200">' +
              '<th class="text-left px-4 py-2 font-medium text-slate-500">Metric</th>' +
              '<th class="text-right px-4 py-2 font-medium text-slate-500">Value</th>' +
            '</tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
          '</table>' +
        '</div>';
      }).join('');
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
