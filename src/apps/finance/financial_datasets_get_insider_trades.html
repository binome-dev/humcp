<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insider Trades</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-emerald-50 via-white to-emerald-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <h2 id="symbol-header" class="text-lg font-semibold text-slate-800"></h2>
        </div>
        <span id="trade-count" class="text-xs text-slate-400"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No insider trades found</div>

      <div id="trades-table" class="hidden bg-white rounded-xl border border-emerald-200 overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-emerald-50 text-left">
              <th class="px-3 py-2.5 text-xs font-medium text-slate-500 uppercase tracking-wide">Date</th>
              <th class="px-3 py-2.5 text-xs font-medium text-slate-500 uppercase tracking-wide">Insider</th>
              <th class="px-3 py-2.5 text-xs font-medium text-slate-500 uppercase tracking-wide">Type</th>
              <th class="px-3 py-2.5 text-xs font-medium text-slate-500 uppercase tracking-wide text-right">Shares</th>
              <th class="px-3 py-2.5 text-xs font-medium text-slate-500 uppercase tracking-wide text-right">Price</th>
              <th class="px-3 py-2.5 text-xs font-medium text-slate-500 uppercase tracking-wide text-right">Value</th>
            </tr>
          </thead>
          <tbody id="trades-body"></tbody>
        </table>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function formatCurrency(num) {
      if (num == null) return '-';
      return '$' + Number(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatNumber(num) {
      if (num == null) return '-';
      return Number(num).toLocaleString('en-US');
    }

    function txTypeColor(type) {
      if (!type) return 'bg-slate-100 text-slate-600';
      const t = type.toLowerCase();
      if (t.includes('buy') || t.includes('purchase')) return 'bg-emerald-100 text-emerald-700';
      if (t.includes('sell') || t.includes('sale')) return 'bg-red-100 text-red-700';
      return 'bg-slate-100 text-slate-600';
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('symbol-header').textContent = (data.ticker || '') + ' Insider Trades';
      const trades = data.trades || [];
      const count = data.count != null ? data.count : trades.length;
      document.getElementById('trade-count').textContent = count + ' trade' + (count !== 1 ? 's' : '');

      if (trades.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      document.getElementById('trades-table').classList.remove('hidden');
      const tbody = document.getElementById('trades-body');
      tbody.textContent = '';

      trades.slice(0, 30).forEach((t, i) => {
        const tr = document.createElement('tr');
        tr.className = i % 2 === 0 ? 'bg-white' : 'bg-slate-50';

        const tdDate = document.createElement('td');
        tdDate.className = 'px-3 py-2 text-slate-600 text-xs';
        tdDate.textContent = t.transaction_date || t.filing_date || '-';

        const tdInsider = document.createElement('td');
        tdInsider.className = 'px-3 py-2';
        const nameSpan = document.createElement('div');
        nameSpan.className = 'text-sm text-slate-800';
        nameSpan.textContent = t.insider_name || '-';
        tdInsider.appendChild(nameSpan);
        if (t.insider_title) {
          const titleSpan = document.createElement('div');
          titleSpan.className = 'text-xs text-slate-400';
          titleSpan.textContent = t.insider_title;
          tdInsider.appendChild(titleSpan);
        }

        const tdType = document.createElement('td');
        tdType.className = 'px-3 py-2';
        const badge = document.createElement('span');
        badge.className = 'text-xs font-medium px-2 py-0.5 rounded-full ' + txTypeColor(t.transaction_type);
        badge.textContent = t.transaction_type || '-';
        tdType.appendChild(badge);

        const tdShares = document.createElement('td');
        tdShares.className = 'px-3 py-2 text-right text-slate-700';
        tdShares.textContent = formatNumber(t.shares);

        const tdPrice = document.createElement('td');
        tdPrice.className = 'px-3 py-2 text-right text-slate-700';
        tdPrice.textContent = formatCurrency(t.price_per_share);

        const tdValue = document.createElement('td');
        tdValue.className = 'px-3 py-2 text-right font-medium text-slate-800';
        tdValue.textContent = formatCurrency(t.total_value);

        tr.appendChild(tdDate);
        tr.appendChild(tdInsider);
        tr.appendChild(tdType);
        tr.appendChild(tdShares);
        tr.appendChild(tdPrice);
        tr.appendChild(tdValue);
        tbody.appendChild(tr);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
