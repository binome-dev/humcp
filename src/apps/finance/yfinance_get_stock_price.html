<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Price</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-emerald-50 via-white to-emerald-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        <h2 id="symbol-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>

      <div class="bg-white rounded-xl border border-emerald-200 p-6">
        <div class="flex items-baseline gap-3 mb-4">
          <span id="price-value" class="text-4xl font-bold text-slate-900"></span>
          <span id="currency-label" class="text-sm text-slate-500"></span>
        </div>
        <div id="change-container" class="hidden flex items-center gap-2">
          <span id="change-badge" class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-sm font-medium"></span>
          <span id="change-percent-label" class="text-sm text-slate-500"></span>
        </div>
        <div class="mt-4 grid grid-cols-2 gap-4">
          <div id="volume-section" class="hidden">
            <p class="text-xs text-slate-400 uppercase tracking-wide">Volume</p>
            <p id="volume-value" class="text-sm font-medium text-slate-700 mt-0.5"></p>
          </div>
          <div id="market-cap-section" class="hidden">
            <p class="text-xs text-slate-400 uppercase tracking-wide">Market Cap</p>
            <p id="market-cap-value" class="text-sm font-medium text-slate-700 mt-0.5"></p>
          </div>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function formatNumber(num) {
      if (num == null) return '-';
      return Number(num).toLocaleString('en-US');
    }

    function formatCompact(num) {
      if (num == null) return '-';
      if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
      if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return String(num);
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('symbol-header').textContent = data.symbol || '';
      document.getElementById('price-value').textContent = data.price != null ? Number(data.price).toFixed(2) : '--';
      document.getElementById('currency-label').textContent = data.currency || 'USD';

      if (data.change != null || data.change_percent != null) {
        const container = document.getElementById('change-container');
        container.classList.remove('hidden');
        container.classList.add('flex');

        const badge = document.getElementById('change-badge');
        const isPositive = (data.change != null ? data.change >= 0 : (data.change_percent != null ? data.change_percent >= 0 : true));

        const arrow = isPositive ? '+' : '';
        badge.className = 'inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-sm font-medium ' +
          (isPositive ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700');

        const parts = [];
        if (data.change != null) parts.push(arrow + Number(data.change).toFixed(2));
        badge.textContent = parts.join('');

        if (data.change_percent != null) {
          document.getElementById('change-percent-label').textContent = '(' + arrow + Number(data.change_percent).toFixed(2) + '%)';
        }
      }

      if (data.volume != null) {
        document.getElementById('volume-section').classList.remove('hidden');
        document.getElementById('volume-value').textContent = formatNumber(data.volume);
      }

      if (data.market_cap != null) {
        document.getElementById('market-cap-section').classList.remove('hidden');
        document.getElementById('market-cap-value').textContent = formatCompact(data.market_cap);
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
