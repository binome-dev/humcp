<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoviePy Video Trimmed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-rose-50 via-white to-pink-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-rose-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Video Trimmed Successfully</h2>
      </div>

      <div class="bg-white rounded-xl border border-rose-200 p-5 space-y-3">
        <div class="flex items-center gap-3">
          <span class="text-xs font-medium text-slate-500 w-32">Output Path</span>
          <code id="output-path" class="text-xs bg-slate-100 text-slate-700 px-2 py-0.5 rounded font-mono truncate"></code>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs font-medium text-slate-500 w-32">Start Time</span>
          <span id="start-time" class="text-sm text-slate-700"></span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs font-medium text-slate-500 w-32">End Time</span>
          <span id="end-time" class="text-sm text-slate-700"></span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs font-medium text-slate-500 w-32">Duration</span>
          <span id="duration-value" class="text-sm text-slate-700"></span>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function formatTime(seconds) {
      if (seconds == null) return '-';
      const mins = Math.floor(seconds / 60);
      const secs = (seconds % 60).toFixed(1);
      return mins > 0 ? mins + 'm ' + secs + 's' : secs + 's';
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('output-path').textContent = data.output_path || '';
      document.getElementById('start-time').textContent = data.start_time != null ? formatTime(data.start_time) : '-';
      document.getElementById('end-time').textContent = data.end_time != null ? formatTime(data.end_time) : '-';
      document.getElementById('duration-value').textContent = data.duration != null ? formatTime(data.duration) : '-';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
