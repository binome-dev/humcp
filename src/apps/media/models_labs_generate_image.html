<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModelsLab Generated Image</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-rose-50 via-white to-pink-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-pink-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">ModelsLab Generated Image</h2>
      </div>

      <div class="bg-white rounded-xl border border-rose-200 p-4 space-y-3">
        <div id="prompt-row" class="flex items-start gap-3">
          <span class="text-xs font-medium text-slate-500 mt-0.5">Prompt</span>
          <p id="prompt-text" class="text-sm text-slate-700 leading-relaxed"></p>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs font-medium text-slate-500">Status</span>
          <span id="status-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
        </div>
        <div id="eta-row" class="hidden flex items-center gap-3">
          <span class="text-xs font-medium text-slate-500">ETA</span>
          <span id="eta-value" class="text-sm text-slate-700"></span>
        </div>
      </div>

      <div id="images-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('prompt-text').textContent = data.prompt || '';

      const status = (data.status || 'unknown').toLowerCase();
      const badge = document.getElementById('status-badge');
      badge.textContent = status;

      const statusColors = {
        success: 'bg-emerald-100 text-emerald-700',
        processing: 'bg-amber-100 text-amber-700',
        failed: 'bg-red-100 text-red-700',
        error: 'bg-red-100 text-red-700'
      };
      badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' + (statusColors[status] || 'bg-slate-100 text-slate-600');

      if (data.eta != null) {
        document.getElementById('eta-row').classList.remove('hidden');
        document.getElementById('eta-value').textContent = data.eta + ' seconds';
      }

      const container = document.getElementById('images-container');
      container.textContent = '';

      const urls = data.output_urls || [];
      urls.forEach(function(url) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-xl border border-pink-200 overflow-hidden shadow-sm';

        const link = document.createElement('a');
        link.href = url;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.className = 'block';

        const img = document.createElement('img');
        img.src = url;
        img.alt = 'ModelsLab generated image';
        img.className = 'w-full max-h-[500px] object-contain bg-pink-50';
        img.loading = 'lazy';
        link.appendChild(img);
        card.appendChild(link);

        container.appendChild(card);
      });

      if (urls.length === 0 && status !== 'processing') {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No images generated';
        container.appendChild(empty);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
