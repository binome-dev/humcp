<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsplash Search Photos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-rose-50 via-white to-pink-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-pink-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>

      <p id="count-text" class="text-xs text-slate-500"></p>

      <div id="photos-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-header').textContent = 'Photos for \u201c' + (data.query || '') + '\u201d';

      const photos = data.photos || [];
      const total = data.total || 0;
      document.getElementById('count-text').textContent = photos.length + ' photo' + (photos.length !== 1 ? 's' : '') + (total ? ' of ' + total + ' total' : '');

      const grid = document.getElementById('photos-grid');
      grid.textContent = '';

      if (photos.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'col-span-full text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No photos found';
        grid.appendChild(empty);
        return;
      }

      photos.forEach(function(photo) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-xl border border-pink-200 overflow-hidden hover:border-pink-400 hover:shadow-md transition-all';

        const urls = photo.urls || {};
        const imgUrl = urls.small || urls.regular || urls.thumb || '';
        const fullUrl = urls.regular || urls.small || '';
        const desc = photo.description || 'Photo';
        const photographer = photo.author_name || '';
        const likes = photo.likes != null ? photo.likes : null;

        const link = document.createElement('a');
        link.href = fullUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.className = 'block';

        const img = document.createElement('img');
        img.src = imgUrl;
        img.alt = desc;
        img.className = 'w-full h-44 object-cover bg-pink-100';
        img.loading = 'lazy';
        link.appendChild(img);
        card.appendChild(link);

        const info = document.createElement('div');
        info.className = 'p-2 space-y-1';

        const descEl = document.createElement('p');
        descEl.className = 'text-xs text-slate-700 font-medium truncate';
        descEl.textContent = desc;
        info.appendChild(descEl);

        const metaParts = [];
        if (photographer) metaParts.push(photographer);
        if (likes != null) metaParts.push(likes + ' like' + (likes !== 1 ? 's' : ''));
        if (metaParts.length > 0) {
          const meta = document.createElement('p');
          meta.className = 'text-xs text-slate-400 truncate';
          meta.textContent = metaParts.join(' \u00b7 ');
          info.appendChild(meta);
        }

        card.appendChild(info);
        grid.appendChild(card);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
