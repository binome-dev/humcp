<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Tables</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-violet-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          <h2 class="text-sm font-semibold text-slate-700">Extracted Tables</h2>
        </div>
        <span id="table-count" class="text-xs text-slate-400"></span>
      </div>

      <div id="tables-container" class="space-y-6"></div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No tables found in markdown content</div>
      <div id="message-box" class="hidden text-sm text-slate-500 text-center py-4"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function parseCSV(csvText) {
      const lines = csvText.trim().split('\n');
      const rows = [];
      for (const line of lines) {
        const cells = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (inQuotes) {
            if (ch === '"' && line[i + 1] === '"') {
              current += '"';
              i++;
            } else if (ch === '"') {
              inQuotes = false;
            } else {
              current += ch;
            }
          } else {
            if (ch === '"') {
              inQuotes = true;
            } else if (ch === ',') {
              cells.push(current);
              current = '';
            } else {
              current += ch;
            }
          }
        }
        cells.push(current);
        rows.push(cells);
      }
      return rows;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const tables = data.tables || [];
      const count = data.count != null ? data.count : tables.length;
      document.getElementById('table-count').textContent = count + ' table' + (count !== 1 ? 's' : '');

      if (data.message && tables.length === 0) {
        document.getElementById('message-box').classList.remove('hidden');
        document.getElementById('message-box').textContent = data.message;
        document.getElementById('empty-state').classList.add('hidden');
        return;
      }

      if (tables.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const container = document.getElementById('tables-container');
      container.innerHTML = '';

      tables.forEach((table) => {
        const section = document.createElement('div');
        section.className = 'space-y-2';

        const header = document.createElement('div');
        header.className = 'flex items-center justify-between';
        header.innerHTML =
          '<span class="text-xs font-medium text-slate-500">Table #' + escapeHtml(table.index) + '</span>' +
          '<span class="text-xs text-slate-400">' + escapeHtml(table.rows) + ' rows, ' + escapeHtml(table.columns) + ' columns</span>';
        section.appendChild(header);

        const csvRows = parseCSV(table.csv || '');
        if (csvRows.length > 0) {
          const wrapper = document.createElement('div');
          wrapper.className = 'border border-slate-200 rounded-lg overflow-x-auto';

          const tableEl = document.createElement('table');
          tableEl.className = 'w-full text-sm';

          const theadRow = csvRows[0];
          const thead = document.createElement('thead');
          thead.innerHTML = '<tr class="bg-slate-50 border-b border-slate-200">' +
            theadRow.map(h => '<th class="text-left px-4 py-2 font-medium text-slate-600 whitespace-nowrap">' + escapeHtml(h) + '</th>').join('') +
            '</tr>';
          tableEl.appendChild(thead);

          const tbody = document.createElement('tbody');
          for (let i = 1; i < csvRows.length; i++) {
            const row = csvRows[i];
            const tr = document.createElement('tr');
            tr.className = 'border-b border-slate-100 last:border-0 hover:bg-slate-50';
            tr.innerHTML = row.map(cell => '<td class="px-4 py-2 text-slate-700 whitespace-nowrap">' + escapeHtml(cell) + '</td>').join('');
            tbody.appendChild(tr);
          }
          tableEl.appendChild(tbody);
          wrapper.appendChild(tableEl);
          section.appendChild(wrapper);
        }

        container.appendChild(section);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
