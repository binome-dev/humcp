<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SerpAPI Search Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
        <span class="ml-auto inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700">SerpAPI</span>
      </div>

      <div id="knowledge-graph" class="hidden bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 rounded-xl p-4 mb-4">
        <div class="flex items-start gap-2">
          <svg class="w-4 h-4 text-blue-600 mt-0.5 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
          <div class="flex-1">
            <p class="text-xs font-medium text-blue-700 mb-1">Knowledge Graph</p>
            <div id="kg-content" class="text-sm text-blue-900 leading-relaxed"></div>
          </div>
        </div>
      </div>

      <div id="related-questions" class="hidden mb-4">
        <p class="text-xs font-medium text-slate-500 mb-2">Related Questions</p>
        <div id="rq-container" class="space-y-2"></div>
      </div>

      <div id="results-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    // NOTE: innerHTML usage below is safe because all dynamic values pass through
    // escapeHtml() which uses textContent-based escaping to prevent XSS.
    const state = { initialized: false };

    function renderKnowledgeGraph(kg) {
      const kgEl = document.getElementById('knowledge-graph');
      const contentEl = document.getElementById('kg-content');

      kgEl.classList.remove('hidden');

      const parts = [];
      if (kg.title) {
        parts.push('<p class="font-semibold text-base mb-1">' + escapeHtml(kg.title) + '</p>');
      }
      if (kg.type || kg.entity_type) {
        parts.push('<p class="text-xs text-blue-600 mb-2">' + escapeHtml(kg.type || kg.entity_type) + '</p>');
      }
      if (kg.description) {
        parts.push('<p class="mb-2">' + escapeHtml(kg.description) + '</p>');
      }

      const skipKeys = ['title', 'type', 'entity_type', 'description', 'thumbnail', 'image', 'images', 'source'];
      Object.entries(kg).forEach(function(entry) {
        const key = entry[0];
        const value = entry[1];
        if (skipKeys.indexOf(key) !== -1 || typeof value === 'object') return;
        parts.push('<p class="text-xs"><span class="font-medium text-blue-700">' + escapeHtml(key.replace(/_/g, ' ')) + ':</span> ' + escapeHtml(String(value)) + '</p>');
      });

      contentEl.innerHTML = parts.join('');
    }

    function renderRelatedQuestions(questions) {
      const rqSection = document.getElementById('related-questions');
      const rqContainer = document.getElementById('rq-container');

      rqSection.classList.remove('hidden');
      rqContainer.innerHTML = '';

      questions.forEach(function(q) {
        const el = document.createElement('div');
        el.className = 'bg-white rounded-lg border border-slate-200 p-3';

        const question = q.question || q.title || '';
        const snippet = q.snippet || q.answer || '';

        el.innerHTML =
          '<p class="text-sm font-medium text-slate-700 mb-1">' + escapeHtml(question) + '</p>' +
          (snippet ? '<p class="text-xs text-slate-500 line-clamp-2">' + escapeHtml(snippet) + '</p>' : '');

        rqContainer.appendChild(el);
      });
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-header').textContent = 'Results for \u201c' + (data.query || '') + '\u201d';

      if (data.knowledge_graph) {
        renderKnowledgeGraph(data.knowledge_graph);
      }

      if (data.related_questions && data.related_questions.length > 0) {
        renderRelatedQuestions(data.related_questions);
      }

      const container = document.getElementById('results-container');
      container.innerHTML = '';

      const results = data.results || [];
      results.forEach(function(item) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-blue-300 hover:shadow-sm transition-all';

        const scorePercent = item.score != null ? Math.round(item.score * 100) : null;
        const scoreBadge = scorePercent != null
          ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' +
            (scorePercent >= 80 ? 'bg-emerald-100 text-emerald-700' : scorePercent >= 50 ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600') +
            '">' + scorePercent + '%</span>'
          : '';

        card.innerHTML =
          '<div class="flex items-start justify-between gap-3 mb-2">' +
            '<a href="' + escapeHtml(item.url || '') + '" target="_blank" rel="noopener noreferrer" class="text-sm font-semibold text-blue-600 hover:text-blue-800 hover:underline leading-snug">' + escapeHtml(item.title || '') + '</a>' +
            scoreBadge +
          '</div>' +
          '<p class="text-xs text-slate-400 mb-2 truncate">' + escapeHtml(item.url || '') + '</p>' +
          '<p class="text-sm text-slate-600 leading-relaxed line-clamp-3">' + escapeHtml(item.snippet || '') + '</p>';

        container.appendChild(card);
      });

      if (results.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">No results found</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
