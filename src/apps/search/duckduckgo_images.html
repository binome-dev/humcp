<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuckDuckGo Image Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>
    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-amber-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>
      <div id="results-container" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
    </div>
    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>
  <script type="module">
    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('query-header').textContent = 'Images: "' + (data.query || '') + '"';
      const container = document.getElementById('results-container');
      container.replaceChildren();
      const results = data.results || [];
      if (results.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'col-span-3 text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No images found';
        container.appendChild(empty);
        return;
      }
      results.forEach(item => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 overflow-hidden hover:border-amber-300 hover:shadow-sm transition-all';
        const thumb = item.thumbnail_url || item.image_url;
        if (thumb) {
          const img = document.createElement('img');
          img.src = thumb;
          img.alt = item.title || '';
          img.className = 'w-full h-32 object-cover bg-slate-100';
          img.onerror = () => { img.style.display = 'none'; };
          card.appendChild(img);
        }
        const info = document.createElement('div');
        info.className = 'p-2';
        const link = document.createElement('a');
        link.href = item.url || '';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.className = 'text-xs font-medium text-amber-700 hover:underline line-clamp-2';
        link.textContent = item.title || '';
        info.appendChild(link);
        if (item.width && item.height) {
          const dims = document.createElement('span');
          dims.className = 'text-xs text-slate-400 block mt-1';
          dims.textContent = item.width + 'x' + item.height;
          info.appendChild(dims);
        }
        card.appendChild(info);
        container.appendChild(card);
      });
    }

    function renderError(m) { document.getElementById('loading').classList.add('hidden'); document.getElementById('result').classList.add('hidden'); const el = document.getElementById('error'); el.classList.remove('hidden'); el.textContent = m; }
    function parseToolResult(r) { if (r && r.content) { for (const i of r.content) { if (i.type === 'text' && i.text) { try { return JSON.parse(i.text); } catch { return { raw: i.text }; } } } } if (r && r.data) return r; return r; }
    function handleToolResult(r) { const p = parseToolResult(r); if (p && p.success === false) { renderError(p.error || 'Failed'); return; } const d = p?.data || p; if (d) render(d); else renderError('Unexpected data format'); }
    window.addEventListener('message', e => { const m = e.data; if (!m || typeof m !== 'object') return; if (m.jsonrpc === '2.0') { if (m.method === 'ui/initialize') { window.parent.postMessage({ jsonrpc: '2.0', id: m.id, result: { protocolVersion: '0.1.0', capabilities: {} } }, '*'); } else if (m.method === 'ui/toolResult') handleToolResult(m.params); } if (m.type === 'toolResult') handleToolResult(m.data); });
    window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/ready', params: {} }, '*');
  </script>
</body>
</html>
