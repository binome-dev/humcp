<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brave News Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>
    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-orange-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>
      <div id="results-container" class="space-y-3"></div>
    </div>
    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>
  <script type="module">
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function createCard(item) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-orange-300 hover:shadow-sm transition-all';

      const header = document.createElement('div');
      header.className = 'flex items-start justify-between gap-3 mb-1';

      const link = document.createElement('a');
      link.href = item.url || '';
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.className = 'text-sm font-semibold text-orange-700 hover:text-orange-900 hover:underline leading-snug';
      link.textContent = item.title || '';
      header.appendChild(link);

      if (item.age) {
        const age = document.createElement('span');
        age.className = 'text-xs text-slate-400 whitespace-nowrap';
        age.textContent = item.age;
        header.appendChild(age);
      }
      card.appendChild(header);

      if (item.source) {
        const src = document.createElement('p');
        src.className = 'text-xs text-orange-600 font-medium mb-2';
        src.textContent = item.source;
        card.appendChild(src);
      }

      const desc = document.createElement('p');
      desc.className = 'text-sm text-slate-600 leading-relaxed line-clamp-3';
      desc.textContent = item.description || '';
      card.appendChild(desc);

      return card;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('query-header').textContent = 'News: "' + (data.query || '') + '"';
      const container = document.getElementById('results-container');
      container.replaceChildren();
      const results = data.results || [];
      if (results.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No news results found';
        container.appendChild(empty);
        return;
      }
      results.forEach(item => container.appendChild(createCard(item)));
    }

    function renderError(m) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      const el = document.getElementById('error');
      el.classList.remove('hidden');
      el.textContent = m;
    }

    function parseToolResult(r) {
      if (r && r.content) {
        for (const i of r.content) {
          if (i.type === 'text' && i.text) {
            try { return JSON.parse(i.text); } catch { return { raw: i.text }; }
          }
        }
      }
      if (r && r.data) return r;
      return r;
    }

    function handleToolResult(r) {
      const p = parseToolResult(r);
      if (p && p.success === false) { renderError(p.error || 'Failed'); return; }
      const d = p?.data || p;
      if (d) render(d); else renderError('Unexpected data format');
    }

    window.addEventListener('message', e => {
      const m = e.data;
      if (!m || typeof m !== 'object') return;
      if (m.jsonrpc === '2.0') {
        if (m.method === 'ui/initialize') {
          window.parent.postMessage({ jsonrpc: '2.0', id: m.id, result: { protocolVersion: '0.1.0', capabilities: {} } }, '*');
        } else if (m.method === 'ui/toolResult') handleToolResult(m.params);
      }
      if (m.type === 'toolResult') handleToolResult(m.data);
    });

    window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/ready', params: {} }, '*');
  </script>
</body>
</html>
