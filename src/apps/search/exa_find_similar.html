<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exa Find Similar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>
    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800">Pages similar to:</h2>
      </div>
      <div id="source-url" class="text-xs mb-2"></div>
      <div id="results-container" class="space-y-3"></div>
    </div>
    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>
  <script type="module">
    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const urlEl = document.getElementById('source-url');
      urlEl.replaceChildren();
      const urlLink = document.createElement('a');
      urlLink.href = data.url || '';
      urlLink.target = '_blank';
      urlLink.className = 'text-indigo-600 hover:underline';
      urlLink.textContent = data.url || '';
      urlEl.appendChild(urlLink);

      const container = document.getElementById('results-container');
      container.replaceChildren();
      const results = data.results || [];
      if (results.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No similar pages found';
        container.appendChild(empty);
        return;
      }
      results.forEach(item => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-indigo-300 hover:shadow-sm transition-all';

        const header = document.createElement('div');
        header.className = 'flex items-start justify-between gap-3 mb-2';
        const link = document.createElement('a');
        link.href = item.url || '';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.className = 'text-sm font-semibold text-indigo-700 hover:text-indigo-900 hover:underline leading-snug';
        link.textContent = item.title || '';
        header.appendChild(link);

        if (item.score != null) {
          const badge = document.createElement('span');
          badge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-700';
          badge.textContent = Math.round(item.score * 100) + '%';
          header.appendChild(badge);
        }
        card.appendChild(header);

        const urlText = document.createElement('p');
        urlText.className = 'text-xs text-slate-400 mb-2 truncate';
        urlText.textContent = item.url || '';
        card.appendChild(urlText);

        if (item.snippet) {
          const snippet = document.createElement('p');
          snippet.className = 'text-sm text-slate-600 leading-relaxed line-clamp-3';
          snippet.textContent = item.snippet;
          card.appendChild(snippet);
        }
        container.appendChild(card);
      });
    }

    function renderError(m) { document.getElementById('loading').classList.add('hidden'); document.getElementById('result').classList.add('hidden'); const el = document.getElementById('error'); el.classList.remove('hidden'); el.textContent = m; }
    function parseToolResult(r) { if (r && r.content) { for (const i of r.content) { if (i.type === 'text' && i.text) { try { return JSON.parse(i.text); } catch { return { raw: i.text }; } } } } if (r && r.data) return r; return r; }
    function handleToolResult(r) { const p = parseToolResult(r); if (p && p.success === false) { renderError(p.error || 'Failed'); return; } const d = p?.data || p; if (d) render(d); else renderError('Unexpected data format'); }
    window.addEventListener('message', e => { const m = e.data; if (!m || typeof m !== 'object') return; if (m.jsonrpc === '2.0') { if (m.method === 'ui/initialize') { window.parent.postMessage({ jsonrpc: '2.0', id: m.id, result: { protocolVersion: '0.1.0', capabilities: {} } }, '*'); } else if (m.method === 'ui/toolResult') handleToolResult(m.params); } if (m.type === 'toolResult') handleToolResult(m.data); });
    window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/ready', params: {} }, '*');
  </script>
</body>
</html>
