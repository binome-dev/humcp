<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Playlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-purple-50 via-white to-purple-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-purple-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14.5c2-1 4.5-1.5 7-1"/><path d="M7 11.5c2.5-1 5.5-1.5 8.5-1"/><path d="M6.5 8.5c3-1 6.5-1.5 10-1"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Playlist</h2>
      </div>

      <div class="bg-gradient-to-r from-purple-50 to-purple-100 border border-purple-200 rounded-xl p-5">
        <div class="flex items-start gap-4">
          <div class="w-16 h-16 rounded-lg bg-gradient-to-br from-purple-400 to-purple-600 flex items-center justify-center flex-shrink-0">
            <svg class="w-8 h-8 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <p id="playlist-name" class="text-lg font-bold text-slate-800"></p>
            <p id="playlist-desc" class="text-sm text-slate-500 mt-1"></p>
            <div id="playlist-meta" class="flex flex-wrap gap-2 mt-2"></div>
          </div>
        </div>
      </div>

      <div id="tracks-container" class="space-y-2"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('playlist-name').textContent = data.name || 'Unknown Playlist';
      document.getElementById('playlist-desc').textContent = data.description || '';

      const meta = document.getElementById('playlist-meta');
      while (meta.firstChild) { meta.removeChild(meta.firstChild); }

      if (data.owner) {
        const ownerBadge = document.createElement('span');
        ownerBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-700';
        ownerBadge.textContent = 'By ' + data.owner;
        meta.appendChild(ownerBadge);
      }

      const tracks = data.tracks || [];
      const totalCount = data.total_tracks || tracks.length;
      const countBadge = document.createElement('span');
      countBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600';
      countBadge.textContent = totalCount + ' tracks';
      meta.appendChild(countBadge);

      if (data.public != null) {
        const visBadge = document.createElement('span');
        visBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' +
          (data.public ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600');
        visBadge.textContent = data.public ? 'Public' : 'Private';
        meta.appendChild(visBadge);
      }

      const container = document.getElementById('tracks-container');
      while (container.firstChild) { container.removeChild(container.firstChild); }

      if (tracks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-6 text-slate-400 text-sm';
        empty.textContent = 'No tracks in playlist';
        container.appendChild(empty);
        return;
      }

      tracks.forEach(function(track, index) {
        const row = document.createElement('div');
        row.className = 'bg-white rounded-lg border border-slate-200 px-4 py-3 flex items-center gap-3 hover:border-purple-300 transition-all';

        const num = document.createElement('span');
        num.className = 'text-xs font-medium text-slate-400 w-6 text-right flex-shrink-0';
        num.textContent = String(index + 1);
        row.appendChild(num);

        const info = document.createElement('div');
        info.className = 'flex-1 min-w-0';

        const nameEl = document.createElement('p');
        nameEl.className = 'text-sm font-medium text-slate-800 truncate';
        nameEl.textContent = track.name || 'Unknown Track';
        info.appendChild(nameEl);

        const artists = (track.artists || []).join(', ');
        if (artists) {
          const artistEl = document.createElement('p');
          artistEl.className = 'text-xs text-slate-500 truncate';
          artistEl.textContent = artists;
          info.appendChild(artistEl);
        }

        row.appendChild(info);
        container.appendChild(row);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
