<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-purple-50 via-white to-purple-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-purple-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14.5c2-1 4.5-1.5 7-1"/><path d="M7 11.5c2.5-1 5.5-1.5 8.5-1"/><path d="M6.5 8.5c3-1 6.5-1.5 10-1"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>

      <div id="tracks-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function formatDuration(ms) {
      if (!ms) return '';
      const mins = Math.floor(ms / 60000);
      const secs = Math.floor((ms % 60000) / 1000);
      return mins + ':' + (secs < 10 ? '0' : '') + secs;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-header').textContent = 'Results for "' + (data.query || '') + '"';

      const container = document.getElementById('tracks-container');
      while (container.firstChild) { container.removeChild(container.firstChild); }

      const tracks = data.tracks || [];

      if (tracks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No tracks found';
        container.appendChild(empty);
        return;
      }

      tracks.forEach(function(track, index) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-purple-200 p-4 hover:border-purple-300 hover:shadow-sm transition-all';

        const row = document.createElement('div');
        row.className = 'flex items-center gap-4';

        const numEl = document.createElement('span');
        numEl.className = 'text-sm font-medium text-slate-400 w-6 text-right flex-shrink-0';
        numEl.textContent = String(index + 1);
        row.appendChild(numEl);

        const info = document.createElement('div');
        info.className = 'flex-1 min-w-0';

        const nameEl = document.createElement('p');
        nameEl.className = 'text-sm font-semibold text-slate-800 truncate';
        nameEl.textContent = track.name || 'Unknown Track';
        info.appendChild(nameEl);

        const artists = (track.artists || []).join(', ') || 'Unknown Artist';
        const sub = document.createElement('p');
        sub.className = 'text-xs text-slate-500 truncate';
        sub.textContent = artists + (track.album ? ' - ' + track.album : '');
        info.appendChild(sub);

        row.appendChild(info);

        const right = document.createElement('div');
        right.className = 'flex items-center gap-3 flex-shrink-0';

        if (track.popularity != null) {
          const popBadge = document.createElement('span');
          popBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' +
            (track.popularity >= 70 ? 'bg-green-100 text-green-700' : track.popularity >= 40 ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600');
          popBadge.textContent = track.popularity + '%';
          right.appendChild(popBadge);
        }

        if (track.duration_ms) {
          const dur = document.createElement('span');
          dur.className = 'text-xs text-slate-400';
          dur.textContent = formatDuration(track.duration_ms);
          right.appendChild(dur);
        }

        row.appendChild(right);
        card.appendChild(row);

        if (track.preview_url) {
          const audioWrap = document.createElement('div');
          audioWrap.className = 'mt-3';
          const audio = document.createElement('audio');
          audio.controls = true;
          audio.src = track.preview_url;
          audio.className = 'w-full h-8';
          audioWrap.appendChild(audio);
          card.appendChild(audioWrap);
        }

        container.appendChild(card);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
