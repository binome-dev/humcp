<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webex Rooms</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <h2 class="text-sm font-semibold text-slate-700">Webex Rooms</h2>
        <span id="room-count" class="text-xs text-slate-400 ml-auto"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No rooms found</div>

      <div id="rooms-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const rooms = data.rooms || [];
      const count = data.count != null ? data.count : rooms.length;
      document.getElementById('room-count').textContent = count + ' room' + (count !== 1 ? 's' : '');

      if (rooms.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const grid = document.getElementById('rooms-grid');
      while (grid.firstChild) { grid.removeChild(grid.firstChild); }

      rooms.forEach(room => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-blue-300 hover:shadow-sm transition-all';

        const wrapper = document.createElement('div');
        wrapper.className = 'flex items-center gap-3';

        const iconBox = document.createElement('div');
        iconBox.className = 'p-2 bg-blue-50 rounded-lg flex-shrink-0';
        const icon = document.createElement('span');
        icon.className = 'text-blue-600 font-bold text-sm';
        icon.textContent = room.type === 'direct' ? '@' : '#';
        iconBox.appendChild(icon);

        const info = document.createElement('div');
        info.className = 'flex-1 min-w-0';

        const title = document.createElement('p');
        title.className = 'font-medium text-slate-800 truncate';
        title.textContent = room.title || 'Untitled';

        const idLine = document.createElement('p');
        idLine.className = 'text-xs text-slate-400 font-mono truncate mt-0.5';
        idLine.textContent = room.id || '';

        info.appendChild(title);
        info.appendChild(idLine);

        wrapper.appendChild(iconBox);
        wrapper.appendChild(info);

        if (room.type) {
          const badge = document.createElement('span');
          badge.className = 'text-xs px-2 py-0.5 rounded-full bg-sky-100 text-sky-700 flex-shrink-0';
          badge.textContent = room.type;
          wrapper.appendChild(badge);
        }

        card.appendChild(wrapper);
        grid.appendChild(card);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
