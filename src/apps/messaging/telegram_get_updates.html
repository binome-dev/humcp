<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Updates</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        <h2 class="text-sm font-semibold text-slate-700">Telegram Updates</h2>
        <span id="update-count" class="text-xs text-slate-400 ml-auto"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No updates found</div>

      <div id="updates-timeline" class="space-y-2"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const updates = data.updates || [];
      const count = data.count != null ? data.count : updates.length;
      document.getElementById('update-count').textContent = count + ' update' + (count !== 1 ? 's' : '');

      if (updates.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const timeline = document.getElementById('updates-timeline');
      while (timeline.firstChild) { timeline.removeChild(timeline.firstChild); }

      updates.forEach(upd => {
        const bubble = document.createElement('div');
        bubble.className = 'bg-white rounded-lg border border-slate-200 p-3 hover:border-blue-200 transition-all';

        const header = document.createElement('div');
        header.className = 'flex items-center gap-2 mb-1';

        const avatar = document.createElement('div');
        avatar.className = 'w-6 h-6 rounded-full bg-sky-100 flex items-center justify-center flex-shrink-0';
        const avatarText = document.createElement('span');
        avatarText.className = 'text-xs font-bold text-sky-600';
        avatarText.textContent = (upd.from_user || '?').charAt(0).toUpperCase();
        avatar.appendChild(avatarText);

        const userName = document.createElement('span');
        userName.className = 'text-sm font-medium text-slate-700';
        userName.textContent = upd.from_user || 'Unknown';

        const idBadge = document.createElement('span');
        idBadge.className = 'text-xs px-1.5 py-0.5 rounded bg-slate-100 text-slate-500 font-mono ml-auto';
        idBadge.textContent = '#' + (upd.update_id != null ? upd.update_id : '');

        header.appendChild(avatar);
        header.appendChild(userName);
        header.appendChild(idBadge);

        bubble.appendChild(header);

        if (upd.message_text) {
          const body = document.createElement('p');
          body.className = 'text-sm text-slate-600 leading-relaxed ml-8';
          body.textContent = upd.message_text;
          bubble.appendChild(body);
        }

        const meta = document.createElement('div');
        meta.className = 'flex items-center gap-3 ml-8 mt-1 text-xs text-slate-400';

        if (upd.chat_id != null) {
          const chatId = document.createElement('span');
          chatId.textContent = 'Chat: ' + upd.chat_id;
          meta.appendChild(chatId);
        }

        if (upd.date) {
          const dateEl = document.createElement('span');
          try {
            dateEl.textContent = new Date(upd.date * 1000).toLocaleString();
          } catch {
            dateEl.textContent = String(upd.date);
          }
          meta.appendChild(dateEl);
        }

        if (meta.childNodes.length > 0) {
          bubble.appendChild(meta);
        }

        timeline.appendChild(bubble);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
