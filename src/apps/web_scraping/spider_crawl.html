<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider Crawl Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-violet-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9"/></svg>
          <h2 class="text-lg font-semibold text-slate-800">Spider Crawl Results</h2>
        </div>
        <span id="page-count" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-violet-100 text-violet-700"></span>
      </div>

      <div id="pages-grid" class="grid grid-cols-1 gap-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function createPageCard(page, index) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-violet-300 hover:shadow-sm transition-all cursor-pointer';

      const titleEl = document.createElement('div');
      titleEl.className = 'flex items-start justify-between gap-3 mb-2';

      const link = document.createElement('a');
      link.href = page.url || '#';
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.className = 'text-sm font-semibold text-violet-700 hover:text-violet-900 hover:underline leading-snug';
      link.textContent = page.title || ('Page ' + (index + 1));
      titleEl.appendChild(link);

      if (page.markdown) {
        const badge = document.createElement('span');
        badge.className = 'inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium bg-violet-100 text-violet-600';
        badge.textContent = 'MD';
        titleEl.appendChild(badge);
      }

      card.appendChild(titleEl);

      const urlEl = document.createElement('p');
      urlEl.className = 'text-xs text-slate-400 mb-2 truncate';
      urlEl.textContent = page.url || '';
      card.appendChild(urlEl);

      const previewEl = document.createElement('p');
      previewEl.className = 'text-sm text-slate-600 leading-relaxed line-clamp-3';
      const contentText = page.content || '';
      previewEl.textContent = contentText.substring(0, 300) + (contentText.length > 300 ? '...' : '');
      card.appendChild(previewEl);

      card.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return;
        const existing = card.querySelector('.expanded-content');
        if (existing) {
          existing.remove();
          return;
        }
        const expanded = document.createElement('div');
        expanded.className = 'expanded-content mt-3 pt-3 border-t border-slate-100';
        const pre = document.createElement('pre');
        pre.className = 'text-xs text-slate-600 leading-relaxed whitespace-pre-wrap break-words max-h-64 overflow-y-auto';
        pre.textContent = page.content || '';
        expanded.appendChild(pre);
        card.appendChild(expanded);
      });

      return card;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('page-count').textContent = (data.total_pages || 0) + ' pages crawled';

      const grid = document.getElementById('pages-grid');
      grid.textContent = '';

      const pages = data.pages || [];
      pages.forEach((page, index) => {
        grid.appendChild(createPageCard(page, index));
      });

      if (pages.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No pages crawled';
        grid.appendChild(empty);
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
