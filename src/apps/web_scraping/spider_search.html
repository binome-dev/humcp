<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider Search Result</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-violet-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Spider Search Result</h2>
      </div>

      <div class="bg-violet-50 border border-violet-200 rounded-lg px-4 py-2 flex items-center gap-2">
        <svg class="w-4 h-4 text-violet-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span id="query-text" class="text-sm text-violet-700"></span>
      </div>

      <div class="flex items-center gap-2">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-violet-100 text-violet-800" id="result-count"></span>
      </div>

      <div id="results-list" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-text').textContent = data.query || '';

      const results = data.results || [];
      document.getElementById('result-count').textContent = results.length + ' results';

      const listEl = document.getElementById('results-list');
      while (listEl.firstChild) { listEl.removeChild(listEl.firstChild); }

      for (const item of results) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 space-y-2';

        if (item.title) {
          const titleEl = document.createElement('h3');
          titleEl.className = 'text-sm font-semibold text-slate-800';
          titleEl.textContent = item.title;
          card.appendChild(titleEl);
        }

        if (item.url) {
          const urlEl = document.createElement('a');
          urlEl.href = item.url;
          urlEl.target = '_blank';
          urlEl.rel = 'noopener noreferrer';
          urlEl.className = 'text-xs text-blue-600 hover:underline break-all block';
          urlEl.textContent = item.url;
          card.appendChild(urlEl);
        }

        if (item.content) {
          const contentEl = document.createElement('p');
          contentEl.className = 'text-xs text-slate-600 leading-relaxed';
          contentEl.textContent = item.content.length > 300 ? item.content.substring(0, 300) + '...' : item.content;
          card.appendChild(contentEl);
        }

        if (item.score !== null && item.score !== undefined) {
          const scoreEl = document.createElement('span');
          scoreEl.className = 'inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-600';
          scoreEl.textContent = 'Score: ' + item.score.toFixed(3);
          card.appendChild(scoreEl);
        }

        listEl.appendChild(card);
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
