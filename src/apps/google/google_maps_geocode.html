<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geocode Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <h2 class="text-sm font-semibold text-slate-700">Geocode Results</h2>
        </div>
        <span id="result-count" class="text-xs text-slate-400"></span>
      </div>

      <div class="bg-blue-50 border border-blue-200 rounded-lg px-3 py-2">
        <span class="text-xs text-blue-600 font-medium">Address:</span>
        <span id="address-text" class="text-sm text-blue-800 ml-1"></span>
      </div>

      <div id="results-container" class="space-y-3"></div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No results found</div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('address-text').textContent = data.address || '';
      const count = data.result_count != null ? data.result_count : (data.results || []).length;
      document.getElementById('result-count').textContent = count + ' result' + (count !== 1 ? 's' : '');

      const results = data.results || [];

      if (results.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const container = document.getElementById('results-container');
      container.innerHTML = results.map(r => {
        const loc = r.location || {};
        const lat = loc.lat != null ? loc.lat : '';
        const lng = loc.lng != null ? loc.lng : '';
        return '<div class="border border-slate-200 rounded-lg p-4 hover:bg-slate-50 space-y-2">' +
          '<div class="text-sm font-medium text-slate-800">' + escapeHtml(r.formatted_address) + '</div>' +
          '<div class="flex items-center gap-4">' +
            '<div class="flex items-center gap-1">' +
              '<span class="text-xs text-slate-400">Lat:</span>' +
              '<span class="text-xs font-mono text-slate-600">' + escapeHtml(lat) + '</span>' +
            '</div>' +
            '<div class="flex items-center gap-1">' +
              '<span class="text-xs text-slate-400">Lng:</span>' +
              '<span class="text-xs font-mono text-slate-600">' + escapeHtml(lng) + '</span>' +
            '</div>' +
            (r.place_id ? '<div class="flex items-center gap-1"><span class="text-xs text-slate-400">Place ID:</span><span class="text-xs font-mono text-slate-500 truncate max-w-[200px]">' + escapeHtml(r.place_id) + '</span></div>' : '') +
          '</div>' +
          (r.address_types && r.address_types.length > 0 ?
            '<div class="flex flex-wrap gap-1">' +
            r.address_types.map(t => '<span class="inline-flex px-2 py-0.5 rounded text-xs bg-slate-100 text-slate-500">' + escapeHtml(t) + '</span>').join('') +
            '</div>' : '') +
        '</div>';
      }).join('');
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
