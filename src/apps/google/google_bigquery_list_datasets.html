<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigQuery Datasets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          <h2 class="text-sm font-semibold text-slate-700">BigQuery Datasets</h2>
        </div>
        <span id="dataset-count" class="text-xs text-slate-400"></span>
      </div>

      <div class="bg-blue-50 border border-blue-200 rounded-lg px-3 py-2">
        <span class="text-xs text-blue-600 font-medium">Project:</span>
        <span id="project-text" class="text-sm font-mono text-blue-800 ml-1"></span>
      </div>

      <div id="datasets-container" class="grid gap-3"></div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No datasets found</div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('project-text').textContent = data.project_id || '';
      const count = data.count != null ? data.count : (data.datasets || []).length;
      document.getElementById('dataset-count').textContent = count + ' dataset' + (count !== 1 ? 's' : '');

      const datasets = data.datasets || [];

      if (datasets.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const container = document.getElementById('datasets-container');
      container.innerHTML = datasets.map(ds =>
        '<div class="border border-slate-200 rounded-lg p-4 hover:bg-slate-50 space-y-1">' +
          '<div class="flex items-center gap-2">' +
            '<svg class="w-4 h-4 text-blue-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>' +
            '<span class="font-mono text-sm font-medium text-slate-800">' + escapeHtml(ds.dataset_id) + '</span>' +
          '</div>' +
          (ds.friendly_name ? '<div class="text-xs text-slate-600 pl-6">' + escapeHtml(ds.friendly_name) + '</div>' : '') +
          (ds.description ? '<div class="text-xs text-slate-400 pl-6">' + escapeHtml(ds.description) + '</div>' : '') +
          '<div class="flex items-center gap-3 pl-6">' +
            '<span class="text-xs text-slate-400">Project: ' + escapeHtml(ds.project) + '</span>' +
          '</div>' +
        '</div>'
      ).join('');
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
