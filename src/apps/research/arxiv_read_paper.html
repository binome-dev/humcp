<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArXiv Paper Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-6"></div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const container = document.getElementById('result');
      container.innerHTML = '';

      const papers = data.papers || [];

      if (papers.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No papers found';
        container.appendChild(empty);
        return;
      }

      papers.forEach(function(paper) {
        const paperSection = document.createElement('div');
        paperSection.className = 'space-y-4';

        const titleEl = document.createElement('h2');
        titleEl.className = 'text-lg font-semibold text-slate-800 flex items-center gap-2';
        titleEl.textContent = paper.title || 'Untitled Paper';
        paperSection.appendChild(titleEl);

        const metaRow = document.createElement('div');
        metaRow.className = 'flex items-center gap-3 mb-2';

        const idEl = document.createElement('span');
        idEl.className = 'text-xs text-indigo-500 font-medium';
        idEl.textContent = paper.article_id || '';
        metaRow.appendChild(idEl);

        if (paper.authors && paper.authors.length > 0) {
          const authorsEl = document.createElement('span');
          authorsEl.className = 'text-xs text-slate-500';
          authorsEl.textContent = paper.authors.join(', ');
          metaRow.appendChild(authorsEl);
        }

        paperSection.appendChild(metaRow);

        if (paper.summary) {
          const summaryBox = document.createElement('div');
          summaryBox.className = 'bg-gradient-to-r from-indigo-50 to-indigo-100 border border-indigo-200 rounded-xl p-4';

          const summaryLabel = document.createElement('p');
          summaryLabel.className = 'text-xs font-medium text-indigo-700 mb-1';
          summaryLabel.textContent = 'Abstract';

          const summaryText = document.createElement('p');
          summaryText.className = 'text-sm text-indigo-900 leading-relaxed';
          summaryText.textContent = paper.summary;

          summaryBox.appendChild(summaryLabel);
          summaryBox.appendChild(summaryText);
          paperSection.appendChild(summaryBox);
        }

        const pages = paper.pages || [];
        if (pages.length > 0) {
          const navRow = document.createElement('div');
          navRow.className = 'flex items-center gap-2 mb-2';

          const pageLabel = document.createElement('span');
          pageLabel.className = 'text-xs font-medium text-slate-500';
          pageLabel.textContent = pages.length + ' page' + (pages.length !== 1 ? 's' : '');
          navRow.appendChild(pageLabel);

          const pageButtons = document.createElement('div');
          pageButtons.className = 'flex gap-1 flex-wrap';

          const pageContents = [];

          pages.forEach(function(pg, idx) {
            const btn = document.createElement('button');
            btn.className = 'px-2 py-0.5 text-xs rounded font-medium transition-colors ' +
              (idx === 0 ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-indigo-100 hover:text-indigo-700');
            btn.textContent = pg.page;
            btn.addEventListener('click', function() {
              pageButtons.querySelectorAll('button').forEach(function(b) {
                b.className = 'px-2 py-0.5 text-xs rounded font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-indigo-100 hover:text-indigo-700';
              });
              btn.className = 'px-2 py-0.5 text-xs rounded font-medium transition-colors bg-indigo-600 text-white';
              pageContents.forEach(function(pc, pcIdx) {
                pc.classList.toggle('hidden', pcIdx !== idx);
              });
            });
            pageButtons.appendChild(btn);
          });

          navRow.appendChild(pageButtons);
          paperSection.appendChild(navRow);

          pages.forEach(function(pg, idx) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'bg-white rounded-lg border border-slate-200 p-4' + (idx !== 0 ? ' hidden' : '');

            const pageHeader = document.createElement('div');
            pageHeader.className = 'flex items-center gap-2 mb-2 pb-2 border-b border-slate-100';

            const pageNum = document.createElement('span');
            pageNum.className = 'text-xs font-medium text-indigo-600';
            pageNum.textContent = 'Page ' + pg.page;
            pageHeader.appendChild(pageNum);

            const pageText = document.createElement('pre');
            pageText.className = 'text-sm text-slate-700 leading-relaxed whitespace-pre-wrap font-[system-ui]';
            pageText.textContent = pg.text || '';

            pageDiv.appendChild(pageHeader);
            pageDiv.appendChild(pageText);
            pageContents.push(pageDiv);
            paperSection.appendChild(pageDiv);
          });
        }

        container.appendChild(paperSection);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
