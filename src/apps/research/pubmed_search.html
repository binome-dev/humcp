<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PubMed Search Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>

      <div id="results-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-header').textContent = 'PubMed results for \u201c' + (data.query || '') + '\u201d';

      const container = document.getElementById('results-container');
      while (container.firstChild) container.removeChild(container.firstChild);

      const results = data.results || [];
      results.forEach(function(item) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-indigo-300 hover:shadow-sm transition-all';

        const headerRow = document.createElement('div');
        headerRow.className = 'flex items-start justify-between gap-3 mb-2';

        const titleLink = document.createElement('a');
        titleLink.href = item.pubmed_url || '';
        titleLink.target = '_blank';
        titleLink.rel = 'noopener noreferrer';
        titleLink.className = 'text-sm font-semibold text-indigo-700 hover:text-indigo-900 hover:underline leading-snug';
        titleLink.textContent = item.title || '';
        headerRow.appendChild(titleLink);

        const pmidBadge = document.createElement('span');
        pmidBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-700 flex-shrink-0';
        pmidBadge.textContent = 'PMID: ' + (item.pmid || '');
        headerRow.appendChild(pmidBadge);

        card.appendChild(headerRow);

        const metaRow = document.createElement('div');
        metaRow.className = 'flex items-center gap-3 mb-2 flex-wrap';

        if (item.first_author) {
          const authorEl = document.createElement('span');
          authorEl.className = 'text-xs text-slate-500';
          authorEl.textContent = item.first_author;
          metaRow.appendChild(authorEl);
        }

        if (item.journal) {
          const journalEl = document.createElement('span');
          journalEl.className = 'text-xs text-indigo-500 font-medium';
          journalEl.textContent = item.journal;
          metaRow.appendChild(journalEl);
        }

        if (item.published) {
          const pubEl = document.createElement('span');
          pubEl.className = 'text-xs text-slate-400';
          pubEl.textContent = item.published;
          metaRow.appendChild(pubEl);
        }

        card.appendChild(metaRow);

        if (item.abstract) {
          const abstractEl = document.createElement('p');
          abstractEl.className = 'text-sm text-slate-600 leading-relaxed line-clamp-3 mb-2';
          abstractEl.textContent = item.abstract;
          card.appendChild(abstractEl);
        }

        const tagsRow = document.createElement('div');
        tagsRow.className = 'flex items-center gap-2 flex-wrap';

        (item.keywords || []).slice(0, 3).forEach(function(kw) {
          const tag = document.createElement('span');
          tag.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs bg-slate-100 text-slate-600';
          tag.textContent = kw;
          tagsRow.appendChild(tag);
        });

        if (item.doi) {
          const doiEl = document.createElement('span');
          doiEl.className = 'text-xs text-slate-400 ml-auto';
          doiEl.textContent = 'DOI: ' + item.doi;
          tagsRow.appendChild(doiEl);
        }

        if (tagsRow.childNodes.length > 0) {
          card.appendChild(tagsRow);
        }

        container.appendChild(card);
      });

      if (results.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No results found';
        container.appendChild(empty);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
