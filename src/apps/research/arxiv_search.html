<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArXiv Search Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>

      <div id="results-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-header').textContent = 'ArXiv results for \u201c' + (data.query || '') + '\u201d';

      const container = document.getElementById('results-container');
      container.innerHTML = '';

      const results = data.results || [];
      results.forEach(function(item) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-indigo-300 hover:shadow-sm transition-all';

        const titleEl = document.createElement('h3');
        titleEl.className = 'text-sm font-semibold text-indigo-700 leading-snug';
        titleEl.textContent = item.title || '';

        const headerRow = document.createElement('div');
        headerRow.className = 'flex items-start justify-between gap-3 mb-2';
        headerRow.appendChild(titleEl);

        if (item.primary_category) {
          const badge = document.createElement('span');
          badge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-700 flex-shrink-0';
          badge.textContent = item.primary_category;
          headerRow.appendChild(badge);
        }

        const metaRow = document.createElement('div');
        metaRow.className = 'flex items-center gap-3 mb-2';

        const authorsEl = document.createElement('p');
        authorsEl.className = 'text-xs text-slate-500 truncate flex-1';
        authorsEl.textContent = (item.authors || []).join(', ');
        metaRow.appendChild(authorsEl);

        if (item.published) {
          const pubEl = document.createElement('span');
          pubEl.className = 'text-xs text-slate-400 flex-shrink-0';
          pubEl.textContent = item.published.split('T')[0];
          metaRow.appendChild(pubEl);
        }

        card.appendChild(headerRow);
        card.appendChild(metaRow);

        if (item.summary) {
          const summaryEl = document.createElement('p');
          summaryEl.className = 'text-sm text-slate-600 leading-relaxed line-clamp-3 mb-2';
          summaryEl.textContent = item.summary;
          card.appendChild(summaryEl);
        }

        const footerRow = document.createElement('div');
        footerRow.className = 'flex items-center gap-3';

        const idEl = document.createElement('span');
        idEl.className = 'text-xs text-slate-400';
        idEl.textContent = item.article_id || '';
        footerRow.appendChild(idEl);

        if (item.pdf_url) {
          const pdfLink = document.createElement('a');
          pdfLink.href = item.pdf_url;
          pdfLink.target = '_blank';
          pdfLink.rel = 'noopener noreferrer';
          pdfLink.className = 'inline-flex items-center gap-1 text-xs font-medium text-indigo-600 hover:text-indigo-800 hover:underline';
          pdfLink.textContent = 'PDF';
          footerRow.appendChild(pdfLink);
        }

        card.appendChild(footerRow);
        container.appendChild(card);
      });

      if (results.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No results found';
        container.appendChild(empty);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
