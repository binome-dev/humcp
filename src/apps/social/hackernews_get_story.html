<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacker News Story</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-orange-50 via-white to-amber-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div id="story-detail"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTimestamp(ts) {
      if (!ts) return '';
      try {
        const d = new Date(ts * 1000);
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch { return ''; }
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const story = data.story || data;
      const container = document.getElementById('story-detail');
      container.replaceChildren();

      const card = document.createElement('div');
      card.className = 'bg-white rounded-xl border border-slate-200 overflow-hidden';

      // Header
      const header = document.createElement('div');
      header.className = 'bg-gradient-to-r from-orange-500 to-amber-500 px-5 py-3';
      const headerLabel = document.createElement('span');
      headerLabel.className = 'text-white text-sm font-medium';
      headerLabel.textContent = 'Hacker News';
      header.appendChild(headerLabel);

      // Body
      const body = document.createElement('div');
      body.className = 'p-5 space-y-4';

      const title = document.createElement('h2');
      title.className = 'text-lg font-bold text-slate-800 leading-snug';
      title.textContent = story.title || '';

      body.appendChild(title);

      if (story.url) {
        const urlLink = document.createElement('a');
        urlLink.href = story.url;
        urlLink.target = '_blank';
        urlLink.rel = 'noopener noreferrer';
        urlLink.className = 'text-xs text-orange-600 hover:text-orange-800 hover:underline break-all block';
        urlLink.textContent = story.url;
        body.appendChild(urlLink);
      }

      const meta = document.createElement('div');
      meta.className = 'flex items-center gap-3 text-xs text-slate-400';
      const authorSpan = document.createElement('span');
      authorSpan.textContent = 'by ' + (story.by || '');
      meta.appendChild(authorSpan);
      if (story.time) {
        const dot = document.createElement('span');
        dot.textContent = '\u00b7';
        const dateSpan = document.createElement('span');
        dateSpan.textContent = formatTimestamp(story.time);
        meta.appendChild(dot);
        meta.appendChild(dateSpan);
      }
      const typeSpan = document.createElement('span');
      typeSpan.className = 'bg-orange-50 text-orange-600 px-2 py-0.5 rounded-full font-medium';
      typeSpan.textContent = story.type || 'story';
      meta.appendChild(typeSpan);
      body.appendChild(meta);

      // Stats
      const stats = document.createElement('div');
      stats.className = 'grid grid-cols-2 gap-3 pt-3 border-t border-slate-100';

      const scoreStat = document.createElement('div');
      scoreStat.className = 'bg-orange-50 rounded-lg p-3 text-center';
      const scoreVal = document.createElement('div');
      scoreVal.className = 'text-xl font-bold text-orange-600';
      scoreVal.textContent = String(story.score || 0);
      const scoreLabel = document.createElement('div');
      scoreLabel.className = 'text-xs text-slate-400';
      scoreLabel.textContent = 'points';
      scoreStat.appendChild(scoreVal);
      scoreStat.appendChild(scoreLabel);

      const commentStat = document.createElement('div');
      commentStat.className = 'bg-slate-50 rounded-lg p-3 text-center';
      const commentVal = document.createElement('div');
      commentVal.className = 'text-xl font-bold text-slate-600';
      commentVal.textContent = String(story.descendants || 0);
      const commentLabel = document.createElement('div');
      commentLabel.className = 'text-xs text-slate-400';
      commentLabel.textContent = 'comments';
      commentStat.appendChild(commentVal);
      commentStat.appendChild(commentLabel);

      stats.appendChild(scoreStat);
      stats.appendChild(commentStat);
      body.appendChild(stats);

      // HN link
      const hnLink = document.createElement('a');
      hnLink.href = 'https://news.ycombinator.com/item?id=' + story.id;
      hnLink.target = '_blank';
      hnLink.rel = 'noopener noreferrer';
      hnLink.className = 'inline-block text-xs text-orange-600 hover:text-orange-800 hover:underline font-medium';
      hnLink.textContent = 'View on Hacker News';
      body.appendChild(hnLink);

      card.appendChild(header);
      card.appendChild(body);
      container.appendChild(card);
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
