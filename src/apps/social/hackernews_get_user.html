<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacker News User Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-orange-50 via-white to-amber-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-orange-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <h2 id="username-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>
      <div id="user-info" class="bg-white rounded-lg border border-slate-200 p-4 space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTimestamp(ts) {
      if (!ts) return '';
      try { return new Date(ts * 1000).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }); }
      catch { return ''; }
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const user = data.user;
      document.getElementById('username-header').textContent = user.id;

      const container = document.getElementById('user-info');
      container.replaceChildren();

      const stats = document.createElement('div');
      stats.className = 'flex items-center gap-6';

      const karmaBox = document.createElement('div');
      karmaBox.className = 'text-center';
      const karmaVal = document.createElement('div');
      karmaVal.className = 'text-2xl font-bold text-orange-600';
      karmaVal.textContent = String(user.karma || 0);
      const karmaLabel = document.createElement('div');
      karmaLabel.className = 'text-xs text-slate-400';
      karmaLabel.textContent = 'Karma';
      karmaBox.appendChild(karmaVal);
      karmaBox.appendChild(karmaLabel);

      const subBox = document.createElement('div');
      subBox.className = 'text-center';
      const subVal = document.createElement('div');
      subVal.className = 'text-2xl font-bold text-slate-700';
      subVal.textContent = String((user.submitted || []).length);
      const subLabel = document.createElement('div');
      subLabel.className = 'text-xs text-slate-400';
      subLabel.textContent = 'Submissions';
      subBox.appendChild(subVal);
      subBox.appendChild(subLabel);

      stats.appendChild(karmaBox);
      stats.appendChild(subBox);
      container.appendChild(stats);

      if (user.created) {
        const created = document.createElement('div');
        created.className = 'text-xs text-slate-400';
        created.textContent = 'Member since ' + formatTimestamp(user.created);
        container.appendChild(created);
      }

      if (user.about) {
        const about = document.createElement('div');
        about.className = 'text-sm text-slate-600 border-t border-slate-100 pt-3 mt-2';
        about.textContent = user.about.replace(/<[^>]*>/g, ' ').trim();
        container.appendChild(about);
      }

      const profileLink = document.createElement('a');
      profileLink.href = 'https://news.ycombinator.com/user?id=' + encodeURIComponent(user.id);
      profileLink.target = '_blank';
      profileLink.rel = 'noopener noreferrer';
      profileLink.className = 'inline-flex items-center gap-1 text-xs font-medium text-orange-600 hover:text-orange-800 hover:underline';
      profileLink.textContent = 'View on Hacker News';
      container.appendChild(profileLink);
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) { renderError(parsed.error || 'Operation failed'); return; }
      const data = parsed?.data || parsed;
      if (data) { render(data); } else { renderError('Unexpected data format'); }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({ jsonrpc: '2.0', id: msg.id, result: { protocolVersion: '0.1.0', capabilities: {} } }, '*');
        } else if (msg.method === 'ui/toolResult') { handleToolResult(msg.params); }
      }
      if (msg.type === 'toolResult') { handleToolResult(msg.data); }
    });

    window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/ready', params: {} }, '*');
  </script>
</body>
</html>
