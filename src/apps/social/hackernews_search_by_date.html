<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacker News Search by Date</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-orange-50 via-white to-amber-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-orange-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>
      <div id="results-container" class="space-y-1"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-header').textContent = 'HN results (by date) for \u201c' + (data.query || '') + '\u201d';

      const container = document.getElementById('results-container');
      container.replaceChildren();

      const results = data.results || [];
      results.forEach(function(item, index) {
        const row = document.createElement('div');
        row.className = 'flex items-start gap-3 bg-white rounded-lg border border-slate-200 px-4 py-3 hover:border-orange-300 hover:shadow-sm transition-all';

        const rank = document.createElement('span');
        rank.className = 'text-sm font-bold text-slate-300 min-w-[24px] pt-0.5';
        rank.textContent = String(index + 1) + '.';

        const content = document.createElement('div');
        content.className = 'flex-1 min-w-0';

        const titleLink = document.createElement('a');
        titleLink.href = item.url || ('https://news.ycombinator.com/item?id=' + item.objectID);
        titleLink.target = '_blank';
        titleLink.rel = 'noopener noreferrer';
        titleLink.className = 'text-sm font-semibold text-slate-800 hover:text-orange-700 hover:underline leading-snug';
        titleLink.textContent = item.title || '';

        const meta = document.createElement('div');
        meta.className = 'flex items-center gap-2 mt-1 text-xs text-slate-400';

        if (item.points != null) {
          const pts = document.createElement('span');
          pts.className = 'font-medium text-orange-600';
          pts.textContent = item.points + ' points';
          meta.appendChild(pts);
        }
        if (item.author) {
          const auth = document.createElement('span');
          auth.textContent = 'by ' + item.author;
          meta.appendChild(auth);
        }
        if (item.created_at) {
          const dt = document.createElement('span');
          dt.textContent = item.created_at.split('T')[0];
          meta.appendChild(dt);
        }
        if (item.num_comments != null) {
          const cmts = document.createElement('a');
          cmts.href = 'https://news.ycombinator.com/item?id=' + item.objectID;
          cmts.target = '_blank';
          cmts.className = 'hover:text-orange-600';
          cmts.textContent = item.num_comments + ' comments';
          meta.appendChild(cmts);
        }

        content.appendChild(titleLink);
        content.appendChild(meta);
        row.appendChild(rank);
        row.appendChild(content);
        container.appendChild(row);
      });

      if (results.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No results found';
        container.appendChild(empty);
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) { render(data); } else { renderError('Unexpected data format'); }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({ jsonrpc: '2.0', id: msg.id, result: { protocolVersion: '0.1.0', capabilities: {} } }, '*');
        } else if (msg.method === 'ui/toolResult') { handleToolResult(msg.params); }
      }
      if (msg.type === 'toolResult') { handleToolResult(msg.data); }
    });

    window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/ready', params: {} }, '*');
  </script>
</body>
</html>
