<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Search Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-orange-50 via-white to-amber-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-orange-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
        <span id="count-badge" class="text-xs font-medium text-orange-600 bg-orange-50 px-2 py-0.5 rounded-full"></span>
      </div>
      <div id="results-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch { return dateStr; }
    }

    function createTweetCard(tweet) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-orange-300 hover:shadow-sm transition-all';

      // Author row
      const authorRow = document.createElement('div');
      authorRow.className = 'flex items-center gap-2 mb-2';

      if (tweet.author_username) {
        const authorBadge = document.createElement('span');
        authorBadge.className = 'text-xs font-medium text-orange-600';
        authorBadge.textContent = '@' + tweet.author_username;
        authorRow.appendChild(authorBadge);
      }

      if (tweet.created_at) {
        const dot = document.createElement('span');
        dot.className = 'text-xs text-slate-300';
        dot.textContent = '\u00b7';
        const dateSpan = document.createElement('span');
        dateSpan.className = 'text-xs text-slate-400';
        dateSpan.textContent = formatDate(tweet.created_at);
        authorRow.appendChild(dot);
        authorRow.appendChild(dateSpan);
      }

      // Tweet text
      const textP = document.createElement('p');
      textP.className = 'text-sm text-slate-700 leading-relaxed mb-2';
      textP.textContent = tweet.text || '';

      // Link
      const footer = document.createElement('div');
      footer.className = 'flex items-center gap-3 text-xs text-slate-400';

      if (tweet.url) {
        const link = document.createElement('a');
        link.href = tweet.url;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.className = 'text-orange-600 hover:text-orange-800 hover:underline';
        link.textContent = 'View on X';
        footer.appendChild(link);
      }

      card.appendChild(authorRow);
      card.appendChild(textP);
      card.appendChild(footer);

      return card;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-header').textContent = 'Tweets for "' + (data.query || '') + '"';
      const count = data.count != null ? data.count : (data.tweets || []).length;
      document.getElementById('count-badge').textContent = count + ' results';

      const container = document.getElementById('results-container');
      container.replaceChildren();

      const tweets = data.tweets || [];
      tweets.forEach(function(tweet) {
        container.appendChild(createTweetCard(tweet));
      });

      if (tweets.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No tweets found';
        container.appendChild(empty);
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
