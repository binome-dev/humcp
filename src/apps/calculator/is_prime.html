<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Is Prime - Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-8 rounded-xl bg-gradient-to-br from-slate-50 via-white to-slate-50">
    <div id="loading" class="text-slate-400 text-sm text-center">Waiting for data...</div>
    <div id="result" class="hidden text-center">
      <div class="flex items-center justify-center mb-4">
        <!-- Check circle (prime) -->
        <svg id="icon-prime" class="hidden w-16 h-16 text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <!-- X circle (not prime) -->
        <svg id="icon-not-prime" class="hidden w-16 h-16 text-amber-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
      </div>
      <div class="space-y-2">
        <div id="val-n" class="font-mono font-bold text-3xl text-slate-800"></div>
        <div id="verdict" class="text-xl font-semibold"></div>
        <div id="divisor-info" class="hidden mt-4 text-sm text-slate-600 bg-white px-4 py-2 rounded-lg border border-amber-200">
          First divisor: <span id="val-divisor" class="font-mono font-bold"></span>
        </div>
      </div>
    </div>
    <div id="error" class="hidden text-red-600 text-sm font-medium text-center"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const isPrime = data.is_prime;
      const app = document.getElementById('app');

      if (isPrime) {
        app.className = 'p-8 rounded-xl bg-gradient-to-br from-emerald-50 via-white to-emerald-50';
        document.getElementById('icon-prime').classList.remove('hidden');
        document.getElementById('icon-not-prime').classList.add('hidden');
        const verdict = document.getElementById('verdict');
        verdict.textContent = 'is a prime number';
        verdict.className = 'text-xl font-semibold text-emerald-700';
      } else {
        app.className = 'p-8 rounded-xl bg-gradient-to-br from-amber-50 via-white to-amber-50';
        document.getElementById('icon-not-prime').classList.remove('hidden');
        document.getElementById('icon-prime').classList.add('hidden');
        const verdict = document.getElementById('verdict');
        verdict.textContent = 'is not a prime number';
        verdict.className = 'text-xl font-semibold text-amber-700';

        if (data.divisible_by) {
          document.getElementById('divisor-info').classList.remove('hidden');
          document.getElementById('val-divisor').textContent = data.divisible_by;
        }
      }

      document.getElementById('val-n').textContent = data.n.toLocaleString();
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try {
              return JSON.parse(item.text);
            } catch {
              return { raw: item.text };
            }
          }
        }
      }
      if (result && result.data) {
        return result;
      }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data && typeof data.n === 'number' && typeof data.is_prime === 'boolean') {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0',
            id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0',
      method: 'ui/ready',
      params: {}
    }, '*');
  </script>
</body>
</html>
