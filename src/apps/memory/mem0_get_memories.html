<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Memories</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-cyan-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <h2 id="user-header" class="text-lg font-semibold text-slate-800"></h2>
        <span id="count-badge" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-cyan-100 text-cyan-700"></span>
      </div>

      <div id="results-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('user-header').textContent = 'Memories for ' + (data.user_id || 'user');

      const memories = data.memories || [];
      document.getElementById('count-badge').textContent = memories.length + ' memor' + (memories.length !== 1 ? 'ies' : 'y');

      const container = document.getElementById('results-container');
      while (container.firstChild) container.removeChild(container.firstChild);

      memories.forEach(function(item) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-cyan-300 hover:shadow-sm transition-all';

        const contentEl = document.createElement('p');
        contentEl.className = 'text-sm text-slate-700 leading-relaxed mb-2';
        contentEl.textContent = item.memory || item.content || '';
        card.appendChild(contentEl);

        const metaRow = document.createElement('div');
        metaRow.className = 'flex items-center gap-3 flex-wrap';

        if (item.id) {
          const idEl = document.createElement('span');
          idEl.className = 'text-xs text-slate-400';
          idEl.textContent = 'ID: ' + item.id;
          metaRow.appendChild(idEl);
        }

        if (item.created_at) {
          const dateEl = document.createElement('span');
          dateEl.className = 'text-xs text-slate-400';
          dateEl.textContent = item.created_at;
          metaRow.appendChild(dateEl);
        }

        if (item.metadata && Object.keys(item.metadata).length > 0) {
          Object.entries(item.metadata).forEach(function(entry) {
            const tag = document.createElement('span');
            tag.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs bg-cyan-50 text-cyan-600';
            tag.textContent = entry[0] + ': ' + entry[1];
            metaRow.appendChild(tag);
          });
        }

        if (metaRow.childNodes.length > 0) {
          card.appendChild(metaRow);
        }

        container.appendChild(card);
      });

      if (memories.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No memories found for this user';
        container.appendChild(empty);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
