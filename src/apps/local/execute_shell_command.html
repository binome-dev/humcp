<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shell Command Output</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-slate-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <h2 class="text-sm font-semibold text-slate-700">Shell Command</h2>
        </div>
        <span id="return-code" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
      </div>

      <div class="bg-slate-800 rounded-lg p-3 overflow-x-auto">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs text-slate-500">$</span>
          <code id="command-text" class="text-sm text-emerald-400 font-mono"></code>
        </div>
        <div id="working-dir" class="text-xs text-slate-500 font-mono"></div>
      </div>

      <div id="truncated-warning" class="hidden text-xs text-amber-600 bg-amber-50 rounded-lg px-3 py-1.5 flex items-center gap-1">
        <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>Output was truncated</span>
      </div>

      <div id="stdout-section" class="hidden">
        <div class="bg-slate-900 rounded-lg overflow-hidden">
          <div class="px-4 py-2 bg-slate-800 border-b border-slate-700">
            <span class="text-xs text-slate-400 font-medium">stdout</span>
          </div>
          <pre class="p-4 overflow-x-auto max-h-[500px] overflow-y-auto"><code id="stdout-content" class="text-sm text-slate-300 font-mono whitespace-pre-wrap"></code></pre>
        </div>
      </div>

      <div id="stderr-section" class="hidden">
        <div class="bg-red-950 rounded-lg overflow-hidden">
          <div class="px-4 py-2 bg-red-900 border-b border-red-800">
            <span class="text-xs text-red-300 font-medium">stderr</span>
          </div>
          <pre class="p-4 overflow-x-auto max-h-[300px] overflow-y-auto"><code id="stderr-content" class="text-sm text-red-300 font-mono whitespace-pre-wrap"></code></pre>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('command-text').textContent = data.command || '';

      if (data.working_directory) {
        document.getElementById('working-dir').textContent = 'in ' + data.working_directory;
      }

      const returnCode = data.return_code != null ? data.return_code : 0;
      const rcEl = document.getElementById('return-code');
      rcEl.textContent = 'exit ' + returnCode;
      if (returnCode === 0) {
        rcEl.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700';
      } else {
        rcEl.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700';
      }

      if (data.output_truncated) {
        document.getElementById('truncated-warning').classList.remove('hidden');
      }

      if (data.stdout) {
        document.getElementById('stdout-section').classList.remove('hidden');
        document.getElementById('stdout-content').textContent = data.stdout;
      }

      if (data.stderr) {
        document.getElementById('stderr-section').classList.remove('hidden');
        document.getElementById('stderr-content').textContent = data.stderr;
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
