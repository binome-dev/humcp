<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom Meetings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-blue-50 via-white to-blue-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <h2 id="header" class="text-lg font-semibold text-slate-800"></h2>
      </div>

      <div id="meetings-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function formatDateTime(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) +
          ' at ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      } catch { return dateStr; }
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const meetings = data.meetings || [];
      const total = data.total_records || meetings.length;
      document.getElementById('header').textContent = 'Zoom Meetings (' + total + ')';

      const container = document.getElementById('meetings-container');
      while (container.firstChild) { container.removeChild(container.firstChild); }

      if (meetings.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No meetings found';
        container.appendChild(empty);
        return;
      }

      meetings.forEach(function(meeting) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-blue-200 p-4 hover:border-blue-300 hover:shadow-sm transition-all';

        const header = document.createElement('div');
        header.className = 'flex items-start justify-between gap-3 mb-2';

        const topicEl = document.createElement('p');
        topicEl.className = 'text-sm font-semibold text-slate-800';
        topicEl.textContent = meeting.topic || 'Untitled Meeting';
        header.appendChild(topicEl);

        if (meeting.status) {
          const statusColors = {
            waiting: 'bg-amber-100 text-amber-700',
            started: 'bg-green-100 text-green-700',
            finished: 'bg-slate-100 text-slate-600'
          };
          const statusBadge = document.createElement('span');
          statusBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' +
            (statusColors[meeting.status.toLowerCase()] || 'bg-slate-100 text-slate-600');
          statusBadge.textContent = meeting.status;
          header.appendChild(statusBadge);
        }

        card.appendChild(header);

        const idEl = document.createElement('p');
        idEl.className = 'text-xs text-slate-400 font-mono mb-2';
        idEl.textContent = 'ID: ' + (meeting.meeting_id || 'N/A');
        card.appendChild(idEl);

        const detailsRow = document.createElement('div');
        detailsRow.className = 'flex flex-wrap items-center gap-3';

        if (meeting.start_time) {
          const timeEl = document.createElement('span');
          timeEl.className = 'text-xs text-slate-600';
          timeEl.textContent = formatDateTime(meeting.start_time);
          detailsRow.appendChild(timeEl);
        }

        if (meeting.duration) {
          const durEl = document.createElement('span');
          durEl.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700';
          durEl.textContent = meeting.duration + ' min';
          detailsRow.appendChild(durEl);
        }

        card.appendChild(detailsRow);

        if (meeting.join_url) {
          const linkRow = document.createElement('div');
          linkRow.className = 'mt-2';
          const link = document.createElement('a');
          link.href = meeting.join_url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className = 'text-xs text-blue-600 hover:text-blue-800 hover:underline';
          link.textContent = 'Join Meeting';
          linkRow.appendChild(link);
          card.appendChild(linkRow);
        }

        container.appendChild(card);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
