<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom Meeting Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-blue-50 via-white to-blue-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Meeting Details</h2>
      </div>

      <div class="bg-white rounded-xl border border-blue-200 p-5 space-y-4">
        <div class="flex items-start gap-4">
          <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
            <svg class="w-6 h-6 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </div>
          <div class="flex-1">
            <p id="meeting-topic" class="text-lg font-bold text-slate-800"></p>
            <p id="meeting-id" class="text-xs text-slate-400 font-mono mt-0.5"></p>
          </div>
          <div id="status-badge-wrap"></div>
        </div>

        <div id="join-link-box" class="hidden bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg p-4 border border-blue-200">
          <p class="text-xs font-medium text-blue-700 mb-2">Join Link</p>
          <a id="join-url" href="#" target="_blank" rel="noopener noreferrer" class="text-sm font-semibold text-blue-600 hover:text-blue-800 hover:underline break-all"></a>
        </div>

        <div id="details-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function formatDateTime(dateStr) {
      if (!dateStr) return 'N/A';
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }) +
          ' at ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      } catch { return dateStr; }
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const meeting = data.meeting || data;

      document.getElementById('meeting-topic').textContent = meeting.topic || 'Untitled Meeting';
      document.getElementById('meeting-id').textContent = 'Meeting ID: ' + (meeting.meeting_id || 'N/A');

      const statusWrap = document.getElementById('status-badge-wrap');
      while (statusWrap.firstChild) { statusWrap.removeChild(statusWrap.firstChild); }
      if (meeting.status) {
        const statusColors = {
          waiting: 'bg-amber-100 text-amber-700',
          started: 'bg-green-100 text-green-700',
          finished: 'bg-slate-100 text-slate-600'
        };
        const badge = document.createElement('span');
        badge.className = 'inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ' +
          (statusColors[meeting.status.toLowerCase()] || 'bg-slate-100 text-slate-600');
        badge.textContent = meeting.status;
        statusWrap.appendChild(badge);
      }

      if (meeting.join_url) {
        document.getElementById('join-link-box').classList.remove('hidden');
        const joinUrl = document.getElementById('join-url');
        joinUrl.href = meeting.join_url;
        joinUrl.textContent = meeting.join_url;
      }

      const grid = document.getElementById('details-grid');
      while (grid.firstChild) { grid.removeChild(grid.firstChild); }

      var details = [
        { label: 'Start Time', value: formatDateTime(meeting.start_time) },
        { label: 'Duration', value: meeting.duration ? meeting.duration + ' minutes' : 'N/A' },
        { label: 'Timezone', value: meeting.timezone || 'N/A' }
      ];

      details.forEach(function(item) {
        const cell = document.createElement('div');
        cell.className = 'bg-slate-50 rounded-lg p-3';

        const label = document.createElement('p');
        label.className = 'text-xs text-slate-400 mb-1';
        label.textContent = item.label;
        cell.appendChild(label);

        const val = document.createElement('p');
        val.className = 'text-sm font-medium text-slate-700';
        val.textContent = item.value;
        cell.appendChild(val);

        grid.appendChild(cell);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
