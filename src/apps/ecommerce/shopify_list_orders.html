<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopify Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-amber-50 via-white to-orange-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-amber-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <h2 class="text-lg font-semibold text-slate-800">Orders</h2>
        </div>
        <span id="order-count" class="text-xs text-slate-400"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No orders found</div>

      <div id="orders-grid" class="grid grid-cols-1 gap-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function financialStatusColor(status) {
      if (!status) return 'bg-slate-100 text-slate-600';
      const s = status.toLowerCase();
      if (s === 'paid') return 'bg-emerald-100 text-emerald-700';
      if (s === 'pending') return 'bg-amber-100 text-amber-700';
      if (s === 'refunded' || s === 'voided') return 'bg-red-100 text-red-700';
      if (s === 'partially_refunded') return 'bg-orange-100 text-orange-700';
      return 'bg-slate-100 text-slate-600';
    }

    function fulfillmentStatusColor(status) {
      if (!status) return 'bg-yellow-100 text-yellow-700';
      const s = status.toLowerCase();
      if (s === 'fulfilled') return 'bg-emerald-100 text-emerald-700';
      if (s === 'partial') return 'bg-amber-100 text-amber-700';
      return 'bg-yellow-100 text-yellow-700';
    }

    function renderCard(o) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg border border-amber-200 p-4 hover:border-amber-400 hover:shadow-sm transition-all';

      const header = document.createElement('div');
      header.className = 'flex items-center justify-between mb-2';
      const name = document.createElement('span');
      name.className = 'text-sm font-semibold text-slate-800';
      name.textContent = o.name || '#' + o.id;
      header.appendChild(name);

      const priceSpan = document.createElement('span');
      priceSpan.className = 'text-sm font-medium text-amber-700';
      priceSpan.textContent = o.total_price ? (o.currency || '$') + ' ' + o.total_price : '';
      header.appendChild(priceSpan);
      card.appendChild(header);

      if (o.email) {
        const email = document.createElement('p');
        email.className = 'text-xs text-slate-400 mb-2';
        email.textContent = o.email;
        card.appendChild(email);
      }

      const badges = document.createElement('div');
      badges.className = 'flex items-center gap-2 mt-2';

      if (o.financial_status) {
        const badge = document.createElement('span');
        badge.className = 'text-xs font-medium px-2 py-0.5 rounded-full ' + financialStatusColor(o.financial_status);
        badge.textContent = o.financial_status;
        badges.appendChild(badge);
      }

      const fulfillLabel = o.fulfillment_status || 'unfulfilled';
      const fBadge = document.createElement('span');
      fBadge.className = 'text-xs font-medium px-2 py-0.5 rounded-full ' + fulfillmentStatusColor(o.fulfillment_status);
      fBadge.textContent = fulfillLabel;
      badges.appendChild(fBadge);

      if (o.line_items_count > 0) {
        const itemsBadge = document.createElement('span');
        itemsBadge.className = 'text-xs text-slate-400';
        itemsBadge.textContent = o.line_items_count + ' item' + (o.line_items_count !== 1 ? 's' : '');
        badges.appendChild(itemsBadge);
      }

      card.appendChild(badges);
      return card;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const orders = data.orders || [];
      const count = data.count != null ? data.count : orders.length;
      document.getElementById('order-count').textContent = count + ' order' + (count !== 1 ? 's' : '');

      if (orders.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const grid = document.getElementById('orders-grid');
      grid.textContent = '';
      orders.forEach(o => grid.appendChild(renderCard(o)));
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
