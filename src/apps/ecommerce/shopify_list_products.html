<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopify Products</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-amber-50 via-white to-orange-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-amber-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <h2 class="text-lg font-semibold text-slate-800">Products</h2>
        </div>
        <span id="product-count" class="text-xs text-slate-400"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No products found</div>

      <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function statusColor(status) {
      if (!status) return 'bg-slate-100 text-slate-600';
      const s = status.toLowerCase();
      if (s === 'active') return 'bg-emerald-100 text-emerald-700';
      if (s === 'draft') return 'bg-amber-100 text-amber-700';
      if (s === 'archived') return 'bg-slate-100 text-slate-500';
      return 'bg-slate-100 text-slate-600';
    }

    function renderCard(p) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg border border-amber-200 p-4 hover:border-amber-400 hover:shadow-sm transition-all';

      const variants = p.variants || [];
      const variantCount = variants.length;
      const firstPrice = variantCount > 0 && variants[0].price ? variants[0].price : null;

      const header = document.createElement('div');
      header.className = 'flex items-start justify-between mb-2';
      const title = document.createElement('h3');
      title.className = 'text-sm font-semibold text-slate-800 leading-snug';
      title.textContent = p.title || '';
      header.appendChild(title);

      if (p.status) {
        const badge = document.createElement('span');
        badge.className = 'text-xs font-medium px-2 py-0.5 rounded-full shrink-0 ml-2 ' + statusColor(p.status);
        badge.textContent = p.status;
        header.appendChild(badge);
      }
      card.appendChild(header);

      if (p.vendor) {
        const vendor = document.createElement('p');
        vendor.className = 'text-xs text-slate-400 mb-2';
        vendor.textContent = p.vendor;
        card.appendChild(vendor);
      }

      const footer = document.createElement('div');
      footer.className = 'flex items-center justify-between mt-2';
      const priceSpan = document.createElement('span');
      if (firstPrice) {
        priceSpan.className = 'text-sm font-medium text-amber-700';
        priceSpan.textContent = '$' + firstPrice;
      }
      footer.appendChild(priceSpan);

      if (variantCount > 0) {
        const varSpan = document.createElement('span');
        varSpan.className = 'text-xs text-slate-400';
        varSpan.textContent = variantCount + ' variant' + (variantCount !== 1 ? 's' : '');
        footer.appendChild(varSpan);
      }
      card.appendChild(footer);

      return card;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const products = data.products || [];
      const count = data.count != null ? data.count : products.length;
      document.getElementById('product-count').textContent = count + ' product' + (count !== 1 ? 's' : '');

      if (products.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const grid = document.getElementById('products-grid');
      grid.textContent = '';
      products.forEach(p => grid.appendChild(renderCard(p)));
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
