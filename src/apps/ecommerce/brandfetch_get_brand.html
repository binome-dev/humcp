<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-amber-50 via-white to-orange-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-3 mb-2">
        <div id="logo-container" class="hidden w-12 h-12 rounded-lg border border-amber-200 bg-white items-center justify-center overflow-hidden shrink-0">
          <img id="logo-img" class="max-w-full max-h-full object-contain" alt="Brand logo" />
        </div>
        <div>
          <h2 id="brand-name" class="text-lg font-semibold text-slate-800"></h2>
          <p id="brand-domain" class="text-xs text-slate-400"></p>
        </div>
      </div>

      <div id="description-card" class="hidden bg-white rounded-xl border border-amber-200 p-5">
        <p class="text-xs text-slate-400 uppercase tracking-wide mb-2">About</p>
        <p id="description-text" class="text-sm text-slate-600 leading-relaxed"></p>
      </div>

      <div id="colors-card" class="hidden bg-white rounded-xl border border-amber-200 p-5">
        <p class="text-xs text-slate-400 uppercase tracking-wide mb-3">Brand Colors</p>
        <div id="colors-container" class="flex flex-wrap gap-3"></div>
      </div>

      <div id="logos-card" class="hidden bg-white rounded-xl border border-amber-200 p-5">
        <p class="text-xs text-slate-400 uppercase tracking-wide mb-3">Logos</p>
        <div id="logos-container" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
      </div>

      <div id="links-card" class="hidden bg-white rounded-xl border border-amber-200 p-5">
        <p class="text-xs text-slate-400 uppercase tracking-wide mb-2">Links</p>
        <div id="links-container" class="flex flex-wrap gap-2"></div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function getLogoUrl(logo) {
      if (!logo) return null;
      const formats = logo.formats || [];
      for (const fmt of formats) {
        if (fmt.src) return fmt.src;
        if (fmt.url) return fmt.url;
      }
      if (logo.url) return logo.url;
      return null;
    }

    function createColorSwatch(c) {
      const hex = c.hex || '#ccc';
      const wrapper = document.createElement('div');
      wrapper.className = 'flex items-center gap-2';

      const swatch = document.createElement('div');
      swatch.className = 'w-8 h-8 rounded-lg border border-slate-200 shrink-0';
      swatch.style.backgroundColor = hex;
      wrapper.appendChild(swatch);

      const info = document.createElement('div');
      const hexLabel = document.createElement('p');
      hexLabel.className = 'text-xs font-mono text-slate-600';
      hexLabel.textContent = hex;
      info.appendChild(hexLabel);

      if (c.type) {
        const typeLabel = document.createElement('p');
        typeLabel.className = 'text-xs text-slate-400';
        typeLabel.textContent = c.type;
        info.appendChild(typeLabel);
      }
      wrapper.appendChild(info);
      return wrapper;
    }

    function createLogoCard(logo) {
      const url = getLogoUrl(logo);
      if (!url) return null;
      const label = [logo.type, logo.theme].filter(Boolean).join(' - ') || 'Logo';

      const card = document.createElement('div');
      card.className = 'bg-slate-50 rounded-lg border border-slate-200 p-3 flex flex-col items-center gap-2';

      const img = document.createElement('img');
      img.src = url;
      img.alt = label;
      img.className = 'max-h-12 max-w-full object-contain';
      card.appendChild(img);

      const span = document.createElement('span');
      span.className = 'text-xs text-slate-400';
      span.textContent = label;
      card.appendChild(span);

      return card;
    }

    function createLinkPill(link) {
      const url = link.url || link.href || '';
      const name = link.name || link.type || url;

      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = 'inline-flex items-center px-3 py-1.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700 hover:bg-amber-200 transition-colors';
      a.textContent = name;
      return a;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('brand-name').textContent = data.name || data.domain || '';
      document.getElementById('brand-domain').textContent = data.domain || '';

      const logos = data.logos || [];
      const firstLogoUrl = logos.length > 0 ? getLogoUrl(logos[0]) : null;
      if (firstLogoUrl) {
        const container = document.getElementById('logo-container');
        container.classList.remove('hidden');
        container.classList.add('flex');
        document.getElementById('logo-img').src = firstLogoUrl;
      }

      const desc = data.description || data.long_description;
      if (desc) {
        document.getElementById('description-card').classList.remove('hidden');
        document.getElementById('description-text').textContent = desc;
      }

      const colors = data.colors || [];
      if (colors.length > 0) {
        document.getElementById('colors-card').classList.remove('hidden');
        const container = document.getElementById('colors-container');
        container.textContent = '';
        colors.forEach(c => container.appendChild(createColorSwatch(c)));
      }

      if (logos.length > 0) {
        document.getElementById('logos-card').classList.remove('hidden');
        const container = document.getElementById('logos-container');
        container.textContent = '';
        logos.forEach(logo => {
          const card = createLogoCard(logo);
          if (card) container.appendChild(card);
        });
      }

      const links = data.links || [];
      if (links.length > 0) {
        document.getElementById('links-card').classList.remove('hidden');
        const container = document.getElementById('links-container');
        container.textContent = '';
        links.forEach(link => container.appendChild(createLinkPill(link)));
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
