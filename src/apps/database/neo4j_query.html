<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo4j Query Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/></svg>
          <h2 class="text-sm font-semibold text-slate-700">Neo4j Cypher Results</h2>
        </div>
        <span id="record-count" class="text-xs text-slate-400"></span>
      </div>

      <div id="query-display" class="bg-slate-800 rounded-lg p-3 overflow-x-auto">
        <code id="query-text" class="text-xs text-emerald-400 font-mono whitespace-pre-wrap"></code>
      </div>

      <div id="table-wrapper" class="border border-slate-200 rounded-lg overflow-x-auto">
        <table id="data-table" class="w-full text-sm">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No records returned</div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function formatValue(val) {
      if (val === null || val === undefined) return escapeHtml('null');
      if (typeof val === 'object') return escapeHtml(JSON.stringify(val));
      return escapeHtml(val);
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-text').textContent = data.query || '';
      const count = data.record_count != null ? data.record_count : (data.records || []).length;
      document.getElementById('record-count').textContent = count + ' record' + (count !== 1 ? 's' : '');

      const records = data.records || [];

      if (records.length === 0) {
        document.getElementById('table-wrapper').classList.add('hidden');
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const columns = [...new Set(records.flatMap(r => Object.keys(r)))];

      const thead = document.getElementById('table-head');
      thead.innerHTML = '<tr class="bg-slate-50 border-b border-slate-200">' +
        columns.map(col => '<th class="text-left px-4 py-2 font-medium text-slate-600 whitespace-nowrap">' + escapeHtml(col) + '</th>').join('') +
        '</tr>';

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = records.map(record =>
        '<tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50">' +
        columns.map(col => '<td class="px-4 py-2 text-slate-700 whitespace-nowrap">' + formatValue(record[col]) + '</td>').join('') +
        '</tr>'
      ).join('');
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
