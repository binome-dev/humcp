<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuckDB Read File</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { margin: 0; font-family: system-ui, -apple-system, sans-serif; } table { border-collapse: collapse; }</style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>
    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-yellow-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <h2 id="file-header" class="text-lg font-semibold text-slate-800"></h2>
        </div>
        <span id="row-count" class="text-xs text-slate-400"></span>
      </div>
      <div class="overflow-x-auto rounded-lg border border-slate-200">
        <table class="min-w-full text-sm">
          <thead id="table-head" class="bg-slate-50"></thead>
          <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>
    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>
  <script type="module">
    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const fp = data.file_path || '';
      document.getElementById('file-header').textContent = fp.split('/').pop() || fp;
      document.getElementById('row-count').textContent = (data.row_count || 0) + ' rows';

      const cols = data.columns || [];
      const rows = data.rows || [];

      const thead = document.getElementById('table-head');
      thead.replaceChildren();
      const headRow = document.createElement('tr');
      cols.forEach(c => {
        const th = document.createElement('th');
        th.className = 'px-3 py-2 text-left text-xs font-medium text-slate-500 uppercase tracking-wider whitespace-nowrap';
        th.textContent = c;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);

      const tbody = document.getElementById('table-body');
      tbody.replaceChildren();
      if (rows.length === 0) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = Math.max(cols.length, 1);
        td.className = 'text-center py-8 text-slate-400 text-sm';
        td.textContent = 'No data';
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }
      rows.forEach((row, i) => {
        const tr = document.createElement('tr');
        tr.className = i % 2 === 0 ? 'bg-white' : 'bg-slate-50/50';
        cols.forEach(c => {
          const td = document.createElement('td');
          td.className = 'px-3 py-2 text-slate-700 max-w-xs truncate whitespace-nowrap';
          td.textContent = String(row[c] ?? '');
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function renderError(m) { document.getElementById('loading').classList.add('hidden'); document.getElementById('result').classList.add('hidden'); const el = document.getElementById('error'); el.classList.remove('hidden'); el.textContent = m; }
    function parseToolResult(r) { if (r && r.content) { for (const i of r.content) { if (i.type === 'text' && i.text) { try { return JSON.parse(i.text); } catch { return { raw: i.text }; } } } } if (r && r.data) return r; return r; }
    function handleToolResult(r) { const p = parseToolResult(r); if (p && p.success === false) { renderError(p.error || 'Failed'); return; } const d = p?.data || p; if (d) render(d); else renderError('Unexpected data format'); }
    window.addEventListener('message', e => { const m = e.data; if (!m || typeof m !== 'object') return; if (m.jsonrpc === '2.0') { if (m.method === 'ui/initialize') { window.parent.postMessage({ jsonrpc: '2.0', id: m.id, result: { protocolVersion: '0.1.0', capabilities: {} } }, '*'); } else if (m.method === 'ui/toolResult') handleToolResult(m.params); } if (m.type === 'toolResult') handleToolResult(m.data); });
    window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/ready', params: {} }, '*');
  </script>
</body>
</html>
