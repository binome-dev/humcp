<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Object Metadata</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-teal-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <h2 class="text-sm font-semibold text-slate-700">Object Metadata</h2>
      </div>

      <div id="object-path" class="text-xs text-slate-400 font-mono"></div>

      <div class="border border-slate-200 rounded-lg overflow-hidden">
        <table class="w-full text-sm">
          <tbody id="metadata-body"></tbody>
        </table>
      </div>

      <div id="custom-metadata-section" class="hidden space-y-2">
        <h3 class="text-xs font-medium text-slate-500 uppercase tracking-wider">Custom Metadata</h3>
        <div class="border border-slate-200 rounded-lg overflow-hidden">
          <table class="w-full text-sm">
            <tbody id="custom-metadata-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function formatSize(bytes) {
      if (bytes == null) return '-';
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function formatDate(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit',
      });
    }

    function metaRow(label, value) {
      return '<tr class="border-b border-slate-100 last:border-0">' +
        '<td class="px-4 py-2.5 text-slate-500 font-medium w-40">' + escapeHtml(label) + '</td>' +
        '<td class="px-4 py-2.5 text-slate-800 font-mono text-sm">' + escapeHtml(value) + '</td>' +
      '</tr>';
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('object-path').textContent = (data.bucket || '') + '/' + (data.object_name || '');

      const tbody = document.getElementById('metadata-body');
      let rows = '';
      rows += metaRow('Bucket', data.bucket || '-');
      rows += metaRow('Object', data.object_name || '-');
      rows += metaRow('Size', formatSize(data.size));
      rows += metaRow('Content Type', data.content_type || '-');
      rows += metaRow('Last Modified', formatDate(data.last_modified));
      rows += metaRow('ETag', data.etag || '-');
      if (data.version_id) {
        rows += metaRow('Version ID', data.version_id);
      }
      tbody.innerHTML = rows;

      const customMeta = data.metadata || {};
      const customKeys = Object.keys(customMeta);
      if (customKeys.length > 0) {
        document.getElementById('custom-metadata-section').classList.remove('hidden');
        const customBody = document.getElementById('custom-metadata-body');
        customBody.innerHTML = customKeys.map(key =>
          metaRow(key, customMeta[key])
        ).join('');
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
