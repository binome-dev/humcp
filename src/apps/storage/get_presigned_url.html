<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presigned URL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 text-sm">
        <svg class="w-5 h-5 text-teal-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <span class="text-slate-500">Presigned URL for</span>
        <span id="object-path" class="font-medium text-slate-700"></span>
      </div>

      <div class="bg-slate-50 rounded-lg border border-slate-200 p-4">
        <div class="flex items-start gap-3">
          <div class="flex-1 min-w-0">
            <p class="text-xs text-slate-400 mb-1">Download URL</p>
            <p id="url-text" class="text-sm text-slate-700 break-all font-mono"></p>
          </div>
          <button id="copy-btn" class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg bg-teal-100 text-teal-700 hover:bg-teal-200 transition-colors flex-shrink-0">
            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span id="copy-text">Copy</span>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-2 text-sm text-amber-600 bg-amber-50 rounded-lg px-3 py-2">
        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="expiry-text"></span>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('object-path').textContent = (data.bucket || '') + '/' + (data.object_name || '');
      document.getElementById('url-text').textContent = data.url || '';

      const hours = data.expires_in_hours || 1;
      document.getElementById('expiry-text').textContent = 'Expires in ' + hours + ' hour' + (hours !== 1 ? 's' : '');

      const url = data.url || '';
      const copyBtn = document.getElementById('copy-btn');

      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(url);
          document.getElementById('copy-text').textContent = 'Copied!';
          copyBtn.classList.remove('bg-teal-100', 'text-teal-700', 'hover:bg-teal-200');
          copyBtn.classList.add('bg-emerald-100', 'text-emerald-700');
          setTimeout(() => {
            document.getElementById('copy-text').textContent = 'Copy';
            copyBtn.classList.remove('bg-emerald-100', 'text-emerald-700');
            copyBtn.classList.add('bg-teal-100', 'text-teal-700', 'hover:bg-teal-200');
          }, 2000);
        } catch (err) {
          // Clipboard API may not be available in iframe
        }
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
