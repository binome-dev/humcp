<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Current Weather</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-sky-50 via-white to-sky-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div id="weather-detail"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getUnitSymbol(units) {
      if (units === 'imperial') return '\u00b0F';
      if (units === 'standard') return 'K';
      return '\u00b0C';
    }

    function getSpeedUnit(units) {
      if (units === 'imperial') return 'mph';
      return 'm/s';
    }

    function getWeatherEmoji(conditions) {
      if (!conditions || conditions.length === 0) return '\u2601';
      const main = conditions[0].main.toLowerCase();
      if (main.includes('clear')) return '\u2600';
      if (main.includes('cloud')) return '\u2601';
      if (main.includes('rain') || main.includes('drizzle')) return '\ud83c\udf27';
      if (main.includes('thunder')) return '\u26c8';
      if (main.includes('snow')) return '\u2744';
      if (main.includes('mist') || main.includes('fog') || main.includes('haze')) return '\ud83c\udf2b';
      return '\u2601';
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const container = document.getElementById('weather-detail');
      container.replaceChildren();

      const unitSym = getUnitSymbol(data.units);
      const speedUnit = getSpeedUnit(data.units);
      const emoji = getWeatherEmoji(data.conditions);

      const card = document.createElement('div');
      card.className = 'bg-white rounded-xl border border-slate-200 overflow-hidden max-w-md';

      // Header
      const header = document.createElement('div');
      header.className = 'bg-gradient-to-r from-sky-400 to-blue-500 px-5 py-4';

      const cityRow = document.createElement('div');
      cityRow.className = 'flex items-center justify-between';

      const cityName = document.createElement('div');
      const cityLabel = document.createElement('h2');
      cityLabel.className = 'text-xl font-bold text-white';
      cityLabel.textContent = (data.city || '') + (data.country ? ', ' + data.country : '');
      cityName.appendChild(cityLabel);

      if (data.conditions && data.conditions.length > 0) {
        const desc = document.createElement('p');
        desc.className = 'text-sm text-sky-100 capitalize';
        desc.textContent = data.conditions[0].description;
        cityName.appendChild(desc);
      }

      const emojiSpan = document.createElement('span');
      emojiSpan.className = 'text-4xl';
      emojiSpan.textContent = emoji;

      cityRow.appendChild(cityName);
      cityRow.appendChild(emojiSpan);
      header.appendChild(cityRow);

      // Temperature display
      const tempSection = document.createElement('div');
      tempSection.className = 'px-5 py-5 text-center border-b border-slate-100';

      const tempValue = document.createElement('div');
      tempValue.className = 'text-5xl font-bold text-slate-800';
      tempValue.textContent = Math.round(data.temperature) + unitSym;

      const feelsLike = document.createElement('div');
      feelsLike.className = 'text-sm text-slate-400 mt-1';
      feelsLike.textContent = 'Feels like ' + Math.round(data.feels_like) + unitSym;

      const minMax = document.createElement('div');
      minMax.className = 'text-xs text-slate-400 mt-1';
      minMax.textContent = 'Low ' + Math.round(data.temp_min) + unitSym + ' / High ' + Math.round(data.temp_max) + unitSym;

      tempSection.appendChild(tempValue);
      tempSection.appendChild(feelsLike);
      tempSection.appendChild(minMax);

      // Details grid
      const detailsGrid = document.createElement('div');
      detailsGrid.className = 'grid grid-cols-2 gap-px bg-slate-100';

      const details = [
        { label: 'Humidity', value: data.humidity + '%' },
        { label: 'Wind', value: data.wind_speed + ' ' + speedUnit },
        { label: 'Pressure', value: data.pressure + ' hPa' },
        { label: 'Clouds', value: (data.clouds != null ? data.clouds + '%' : '--') }
      ];

      if (data.visibility != null) {
        details.push({ label: 'Visibility', value: (data.visibility / 1000).toFixed(1) + ' km' });
      }
      if (data.wind_deg != null) {
        details.push({ label: 'Wind Dir', value: data.wind_deg + '\u00b0' });
      }

      details.forEach(function(detail) {
        const cell = document.createElement('div');
        cell.className = 'bg-white p-3 text-center';
        const valSpan = document.createElement('div');
        valSpan.className = 'text-sm font-semibold text-slate-700';
        valSpan.textContent = detail.value;
        const labelSpan = document.createElement('div');
        labelSpan.className = 'text-xs text-slate-400';
        labelSpan.textContent = detail.label;
        cell.appendChild(valSpan);
        cell.appendChild(labelSpan);
        detailsGrid.appendChild(cell);
      });

      card.appendChild(header);
      card.appendChild(tempSection);
      card.appendChild(detailsGrid);
      container.appendChild(card);
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
