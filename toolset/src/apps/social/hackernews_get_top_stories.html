<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacker News Top Stories</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-orange-50 via-white to-amber-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-orange-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Hacker News Top Stories</h2>
      </div>
      <div id="results-container" class="space-y-1"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTimestamp(ts) {
      if (!ts) return '';
      try {
        const d = new Date(ts * 1000);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      } catch { return ''; }
    }

    function createStoryRow(story, index) {
      const row = document.createElement('div');
      row.className = 'flex items-start gap-3 bg-white rounded-lg border border-slate-200 px-4 py-3 hover:border-orange-300 hover:shadow-sm transition-all';

      const rank = document.createElement('span');
      rank.className = 'text-sm font-bold text-slate-300 min-w-[24px] pt-0.5';
      rank.textContent = String(index + 1) + '.';

      const content = document.createElement('div');
      content.className = 'flex-1 min-w-0';

      const titleRow = document.createElement('div');
      titleRow.className = 'flex items-baseline gap-2';

      const titleLink = document.createElement('a');
      titleLink.href = story.url || 'https://news.ycombinator.com/item?id=' + story.id;
      titleLink.target = '_blank';
      titleLink.rel = 'noopener noreferrer';
      titleLink.className = 'text-sm font-semibold text-slate-800 hover:text-orange-700 hover:underline leading-snug';
      titleLink.textContent = story.title || '';

      if (story.url) {
        const domain = document.createElement('span');
        domain.className = 'text-xs text-slate-400 flex-shrink-0';
        try {
          domain.textContent = '(' + new URL(story.url).hostname.replace('www.', '') + ')';
        } catch {
          domain.textContent = '';
        }
        titleRow.appendChild(titleLink);
        titleRow.appendChild(domain);
      } else {
        titleRow.appendChild(titleLink);
      }

      const meta = document.createElement('div');
      meta.className = 'flex items-center gap-2 mt-1 text-xs text-slate-400';

      const scoreBadge = document.createElement('span');
      scoreBadge.className = 'font-medium text-orange-600';
      scoreBadge.textContent = String(story.score || 0) + ' points';

      const authorSpan = document.createElement('span');
      authorSpan.textContent = 'by ' + (story.by || '');

      const dateSpan = document.createElement('span');
      dateSpan.textContent = formatTimestamp(story.time);

      const commentsLink = document.createElement('a');
      commentsLink.href = 'https://news.ycombinator.com/item?id=' + story.id;
      commentsLink.target = '_blank';
      commentsLink.rel = 'noopener noreferrer';
      commentsLink.className = 'hover:text-orange-600';
      commentsLink.textContent = String(story.descendants || 0) + ' comments';

      meta.appendChild(scoreBadge);
      meta.appendChild(authorSpan);
      if (story.time) meta.appendChild(dateSpan);
      meta.appendChild(commentsLink);

      content.appendChild(titleRow);
      content.appendChild(meta);

      row.appendChild(rank);
      row.appendChild(content);

      return row;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const container = document.getElementById('results-container');
      container.replaceChildren();

      const stories = data.stories || [];
      stories.forEach(function(story, index) {
        container.appendChild(createStoryRow(story, index));
      });

      if (stories.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No stories found';
        container.appendChild(empty);
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
