<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Search Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-orange-50 via-white to-amber-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-orange-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>
      <div id="results-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch { return dateStr; }
    }

    function createVideoCard(video) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg border border-slate-200 overflow-hidden hover:border-orange-300 hover:shadow-sm transition-all';

      const videoUrl = 'https://www.youtube.com/watch?v=' + (video.video_id || '');

      // Thumbnail area
      const thumbContainer = document.createElement('div');
      thumbContainer.className = 'relative bg-slate-100 aspect-video flex items-center justify-center';

      if (video.thumbnail_url) {
        const thumb = document.createElement('img');
        thumb.src = video.thumbnail_url;
        thumb.alt = video.title || '';
        thumb.className = 'w-full h-full object-cover';
        thumb.onerror = function() {
          this.style.display = 'none';
          const placeholder = document.createElement('div');
          placeholder.className = 'absolute inset-0 flex items-center justify-center text-slate-300';
          placeholder.textContent = '\u25b6';
          this.parentNode.appendChild(placeholder);
        };
        thumbContainer.appendChild(thumb);
      } else {
        const placeholder = document.createElement('div');
        placeholder.className = 'text-4xl text-slate-300';
        placeholder.textContent = '\u25b6';
        thumbContainer.appendChild(placeholder);
      }

      // Info section
      const info = document.createElement('div');
      info.className = 'p-3 space-y-1';

      const titleLink = document.createElement('a');
      titleLink.href = videoUrl;
      titleLink.target = '_blank';
      titleLink.rel = 'noopener noreferrer';
      titleLink.className = 'text-sm font-semibold text-slate-800 hover:text-orange-700 hover:underline leading-snug block line-clamp-2';
      titleLink.textContent = video.title || '';

      info.appendChild(titleLink);

      if (video.channel_title) {
        const channel = document.createElement('p');
        channel.className = 'text-xs text-slate-500 font-medium';
        channel.textContent = video.channel_title;
        info.appendChild(channel);
      }

      const meta = document.createElement('div');
      meta.className = 'flex items-center gap-2 text-xs text-slate-400';
      if (video.published_at) {
        const dateSpan = document.createElement('span');
        dateSpan.textContent = formatDate(video.published_at);
        meta.appendChild(dateSpan);
      }
      if (meta.childNodes.length > 0) {
        info.appendChild(meta);
      }

      if (video.description) {
        const desc = document.createElement('p');
        desc.className = 'text-xs text-slate-400 line-clamp-2 mt-1';
        desc.textContent = video.description;
        info.appendChild(desc);
      }

      card.appendChild(thumbContainer);
      card.appendChild(info);

      return card;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-header').textContent = 'Videos for "' + (data.query || '') + '"';

      const container = document.getElementById('results-container');
      container.replaceChildren();

      const videos = data.results || [];
      videos.forEach(function(video) {
        container.appendChild(createVideoCard(video));
      });

      if (videos.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm col-span-2';
        empty.textContent = 'No videos found';
        container.appendChild(empty);
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
