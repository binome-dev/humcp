<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Captions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-orange-50 via-white to-amber-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div id="captions-detail"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const container = document.getElementById('captions-detail');
      container.replaceChildren();

      const videoUrl = 'https://www.youtube.com/watch?v=' + (data.video_id || '');

      const card = document.createElement('div');
      card.className = 'bg-white rounded-xl border border-slate-200 overflow-hidden';

      // Header
      const header = document.createElement('div');
      header.className = 'bg-gradient-to-r from-orange-500 to-amber-500 px-5 py-3 flex items-center justify-between';

      const headerLeft = document.createElement('div');
      headerLeft.className = 'flex items-center gap-2';
      const headerIcon = document.createElement('span');
      headerIcon.className = 'text-white text-sm';
      headerIcon.textContent = '\u25b6';
      const headerLabel = document.createElement('span');
      headerLabel.className = 'text-white text-sm font-medium';
      headerLabel.textContent = 'Video Transcript';
      headerLeft.appendChild(headerIcon);
      headerLeft.appendChild(headerLabel);

      header.appendChild(headerLeft);

      if (data.video_id) {
        const videoLink = document.createElement('a');
        videoLink.href = videoUrl;
        videoLink.target = '_blank';
        videoLink.rel = 'noopener noreferrer';
        videoLink.className = 'text-white text-xs opacity-80 hover:opacity-100 hover:underline';
        videoLink.textContent = 'Watch Video';
        header.appendChild(videoLink);
      }

      // Body
      const body = document.createElement('div');
      body.className = 'p-5 space-y-3';

      const metaRow = document.createElement('div');
      metaRow.className = 'flex items-center gap-3 text-xs text-slate-400';

      const idSpan = document.createElement('span');
      idSpan.textContent = 'Video ID: ' + (data.video_id || '');
      metaRow.appendChild(idSpan);

      body.appendChild(metaRow);

      const captionsText = data.captions || '';
      if (captionsText) {
        const textBlock = document.createElement('div');
        textBlock.className = 'bg-slate-50 rounded-lg p-4 text-sm text-slate-700 leading-relaxed whitespace-pre-wrap max-h-96 overflow-y-auto';
        textBlock.textContent = captionsText;
        body.appendChild(textBlock);

        const charCount = document.createElement('div');
        charCount.className = 'text-xs text-slate-400 text-right';
        charCount.textContent = captionsText.length.toLocaleString() + ' characters';
        body.appendChild(charCount);
      } else {
        const empty = document.createElement('div');
        empty.className = 'text-center py-4 text-slate-400 text-sm';
        empty.textContent = 'No captions available';
        body.appendChild(empty);
      }

      card.appendChild(header);
      card.appendChild(body);
      container.appendChild(card);
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
