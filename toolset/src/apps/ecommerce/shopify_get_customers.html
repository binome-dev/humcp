<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopify Customers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-amber-50 via-white to-orange-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-amber-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <h2 class="text-lg font-semibold text-slate-800">Customers</h2>
        </div>
        <span id="customer-count" class="text-xs text-slate-400"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No customers found</div>

      <div id="customers-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function stateColor(state) {
      if (!state) return 'bg-slate-100 text-slate-600';
      const s = state.toLowerCase();
      if (s === 'enabled') return 'bg-emerald-100 text-emerald-700';
      if (s === 'disabled') return 'bg-red-100 text-red-700';
      if (s === 'invited') return 'bg-amber-100 text-amber-700';
      return 'bg-slate-100 text-slate-600';
    }

    function renderCard(c) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg border border-amber-200 p-4 hover:border-amber-400 hover:shadow-sm transition-all';

      const header = document.createElement('div');
      header.className = 'flex items-start justify-between mb-2';

      const nameDiv = document.createElement('div');
      const name = document.createElement('h3');
      name.className = 'text-sm font-semibold text-slate-800';
      const fullName = [c.first_name, c.last_name].filter(Boolean).join(' ') || 'Unknown';
      name.textContent = fullName;
      nameDiv.appendChild(name);

      if (c.email) {
        const email = document.createElement('p');
        email.className = 'text-xs text-slate-400';
        email.textContent = c.email;
        nameDiv.appendChild(email);
      }
      header.appendChild(nameDiv);

      if (c.state) {
        const badge = document.createElement('span');
        badge.className = 'text-xs font-medium px-2 py-0.5 rounded-full shrink-0 ml-2 ' + stateColor(c.state);
        badge.textContent = c.state;
        header.appendChild(badge);
      }
      card.appendChild(header);

      const footer = document.createElement('div');
      footer.className = 'flex items-center justify-between mt-3 pt-2 border-t border-slate-100';

      if (c.orders_count != null) {
        const orders = document.createElement('span');
        orders.className = 'text-xs text-slate-500';
        orders.textContent = c.orders_count + ' order' + (c.orders_count !== 1 ? 's' : '');
        footer.appendChild(orders);
      }

      if (c.total_spent) {
        const spent = document.createElement('span');
        spent.className = 'text-sm font-medium text-amber-700';
        spent.textContent = '$' + c.total_spent;
        footer.appendChild(spent);
      }

      card.appendChild(footer);
      return card;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const customers = data.customers || [];
      const count = data.count != null ? data.count : customers.length;
      document.getElementById('customer-count').textContent = count + ' customer' + (count !== 1 ? 's' : '');

      if (customers.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const grid = document.getElementById('customers-grid');
      grid.textContent = '';
      customers.forEach(c => grid.appendChild(renderCard(c)));
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
