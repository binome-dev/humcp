<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-amber-50 via-white to-orange-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-amber-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <h2 id="product-title" class="text-lg font-semibold text-slate-800"></h2>
        <span id="status-badge" class="text-xs font-medium px-2 py-0.5 rounded-full"></span>
      </div>

      <div class="bg-white rounded-xl border border-amber-200 p-5 space-y-3">
        <div id="vendor-row" class="hidden flex items-center gap-3">
          <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0">Vendor</span>
          <span id="vendor-value" class="text-sm text-slate-700"></span>
        </div>
        <div id="type-row" class="hidden flex items-center gap-3">
          <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0">Type</span>
          <span id="type-value" class="text-sm text-slate-700"></span>
        </div>
        <div id="created-row" class="hidden flex items-center gap-3">
          <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0">Created</span>
          <span id="created-value" class="text-sm text-slate-600"></span>
        </div>
        <div id="updated-row" class="hidden flex items-center gap-3">
          <span class="text-xs text-slate-400 uppercase tracking-wide w-28 shrink-0">Updated</span>
          <span id="updated-value" class="text-sm text-slate-600"></span>
        </div>
      </div>

      <div id="description-card" class="hidden bg-white rounded-xl border border-amber-200 p-5">
        <p class="text-xs text-slate-400 uppercase tracking-wide mb-2">Description</p>
        <div id="description-text" class="text-sm text-slate-600 leading-relaxed"></div>
      </div>

      <div id="variants-card" class="hidden">
        <p class="text-xs text-slate-400 uppercase tracking-wide mb-2">Variants</p>
        <div class="border border-amber-200 rounded-lg overflow-hidden">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-amber-50 border-b border-amber-200">
                <th class="text-left px-4 py-2 font-medium text-amber-700">Title</th>
                <th class="text-left px-4 py-2 font-medium text-amber-700">SKU</th>
                <th class="text-right px-4 py-2 font-medium text-amber-700">Price</th>
                <th class="text-right px-4 py-2 font-medium text-amber-700">Inventory</th>
              </tr>
            </thead>
            <tbody id="variants-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.textContent = html;
      return tmp.textContent || '';
    }

    function statusColor(status) {
      if (!status) return 'bg-slate-100 text-slate-600';
      const s = status.toLowerCase();
      if (s === 'active') return 'bg-emerald-100 text-emerald-700';
      if (s === 'draft') return 'bg-amber-100 text-amber-700';
      if (s === 'archived') return 'bg-slate-100 text-slate-500';
      return 'bg-slate-100 text-slate-600';
    }

    function formatDate(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    function showRow(rowId, valueId, value, formatter) {
      if (value == null) return;
      document.getElementById(rowId).classList.remove('hidden');
      document.getElementById(rowId).classList.add('flex');
      document.getElementById(valueId).textContent = formatter ? formatter(value) : String(value);
    }

    function createVariantRow(v) {
      const tr = document.createElement('tr');
      tr.className = 'border-b border-amber-100 last:border-0 hover:bg-amber-50/50';

      const tdTitle = document.createElement('td');
      tdTitle.className = 'px-4 py-2 text-slate-700';
      tdTitle.textContent = v.title || '-';
      tr.appendChild(tdTitle);

      const tdSku = document.createElement('td');
      tdSku.className = 'px-4 py-2 text-slate-500 font-mono text-xs';
      tdSku.textContent = v.sku || '-';
      tr.appendChild(tdSku);

      const tdPrice = document.createElement('td');
      tdPrice.className = 'px-4 py-2 text-right font-medium text-amber-700';
      tdPrice.textContent = v.price ? '$' + v.price : '-';
      tr.appendChild(tdPrice);

      const tdInv = document.createElement('td');
      tdInv.className = 'px-4 py-2 text-right text-slate-600';
      tdInv.textContent = v.inventory_quantity != null ? String(v.inventory_quantity) : '-';
      tr.appendChild(tdInv);

      return tr;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const product = data.product || data;

      document.getElementById('product-title').textContent = product.title || '';

      const badge = document.getElementById('status-badge');
      if (product.status) {
        badge.textContent = product.status;
        badge.className = 'text-xs font-medium px-2 py-0.5 rounded-full ' + statusColor(product.status);
      } else {
        badge.classList.add('hidden');
      }

      showRow('vendor-row', 'vendor-value', product.vendor);
      showRow('type-row', 'type-value', product.product_type);
      showRow('created-row', 'created-value', product.created_at, formatDate);
      showRow('updated-row', 'updated-value', product.updated_at, formatDate);

      if (product.body_html) {
        document.getElementById('description-card').classList.remove('hidden');
        document.getElementById('description-text').textContent = stripHtml(product.body_html);
      }

      const variants = product.variants || [];
      if (variants.length > 0) {
        document.getElementById('variants-card').classList.remove('hidden');
        const tbody = document.getElementById('variants-body');
        tbody.textContent = '';
        variants.forEach(v => tbody.appendChild(createVariantRow(v)));
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
