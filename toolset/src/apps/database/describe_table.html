<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table Structure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          <h2 class="text-sm font-semibold text-slate-700">Table: <span id="table-name" class="font-mono text-indigo-700"></span></h2>
        </div>
        <span id="col-count" class="text-xs text-slate-400"></span>
      </div>

      <div id="table-wrapper" class="border border-slate-200 rounded-lg overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
              <th class="text-left px-4 py-2 font-medium text-slate-600">Column Name</th>
              <th class="text-left px-4 py-2 font-medium text-slate-600">Data Type</th>
              <th class="text-center px-4 py-2 font-medium text-slate-600">Nullable</th>
              <th class="text-left px-4 py-2 font-medium text-slate-600">Default</th>
              <th class="text-right px-4 py-2 font-medium text-slate-600">Max Length</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('table-name').textContent = data.table_name || '';
      const columns = data.columns || [];
      const colCount = data.column_count != null ? data.column_count : columns.length;
      document.getElementById('col-count').textContent = colCount + ' column' + (colCount !== 1 ? 's' : '');

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = columns.map(col => {
        const nullable = col.is_nullable === 'YES' || col.is_nullable === true;
        return '<tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50">' +
          '<td class="px-4 py-2 font-mono text-sm text-slate-800">' + escapeHtml(col.column_name) + '</td>' +
          '<td class="px-4 py-2">' +
            '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-indigo-50 text-indigo-700">' + escapeHtml(col.data_type) + '</span>' +
          '</td>' +
          '<td class="px-4 py-2 text-center">' +
            (nullable
              ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-50 text-amber-600">NULL</span>'
              : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-500">NOT NULL</span>') +
          '</td>' +
          '<td class="px-4 py-2 text-sm text-slate-500 font-mono">' + (col.column_default != null ? escapeHtml(col.column_default) : '<span class="text-slate-300">-</span>') + '</td>' +
          '<td class="px-4 py-2 text-right text-sm text-slate-500">' + (col.character_maximum_length != null ? escapeHtml(col.character_maximum_length) : '<span class="text-slate-300">-</span>') + '</td>' +
        '</tr>';
      }).join('');
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
