<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Search Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-cyan-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
      </div>

      <div id="results-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-header').textContent = 'Memories matching \u201c' + (data.query || '') + '\u201d';

      const container = document.getElementById('results-container');
      while (container.firstChild) container.removeChild(container.firstChild);

      const results = data.results || [];
      results.forEach(function(item) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-cyan-300 hover:shadow-sm transition-all';

        const headerRow = document.createElement('div');
        headerRow.className = 'flex items-start justify-between gap-3 mb-2';

        const contentEl = document.createElement('p');
        contentEl.className = 'text-sm text-slate-700 leading-relaxed flex-1';
        contentEl.textContent = item.memory || item.content || '';
        headerRow.appendChild(contentEl);

        if (item.score != null) {
          const scorePercent = Math.round(item.score * 100);
          const scoreBadge = document.createElement('span');
          scoreBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium flex-shrink-0 ' +
            (scorePercent >= 80 ? 'bg-emerald-100 text-emerald-700' : scorePercent >= 50 ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600');
          scoreBadge.textContent = scorePercent + '%';
          headerRow.appendChild(scoreBadge);
        }

        card.appendChild(headerRow);

        const metaRow = document.createElement('div');
        metaRow.className = 'flex items-center gap-3';

        if (item.id) {
          const idEl = document.createElement('span');
          idEl.className = 'text-xs text-slate-400';
          idEl.textContent = 'ID: ' + item.id;
          metaRow.appendChild(idEl);
        }

        if (item.metadata && Object.keys(item.metadata).length > 0) {
          const metaEl = document.createElement('span');
          metaEl.className = 'text-xs text-cyan-500';
          metaEl.textContent = Object.keys(item.metadata).join(', ');
          metaRow.appendChild(metaEl);
        }

        if (metaRow.childNodes.length > 0) {
          card.appendChild(metaRow);
        }

        container.appendChild(card);
      });

      if (results.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No matching memories found';
        container.appendChild(empty);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
