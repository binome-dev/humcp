<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zep Session Info</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4"></div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const container = document.getElementById('result');
      while (container.firstChild) container.removeChild(container.firstChild);

      const headerRow = document.createElement('div');
      headerRow.className = 'flex items-center gap-2 mb-2';

      const titleEl = document.createElement('h2');
      titleEl.className = 'text-lg font-semibold text-slate-800';
      titleEl.textContent = 'Zep Session';
      headerRow.appendChild(titleEl);

      container.appendChild(headerRow);

      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg border border-slate-200 p-4 space-y-3';

      const sessionRow = document.createElement('div');
      sessionRow.className = 'flex items-center gap-2';

      const sessionLabel = document.createElement('span');
      sessionLabel.className = 'text-xs font-medium text-slate-500';
      sessionLabel.textContent = 'Session ID:';

      const sessionVal = document.createElement('span');
      sessionVal.className = 'text-sm font-medium text-cyan-700';
      sessionVal.textContent = data.session_id || '';

      sessionRow.appendChild(sessionLabel);
      sessionRow.appendChild(sessionVal);
      card.appendChild(sessionRow);

      const countRow = document.createElement('div');
      countRow.className = 'flex items-center gap-2';

      const countLabel = document.createElement('span');
      countLabel.className = 'text-xs font-medium text-slate-500';
      countLabel.textContent = 'Messages:';

      const countBadge = document.createElement('span');
      countBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-cyan-100 text-cyan-700';
      countBadge.textContent = (data.message_count != null ? data.message_count : 0).toString();

      countRow.appendChild(countLabel);
      countRow.appendChild(countBadge);
      card.appendChild(countRow);

      if (data.context) {
        const summarySection = document.createElement('div');
        summarySection.className = 'pt-3 border-t border-slate-100';

        const summaryLabel = document.createElement('p');
        summaryLabel.className = 'text-xs font-medium text-slate-500 mb-1';
        summaryLabel.textContent = 'Context Summary';

        const summaryText = document.createElement('p');
        summaryText.className = 'text-sm text-slate-700 leading-relaxed';
        summaryText.textContent = data.context;

        summarySection.appendChild(summaryLabel);
        summarySection.appendChild(summaryText);
        card.appendChild(summarySection);
      }

      if (data.metadata && Object.keys(data.metadata).length > 0) {
        const metaSection = document.createElement('div');
        metaSection.className = 'pt-3 border-t border-slate-100';

        const metaLabel = document.createElement('p');
        metaLabel.className = 'text-xs font-medium text-slate-500 mb-1';
        metaLabel.textContent = 'Metadata';

        const metaTags = document.createElement('div');
        metaTags.className = 'flex items-center gap-2 flex-wrap';

        Object.entries(data.metadata).forEach(function(entry) {
          const tag = document.createElement('span');
          tag.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs bg-cyan-50 text-cyan-600';
          tag.textContent = entry[0] + ': ' + entry[1];
          metaTags.appendChild(tag);
        });

        metaSection.appendChild(metaLabel);
        metaSection.appendChild(metaTags);
        card.appendChild(metaSection);
      }

      container.appendChild(card);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
