<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Memory Result</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4"></div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const container = document.getElementById('result');
      while (container.firstChild) container.removeChild(container.firstChild);

      const card = document.createElement('div');
      card.className = 'bg-gradient-to-r from-cyan-50 to-cyan-100 border border-cyan-200 rounded-xl p-4';

      const iconRow = document.createElement('div');
      iconRow.className = 'flex items-start gap-3';

      const checkCircle = document.createElement('div');
      checkCircle.className = 'w-8 h-8 rounded-full bg-cyan-200 flex items-center justify-center flex-shrink-0';

      const checkSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      checkSvg.setAttribute('class', 'w-4 h-4 text-cyan-700');
      checkSvg.setAttribute('viewBox', '0 0 24 24');
      checkSvg.setAttribute('fill', 'none');
      checkSvg.setAttribute('stroke', 'currentColor');
      checkSvg.setAttribute('stroke-width', '2');
      checkSvg.setAttribute('stroke-linecap', 'round');
      checkSvg.setAttribute('stroke-linejoin', 'round');
      const checkPath = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      checkPath.setAttribute('points', '20 6 9 17 4 12');
      checkSvg.appendChild(checkPath);
      checkCircle.appendChild(checkSvg);
      iconRow.appendChild(checkCircle);

      const textCol = document.createElement('div');

      const titleEl = document.createElement('p');
      titleEl.className = 'text-sm font-semibold text-cyan-800 mb-1';
      titleEl.textContent = 'Memory Added';

      const msgEl = document.createElement('p');
      msgEl.className = 'text-sm text-cyan-700 leading-relaxed';
      msgEl.textContent = data.message || 'Memory stored successfully';

      textCol.appendChild(titleEl);
      textCol.appendChild(msgEl);
      iconRow.appendChild(textCol);

      card.appendChild(iconRow);

      const results = data.results || [];
      if (results.length > 0) {
        const detailsSection = document.createElement('div');
        detailsSection.className = 'mt-3 pt-3 border-t border-cyan-200 space-y-2';

        results.forEach(function(item) {
          const detailRow = document.createElement('div');
          detailRow.className = 'text-xs text-cyan-600';

          if (item.event) {
            const eventEl = document.createElement('span');
            eventEl.className = 'font-medium';
            eventEl.textContent = item.event;
            detailRow.appendChild(eventEl);
          }

          if (item.id) {
            const idEl = document.createElement('span');
            idEl.className = 'ml-2 text-cyan-500';
            idEl.textContent = 'ID: ' + item.id;
            detailRow.appendChild(idEl);
          }

          detailsSection.appendChild(detailRow);
        });

        card.appendChild(detailsSection);
      }

      container.appendChild(card);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
