<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NanoBanana Model Output</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-rose-50 via-white to-pink-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-rose-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0022 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">NanoBanana Output</h2>
      </div>

      <div class="bg-white rounded-xl border border-rose-200 p-4 space-y-3">
        <div class="flex items-center gap-3">
          <span class="text-xs font-medium text-slate-500">Model</span>
          <span id="model-name" class="text-sm text-slate-700 font-medium"></span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs font-medium text-slate-500">Status</span>
          <span id="status-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
        </div>
      </div>

      <div id="outputs-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('model-name').textContent = data.model_name || 'Unknown model';

      const status = (data.status || 'unknown').toLowerCase();
      const badge = document.getElementById('status-badge');
      badge.textContent = status;

      const statusColors = {
        succeeded: 'bg-emerald-100 text-emerald-700',
        completed: 'bg-emerald-100 text-emerald-700',
        processing: 'bg-amber-100 text-amber-700',
        failed: 'bg-red-100 text-red-700'
      };
      badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' + (statusColors[status] || 'bg-slate-100 text-slate-600');

      const container = document.getElementById('outputs-container');
      container.textContent = '';

      const urls = data.output_urls || [];

      if (urls.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No outputs generated';
        container.appendChild(empty);
        return;
      }

      urls.forEach(function(url) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-xl border border-rose-200 overflow-hidden shadow-sm';

        const isVideo = /\.(mp4|webm|mov)(\?|$)/i.test(url);

        if (isVideo) {
          const video = document.createElement('video');
          video.controls = true;
          video.className = 'w-full max-h-[500px] bg-rose-50';
          const source = document.createElement('source');
          source.src = url;
          video.appendChild(source);
          card.appendChild(video);
        } else {
          const link = document.createElement('a');
          link.href = url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className = 'block';
          const img = document.createElement('img');
          img.src = url;
          img.alt = 'NanoBanana output';
          img.className = 'w-full max-h-[500px] object-contain bg-rose-50';
          img.loading = 'lazy';
          link.appendChild(img);
          card.appendChild(link);
        }

        container.appendChild(card);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
