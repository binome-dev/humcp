<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsplash Photo Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-rose-50 via-white to-pink-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-pink-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Unsplash Photo</h2>
      </div>

      <div id="photo-card" class="bg-white rounded-xl border border-pink-200 overflow-hidden"></div>

      <div id="photo-meta" class="bg-white rounded-xl border border-pink-200 p-5 space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const photo = data.photo || {};
      const urls = photo.urls || {};
      const imgUrl = urls.regular || urls.small || urls.thumb || '';
      const fullUrl = urls.full || urls.regular || '';
      const desc = photo.description || 'Unsplash Photo';

      const card = document.getElementById('photo-card');
      card.textContent = '';

      if (imgUrl) {
        const link = document.createElement('a');
        link.href = fullUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.className = 'block';

        const img = document.createElement('img');
        img.src = imgUrl;
        img.alt = desc;
        img.className = 'w-full max-h-[500px] object-contain bg-pink-50';
        img.loading = 'lazy';
        link.appendChild(img);
        card.appendChild(link);
      }

      const meta = document.getElementById('photo-meta');
      meta.textContent = '';

      const fields = [
        { label: 'Description', value: desc },
        { label: 'Photographer', value: photo.author_name || '-' },
        { label: 'Username', value: photo.author_username ? '@' + photo.author_username : '-' },
        { label: 'Dimensions', value: photo.width && photo.height ? photo.width + ' x ' + photo.height + ' px' : '-' },
        { label: 'Color', value: photo.color || '-' },
        { label: 'Likes', value: photo.likes != null ? String(photo.likes) : '-' },
      ];

      fields.forEach(function(field) {
        const row = document.createElement('div');
        row.className = 'flex items-center gap-3';

        const label = document.createElement('span');
        label.className = 'text-xs font-medium text-slate-500 w-28 shrink-0';
        label.textContent = field.label;
        row.appendChild(label);

        const value = document.createElement('span');
        value.className = 'text-sm text-slate-700 truncate';
        value.textContent = field.value;
        row.appendChild(value);

        meta.appendChild(row);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
