<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market News</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-emerald-50 via-white to-emerald-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
          <h2 class="text-lg font-semibold text-slate-800">Market News</h2>
        </div>
        <span id="article-count" class="text-xs text-slate-400"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No news articles found</div>

      <div id="articles-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const articles = data.articles || [];
      const count = data.count != null ? data.count : articles.length;
      document.getElementById('article-count').textContent = count + ' article' + (count !== 1 ? 's' : '');

      if (articles.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const container = document.getElementById('articles-container');
      container.textContent = '';

      articles.forEach((article) => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-emerald-200 p-4 hover:border-emerald-400 hover:shadow-sm transition-all';

        const header = document.createElement('div');
        header.className = 'flex items-start justify-between gap-3 mb-2';

        if (article.url) {
          const link = document.createElement('a');
          link.href = article.url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className = 'text-sm font-semibold text-emerald-700 hover:text-emerald-900 hover:underline leading-snug';
          link.textContent = article.title || 'Untitled';
          header.appendChild(link);
        } else {
          const title = document.createElement('h3');
          title.className = 'text-sm font-semibold text-slate-800 leading-snug';
          title.textContent = article.title || 'Untitled';
          header.appendChild(title);
        }

        card.appendChild(header);

        const meta = document.createElement('div');
        meta.className = 'flex items-center gap-3 mb-2';

        if (article.source) {
          const sourceSpan = document.createElement('span');
          sourceSpan.className = 'text-xs text-slate-500';
          sourceSpan.textContent = article.source;
          meta.appendChild(sourceSpan);
        }

        if (article.date) {
          const dateSpan = document.createElement('span');
          dateSpan.className = 'text-xs text-slate-400';
          dateSpan.textContent = article.date;
          meta.appendChild(dateSpan);
        }

        if (article.symbols) {
          const symbolBadge = document.createElement('span');
          symbolBadge.className = 'text-xs font-medium px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700';
          symbolBadge.textContent = article.symbols;
          meta.appendChild(symbolBadge);
        }

        card.appendChild(meta);

        if (article.text) {
          const text = document.createElement('p');
          text.className = 'text-sm text-slate-600 leading-relaxed line-clamp-3';
          text.textContent = article.text;
          card.appendChild(text);
        }

        container.appendChild(card);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
