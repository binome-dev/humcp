<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Options Chain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-emerald-50 via-white to-emerald-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h.01"/><path d="M7 20v-4"/><path d="M12 20v-8"/><path d="M17 20V8"/><path d="M22 4v16"/></svg>
          <h2 id="symbol-header" class="text-lg font-semibold text-slate-800"></h2>
        </div>
        <span id="expiration-label" class="text-xs text-slate-400"></span>
      </div>

      <div id="calls-section" class="hidden">
        <h3 class="text-sm font-semibold text-emerald-700 mb-2">Calls</h3>
        <div class="bg-white rounded-xl border border-emerald-200 overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-emerald-50 text-left">
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase">Strike</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">Last</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">Bid</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">Ask</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">Vol</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">OI</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">IV</th>
              </tr>
            </thead>
            <tbody id="calls-body"></tbody>
          </table>
        </div>
      </div>

      <div id="puts-section" class="hidden">
        <h3 class="text-sm font-semibold text-red-600 mb-2">Puts</h3>
        <div class="bg-white rounded-xl border border-red-200 overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-red-50 text-left">
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase">Strike</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">Last</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">Bid</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">Ask</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">Vol</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">OI</th>
                <th class="px-3 py-2 text-xs font-medium text-slate-500 uppercase text-right">IV</th>
              </tr>
            </thead>
            <tbody id="puts-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function fmt(val, decimals = 2) {
      if (val == null) return '-';
      return Number(val).toFixed(decimals);
    }

    function fmtInt(val) {
      if (val == null) return '-';
      return Number(val).toLocaleString('en-US');
    }

    function renderContracts(contracts, tbodyId) {
      const tbody = document.getElementById(tbodyId);
      tbody.textContent = '';
      const shown = contracts.slice(0, 20);
      shown.forEach((c, i) => {
        const tr = document.createElement('tr');
        tr.className = (i % 2 === 0 ? 'bg-white' : 'bg-slate-50') +
          (c.in_the_money ? ' font-medium' : '');
        const cells = [
          fmt(c.strike), fmt(c.last_price), fmt(c.bid), fmt(c.ask),
          fmtInt(c.volume), fmtInt(c.open_interest),
          c.implied_volatility != null ? (Number(c.implied_volatility) * 100).toFixed(1) + '%' : '-'
        ];
        cells.forEach((text, ci) => {
          const td = document.createElement('td');
          td.className = 'px-3 py-1.5 text-slate-700' + (ci > 0 ? ' text-right' : '');
          td.textContent = text;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('symbol-header').textContent = (data.symbol || '') + ' Options';
      document.getElementById('expiration-label').textContent = 'Exp: ' + (data.expiration || '');

      const calls = data.calls || [];
      const puts = data.puts || [];

      if (calls.length > 0) {
        document.getElementById('calls-section').classList.remove('hidden');
        renderContracts(calls, 'calls-body');
      }

      if (puts.length > 0) {
        document.getElementById('puts-section').classList.remove('hidden');
        renderContracts(puts, 'puts-body');
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
