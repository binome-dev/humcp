<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        <h2 class="text-sm font-semibold text-slate-700">Directions</h2>
      </div>

      <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 space-y-1">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-green-500"></span>
          <span class="text-xs text-slate-500">From:</span>
          <span id="origin-text" class="text-sm text-slate-800"></span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-red-500"></span>
          <span class="text-xs text-slate-500">To:</span>
          <span id="dest-text" class="text-sm text-slate-800"></span>
        </div>
        <div id="mode-info" class="hidden flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-blue-500"></span>
          <span class="text-xs text-slate-500">Mode:</span>
          <span id="mode-text" class="text-sm text-slate-800"></span>
        </div>
      </div>

      <div id="routes-container" class="space-y-4"></div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No routes found</div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function stripHtml(html) {
      const div = document.createElement('div');
      div.textContent = html || '';
      return div.textContent || '';
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('origin-text').textContent = data.origin || '';
      document.getElementById('dest-text').textContent = data.destination || '';

      if (data.mode) {
        document.getElementById('mode-info').classList.remove('hidden');
        document.getElementById('mode-text').textContent = data.mode;
      }

      const routes = data.routes || [];

      if (routes.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const container = document.getElementById('routes-container');
      container.innerHTML = routes.map((route, idx) => {
        const steps = route.steps || [];
        return '<div class="border border-slate-200 rounded-lg overflow-hidden">' +
          '<div class="bg-slate-50 border-b border-slate-200 px-4 py-3 flex items-center justify-between">' +
            '<div class="flex items-center gap-2">' +
              '<span class="text-xs font-semibold text-slate-500">Route ' + (idx + 1) + '</span>' +
              (route.summary ? '<span class="text-xs text-slate-400">via ' + escapeHtml(route.summary) + '</span>' : '') +
            '</div>' +
            '<div class="flex items-center gap-3">' +
              '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-50 text-blue-700">' + escapeHtml(route.distance) + '</span>' +
              '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-emerald-50 text-emerald-700">' + escapeHtml(route.duration) + '</span>' +
            '</div>' +
          '</div>' +
          (steps.length > 0 ?
            '<div class="divide-y divide-slate-100">' +
            steps.map((step, i) =>
              '<div class="px-4 py-2.5 flex items-start gap-3 hover:bg-slate-50">' +
                '<span class="flex-shrink-0 w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-semibold flex items-center justify-center mt-0.5">' + (i + 1) + '</span>' +
                '<div class="flex-1 min-w-0">' +
                  '<div class="text-sm text-slate-700">' + escapeHtml(stripHtml(step.instruction)) + '</div>' +
                  '<div class="flex items-center gap-2 mt-0.5">' +
                    (step.distance ? '<span class="text-xs text-slate-400">' + escapeHtml(step.distance) + '</span>' : '') +
                    (step.duration ? '<span class="text-xs text-slate-400">' + escapeHtml(step.duration) + '</span>' : '') +
                  '</div>' +
                '</div>' +
              '</div>'
            ).join('') +
            '</div>' : '') +
        '</div>';
      }).join('');
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
