<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zendesk Ticket Created</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-emerald-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden">
      <div class="bg-white rounded-xl border border-emerald-200 shadow-sm overflow-hidden">
        <div class="bg-gradient-to-r from-emerald-600 to-emerald-700 px-5 py-3 flex items-center gap-3">
          <svg class="w-5 h-5 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9 12l2 2 4-4"/></svg>
          <span class="text-white font-bold text-sm">Ticket Created</span>
          <span id="ticket-id" class="ml-auto text-xs font-medium bg-white/20 text-white px-2 py-0.5 rounded-full"></span>
        </div>
        <div class="p-5 space-y-4">
          <div class="flex items-center gap-2 mb-2">
            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700">Created Successfully</span>
          </div>
          <h2 id="ticket-subject" class="text-lg font-semibold text-slate-800"></h2>
          <div class="flex flex-wrap gap-2">
            <span id="status-badge" class="hidden inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700"></span>
            <span id="priority-badge" class="hidden inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
          </div>
          <div id="details-grid" class="grid grid-cols-2 gap-3 text-sm"></div>
          <div id="description-section" class="hidden">
            <p class="text-xs font-medium text-slate-500 mb-1">Description</p>
            <p id="ticket-description" class="text-sm text-slate-600 leading-relaxed bg-slate-50 rounded-lg p-3"></p>
          </div>
          <a id="ticket-link" class="hidden inline-flex items-center gap-1 text-xs text-emerald-600 hover:text-emerald-800 hover:underline" target="_blank" rel="noopener noreferrer">
            Open in Zendesk &rarr;
          </a>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function getPriorityStyle(p) {
      if (!p) return 'bg-slate-100 text-slate-600';
      const pl = p.toLowerCase();
      if (pl === 'urgent') return 'bg-red-100 text-red-700';
      if (pl === 'high') return 'bg-orange-100 text-orange-700';
      if (pl === 'normal') return 'bg-amber-100 text-amber-700';
      return 'bg-slate-100 text-slate-600';
    }

    function createDetailItem(label, value) {
      const wrapper = document.createElement('div');
      const labelEl = document.createElement('p');
      labelEl.className = 'text-xs text-slate-400';
      labelEl.textContent = label;
      const valueEl = document.createElement('p');
      valueEl.className = 'text-slate-700 font-medium';
      valueEl.textContent = value;
      wrapper.appendChild(labelEl);
      wrapper.appendChild(valueEl);
      return wrapper;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('ticket-id').textContent = '#' + (data.id || '');
      document.getElementById('ticket-subject').textContent = data.subject || '';

      if (data.status) {
        const badge = document.getElementById('status-badge');
        badge.textContent = data.status;
        badge.classList.remove('hidden');
      }

      if (data.priority) {
        const badge = document.getElementById('priority-badge');
        badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' + getPriorityStyle(data.priority);
        badge.textContent = data.priority;
        badge.classList.remove('hidden');
      }

      const grid = document.getElementById('details-grid');
      if (data.assignee_id) {
        grid.appendChild(createDetailItem('Assignee ID', String(data.assignee_id)));
      }

      if (data.description) {
        document.getElementById('description-section').classList.remove('hidden');
        document.getElementById('ticket-description').textContent = data.description;
      }

      if (data.url) {
        const link = document.getElementById('ticket-link');
        link.href = data.url;
        link.classList.remove('hidden');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
