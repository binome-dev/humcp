<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira Issue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-indigo-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden">
      <div class="bg-white rounded-xl border border-indigo-200 shadow-sm overflow-hidden">
        <div class="bg-gradient-to-r from-indigo-600 to-indigo-700 px-5 py-3 flex items-center gap-3">
          <svg class="w-5 h-5 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
          <span id="issue-key" class="text-white font-bold text-sm"></span>
          <span id="issue-type-badge" class="ml-auto text-xs font-medium bg-white/20 text-white px-2 py-0.5 rounded-full"></span>
        </div>
        <div class="p-5 space-y-4">
          <h2 id="issue-summary" class="text-lg font-semibold text-slate-800"></h2>
          <div class="flex flex-wrap gap-2">
            <span id="status-badge" class="hidden inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-700"></span>
            <span id="priority-badge" class="hidden inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700"></span>
          </div>
          <div id="details-grid" class="grid grid-cols-2 gap-3 text-sm"></div>
          <div id="description-section" class="hidden">
            <p class="text-xs font-medium text-slate-500 mb-1">Description</p>
            <p id="issue-description" class="text-sm text-slate-600 leading-relaxed bg-slate-50 rounded-lg p-3"></p>
          </div>
          <a id="issue-link" class="hidden inline-flex items-center gap-1 text-xs text-indigo-600 hover:text-indigo-800 hover:underline" target="_blank" rel="noopener noreferrer">
            Open in Jira &rarr;
          </a>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function createDetailItem(label, value) {
      const wrapper = document.createElement('div');
      const labelEl = document.createElement('p');
      labelEl.className = 'text-xs text-slate-400';
      labelEl.textContent = label;
      const valueEl = document.createElement('p');
      valueEl.className = 'text-slate-700 font-medium';
      valueEl.textContent = value;
      wrapper.appendChild(labelEl);
      wrapper.appendChild(valueEl);
      return wrapper;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('issue-key').textContent = data.key || '';
      document.getElementById('issue-summary').textContent = data.summary || '';

      const typeBadge = document.getElementById('issue-type-badge');
      if (data.issue_type) {
        typeBadge.textContent = data.issue_type;
      } else {
        typeBadge.classList.add('hidden');
      }

      if (data.status) {
        const badge = document.getElementById('status-badge');
        badge.textContent = data.status;
        badge.classList.remove('hidden');
      }

      if (data.priority) {
        const badge = document.getElementById('priority-badge');
        badge.textContent = data.priority;
        badge.classList.remove('hidden');
      }

      const grid = document.getElementById('details-grid');
      const fields = [
        { label: 'Project', value: data.project },
        { label: 'Assignee', value: data.assignee },
        { label: 'Reporter', value: data.reporter },
      ];
      fields.forEach(f => {
        if (f.value) {
          grid.appendChild(createDetailItem(f.label, f.value));
        }
      });

      if (data.description) {
        document.getElementById('description-section').classList.remove('hidden');
        document.getElementById('issue-description').textContent = data.description;
      }

      if (data.url) {
        const link = document.getElementById('issue-link');
        link.href = data.url;
        link.classList.remove('hidden');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
