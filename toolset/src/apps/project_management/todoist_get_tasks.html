<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todoist Tasks</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-red-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-red-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Todoist Tasks</h2>
        <span id="total-badge" class="hidden text-xs font-medium bg-red-100 text-red-700 px-2 py-0.5 rounded-full"></span>
      </div>
      <div id="results-container" class="space-y-2"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function getPriorityDot(p) {
      if (p === 4) return 'bg-red-500';
      if (p === 3) return 'bg-orange-500';
      if (p === 2) return 'bg-amber-500';
      return 'bg-slate-300';
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      if (data.total != null) {
        const badge = document.getElementById('total-badge');
        badge.textContent = data.total + ' tasks';
        badge.classList.remove('hidden');
      }

      const container = document.getElementById('results-container');
      const tasks = data.tasks || [];

      if (tasks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No tasks found';
        container.appendChild(empty);
        return;
      }

      tasks.forEach(task => {
        const row = document.createElement('div');
        row.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-red-300 hover:shadow-sm transition-all';

        const top = document.createElement('div');
        top.className = 'flex items-center gap-3';

        const dot = document.createElement('span');
        dot.className = 'w-2.5 h-2.5 rounded-full flex-shrink-0 ' + getPriorityDot(task.priority);
        top.appendChild(dot);

        const content = document.createElement('span');
        content.className = 'text-sm font-medium text-slate-800 flex-1';
        content.textContent = task.content || '';
        top.appendChild(content);

        if (task.due) {
          const due = document.createElement('span');
          due.className = 'text-xs text-slate-400 flex-shrink-0';
          due.textContent = task.due;
          top.appendChild(due);
        }

        if (task.url) {
          const link = document.createElement('a');
          link.href = task.url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className = 'text-xs text-red-500 hover:underline flex-shrink-0';
          link.textContent = 'View';
          top.appendChild(link);
        }

        row.appendChild(top);

        if (task.description) {
          const desc = document.createElement('p');
          desc.className = 'text-xs text-slate-400 mt-1 ml-5 truncate';
          desc.textContent = task.description;
          row.appendChild(desc);
        }

        container.appendChild(row);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
