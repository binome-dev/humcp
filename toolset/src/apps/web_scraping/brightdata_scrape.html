<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bright Data Scrape Result</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-violet-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Bright Data Scrape Result</h2>
      </div>

      <div id="url-bar" class="bg-violet-50 border border-violet-200 rounded-lg px-4 py-2 flex items-center gap-2">
        <svg class="w-4 h-4 text-violet-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        <a id="page-url" href="#" target="_blank" rel="noopener noreferrer" class="text-sm text-violet-700 hover:text-violet-900 hover:underline truncate"></a>
      </div>

      <div id="title-box" class="hidden">
        <h3 id="page-title" class="text-base font-semibold text-slate-700"></h3>
      </div>

      <div class="flex gap-2">
        <button id="btn-content" onclick="showTab('content')" class="px-3 py-1.5 text-xs font-medium rounded-full bg-violet-600 text-white">Content</button>
        <button id="btn-markdown" onclick="showTab('markdown')" class="hidden px-3 py-1.5 text-xs font-medium rounded-full bg-slate-200 text-slate-600 hover:bg-slate-300">Markdown</button>
      </div>

      <div id="content-tab" class="bg-white rounded-lg border border-slate-200 p-4">
        <pre id="page-content" class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap break-words"></pre>
      </div>
      <div id="markdown-tab" class="hidden bg-white rounded-lg border border-slate-200 p-4">
        <pre id="page-markdown" class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap break-words"></pre>
      </div>

      <div id="metadata-box" class="hidden bg-slate-50 rounded-lg border border-slate-200 p-4">
        <p class="text-xs font-medium text-slate-500 mb-2">Metadata</p>
        <pre id="page-metadata" class="text-xs text-slate-600 whitespace-pre-wrap break-words"></pre>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    window.showTab = function(tab) {
      const contentTab = document.getElementById('content-tab');
      const markdownTab = document.getElementById('markdown-tab');
      const btnContent = document.getElementById('btn-content');
      const btnMarkdown = document.getElementById('btn-markdown');
      if (tab === 'content') {
        contentTab.classList.remove('hidden');
        markdownTab.classList.add('hidden');
        btnContent.className = 'px-3 py-1.5 text-xs font-medium rounded-full bg-violet-600 text-white';
        btnMarkdown.className = 'px-3 py-1.5 text-xs font-medium rounded-full bg-slate-200 text-slate-600 hover:bg-slate-300';
      } else {
        contentTab.classList.add('hidden');
        markdownTab.classList.remove('hidden');
        btnContent.className = 'px-3 py-1.5 text-xs font-medium rounded-full bg-slate-200 text-slate-600 hover:bg-slate-300';
        btnMarkdown.className = 'px-3 py-1.5 text-xs font-medium rounded-full bg-violet-600 text-white';
      }
    };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const urlEl = document.getElementById('page-url');
      urlEl.href = data.url || '#';
      urlEl.textContent = data.url || '';

      if (data.title) {
        document.getElementById('title-box').classList.remove('hidden');
        document.getElementById('page-title').textContent = data.title;
      }

      document.getElementById('page-content').textContent = data.content || '';

      if (data.markdown) {
        document.getElementById('btn-markdown').classList.remove('hidden');
        document.getElementById('page-markdown').textContent = data.markdown;
      }

      if (data.metadata && Object.keys(data.metadata).length > 0) {
        document.getElementById('metadata-box').classList.remove('hidden');
        document.getElementById('page-metadata').textContent = JSON.stringify(data.metadata, null, 2);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
