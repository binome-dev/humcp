<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apify Actor Run Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-violet-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <h2 class="text-lg font-semibold text-slate-800">Apify Actor Run Results</h2>
        </div>
        <span id="item-count" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-violet-100 text-violet-700"></span>
      </div>

      <div id="actor-bar" class="bg-violet-50 border border-violet-200 rounded-lg px-4 py-2">
        <span class="text-xs font-medium text-violet-600">Actor ID: </span>
        <span id="actor-id" class="text-sm text-violet-800 font-mono"></span>
      </div>

      <div id="table-container">
        <table class="w-full text-sm text-left">
          <thead id="table-head" class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200"></thead>
          <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>

      <div id="raw-container" class="hidden space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('actor-id').textContent = data.actor_id || '';
      document.getElementById('item-count').textContent = (data.total_items || 0) + ' items';

      const results = data.results || [];

      if (results.length === 0) {
        const tableContainer = document.getElementById('table-container');
        tableContainer.textContent = '';
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No results returned';
        tableContainer.appendChild(empty);
        return;
      }

      // Collect all unique keys across results
      const allKeys = new Set();
      results.forEach(row => {
        if (typeof row === 'object' && row !== null) {
          Object.keys(row).forEach(k => allKeys.add(k));
        }
      });

      const keys = Array.from(allKeys);

      // If no tabular keys, show raw JSON cards
      if (keys.length === 0) {
        document.getElementById('table-container').classList.add('hidden');
        const rawContainer = document.getElementById('raw-container');
        rawContainer.classList.remove('hidden');
        results.forEach((item, index) => {
          const card = document.createElement('div');
          card.className = 'bg-white rounded-lg border border-slate-200 p-4';

          const label = document.createElement('p');
          label.className = 'text-xs font-medium text-slate-500 mb-1';
          label.textContent = 'Item ' + (index + 1);
          card.appendChild(label);

          const pre = document.createElement('pre');
          pre.className = 'text-xs text-slate-600 whitespace-pre-wrap break-words';
          pre.textContent = JSON.stringify(item, null, 2);
          card.appendChild(pre);

          rawContainer.appendChild(card);
        });
        return;
      }

      // Build table header
      const thead = document.getElementById('table-head');
      const headerRow = document.createElement('tr');
      keys.forEach(k => {
        const th = document.createElement('th');
        th.className = 'px-3 py-2 font-medium';
        th.textContent = k;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);

      // Build table body
      const tbody = document.getElementById('table-body');
      results.forEach(row => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-slate-50 transition-colors';
        keys.forEach(k => {
          const td = document.createElement('td');
          td.className = 'px-3 py-2 text-slate-700 max-w-xs truncate';
          const val = row[k];
          if (val === null || val === undefined) {
            const dash = document.createElement('span');
            dash.className = 'text-slate-300';
            dash.textContent = '-';
            td.appendChild(dash);
          } else if (typeof val === 'object') {
            const obj = document.createElement('span');
            obj.className = 'text-xs font-mono text-violet-600 cursor-pointer';
            obj.title = JSON.stringify(val);
            obj.textContent = '{...}';
            td.appendChild(obj);
          } else {
            td.textContent = String(val);
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
