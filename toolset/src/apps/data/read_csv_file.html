<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <h2 class="text-sm font-semibold text-slate-700"><span id="csv-name" class="font-mono"></span></h2>
        </div>
        <div class="flex items-center gap-3 text-xs text-slate-400">
          <span id="row-info"></span>
          <span id="col-info"></span>
        </div>
      </div>

      <div id="total-info" class="hidden text-xs text-amber-600 bg-amber-50 rounded-lg px-3 py-1.5 flex items-center gap-1">
        <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="total-text"></span>
      </div>

      <div id="table-wrapper" class="border border-slate-200 rounded-lg overflow-x-auto">
        <table class="w-full text-sm">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No data found</div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('csv-name').textContent = data.csv_name || 'CSV Data';
      document.getElementById('row-info').textContent = (data.row_count || 0) + ' rows';
      document.getElementById('col-info').textContent = (data.column_count || 0) + ' columns';

      if (data.total_rows != null && data.total_rows > (data.row_count || 0)) {
        document.getElementById('total-info').classList.remove('hidden');
        document.getElementById('total-text').textContent = 'Showing ' + (data.row_count || 0) + ' of ' + data.total_rows + ' total rows';
      }

      const headers = data.headers || [];
      const rows = data.rows || [];

      if (rows.length === 0) {
        document.getElementById('table-wrapper').classList.add('hidden');
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const thead = document.getElementById('table-head');
      thead.innerHTML = '<tr class="bg-slate-50 border-b border-slate-200">' +
        headers.map(h => '<th class="text-left px-4 py-2 font-medium text-slate-600 whitespace-nowrap">' + escapeHtml(h) + '</th>').join('') +
        '</tr>';

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = rows.map(row =>
        '<tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50">' +
        row.map(cell => '<td class="px-4 py-2 text-slate-700 whitespace-nowrap">' + escapeHtml(cell) + '</td>').join('') +
        '</tr>'
      ).join('');
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
