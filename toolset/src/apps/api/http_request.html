<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTTP Response</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-gray-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9"/></svg>
          <h2 class="text-sm font-semibold text-slate-700">HTTP Response</h2>
        </div>
        <span id="status-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
      </div>

      <div class="bg-slate-800 rounded-lg p-3">
        <div class="flex items-center gap-2">
          <span id="method-badge" class="text-xs font-bold text-emerald-400 uppercase"></span>
          <code id="url-text" class="text-sm text-slate-300 font-mono break-all"></code>
        </div>
        <div id="elapsed-row" class="hidden mt-1">
          <span id="elapsed-text" class="text-xs text-slate-500"></span>
        </div>
      </div>

      <div id="headers-section" class="hidden">
        <button id="headers-toggle" type="button" class="flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 transition-colors cursor-pointer bg-transparent border-0 p-0">
          <svg id="headers-chevron" class="w-3 h-3 transition-transform" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          <span id="headers-label">Headers</span>
        </button>
        <div id="headers-content" class="hidden mt-2">
          <div class="bg-slate-50 rounded-lg border border-slate-200 overflow-hidden">
            <table class="w-full text-xs">
              <tbody id="headers-table"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="body-section" class="hidden">
        <p class="text-xs text-slate-400 uppercase tracking-wider mb-1">Response Body</p>
        <div class="bg-slate-900 rounded-lg overflow-hidden">
          <pre class="p-4 overflow-x-auto max-h-[500px] overflow-y-auto"><code id="body-content" class="text-sm text-slate-300 font-mono whitespace-pre-wrap"></code></pre>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function statusBadgeClasses(code) {
      if (code >= 200 && code < 300) return 'bg-emerald-100 text-emerald-700';
      if (code >= 300 && code < 400) return 'bg-blue-100 text-blue-700';
      if (code >= 400 && code < 500) return 'bg-amber-100 text-amber-700';
      if (code >= 500) return 'bg-red-100 text-red-700';
      return 'bg-gray-100 text-gray-700';
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const statusCode = data.status_code != null ? data.status_code : 0;
      const badge = document.getElementById('status-badge');
      badge.textContent = statusCode;
      badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' + statusBadgeClasses(statusCode);

      document.getElementById('method-badge').textContent = data.method || 'GET';
      document.getElementById('url-text').textContent = data.url || '';

      if (data.elapsed_ms != null || data.elapsed != null) {
        document.getElementById('elapsed-row').classList.remove('hidden');
        const elapsed = data.elapsed_ms != null ? data.elapsed_ms : data.elapsed;
        document.getElementById('elapsed-text').textContent = elapsed + ' ms';
      }

      const headers = data.headers;
      if (headers && typeof headers === 'object' && Object.keys(headers).length > 0) {
        document.getElementById('headers-section').classList.remove('hidden');
        const headerCount = Object.keys(headers).length;
        document.getElementById('headers-label').textContent = 'Headers (' + headerCount + ')';

        const tbody = document.getElementById('headers-table');
        while (tbody.firstChild) { tbody.removeChild(tbody.firstChild); }

        Object.entries(headers).forEach(function(entry) {
          const tr = document.createElement('tr');
          tr.className = 'border-b border-slate-100 last:border-0';

          const keyTd = document.createElement('td');
          keyTd.className = 'px-3 py-1.5 font-mono text-slate-600 whitespace-nowrap align-top';
          keyTd.textContent = entry[0];
          tr.appendChild(keyTd);

          const valTd = document.createElement('td');
          valTd.className = 'px-3 py-1.5 font-mono text-slate-500 break-all';
          valTd.textContent = entry[1];
          tr.appendChild(valTd);

          tbody.appendChild(tr);
        });

        document.getElementById('headers-toggle').addEventListener('click', function() {
          const content = document.getElementById('headers-content');
          const chevron = document.getElementById('headers-chevron');
          const isHidden = content.classList.contains('hidden');
          if (isHidden) {
            content.classList.remove('hidden');
            chevron.style.transform = 'rotate(90deg)';
          } else {
            content.classList.add('hidden');
            chevron.style.transform = 'rotate(0deg)';
          }
        });
      }

      if (data.body != null) {
        document.getElementById('body-section').classList.remove('hidden');
        let bodyText = data.body;
        if (typeof bodyText === 'object') {
          bodyText = JSON.stringify(bodyText, null, 2);
        } else {
          bodyText = String(bodyText);
          try { bodyText = JSON.stringify(JSON.parse(bodyText), null, 2); } catch {}
        }
        document.getElementById('body-content').textContent = bodyText;
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
