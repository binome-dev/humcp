<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tavily Extract</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>
    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-teal-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Extracted Content</h2>
      </div>
      <div id="results-container" class="space-y-4"></div>
      <div id="failed-container" class="hidden space-y-2"></div>
    </div>
    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>
  <script type="module">
    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');
      const container = document.getElementById('results-container');
      container.replaceChildren();
      const results = data.results || [];
      if (results.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No content extracted';
        container.appendChild(empty);
        return;
      }
      results.forEach(item => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4';

        const link = document.createElement('a');
        link.href = item.url || '';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.className = 'text-sm font-semibold text-teal-700 hover:text-teal-900 hover:underline block mb-2 truncate';
        link.textContent = item.url || '';
        card.appendChild(link);

        const pre = document.createElement('pre');
        pre.className = 'text-sm text-slate-600 leading-relaxed whitespace-pre-wrap max-h-96 overflow-y-auto bg-slate-50 rounded p-3';
        pre.textContent = (item.raw_content || '').substring(0, 2000);
        card.appendChild(pre);

        container.appendChild(card);
      });

      const failed = data.failed_results || [];
      if (failed.length > 0) {
        const fc = document.getElementById('failed-container');
        fc.classList.remove('hidden');
        fc.replaceChildren();
        const label = document.createElement('p');
        label.className = 'text-xs font-medium text-red-600';
        label.textContent = 'Failed URLs:';
        fc.appendChild(label);
        failed.forEach(f => {
          const el = document.createElement('p');
          el.className = 'text-xs text-red-500';
          el.textContent = typeof f === 'string' ? f : JSON.stringify(f);
          fc.appendChild(el);
        });
      }
    }

    function renderError(m) { document.getElementById('loading').classList.add('hidden'); document.getElementById('result').classList.add('hidden'); const el = document.getElementById('error'); el.classList.remove('hidden'); el.textContent = m; }
    function parseToolResult(r) { if (r && r.content) { for (const i of r.content) { if (i.type === 'text' && i.text) { try { return JSON.parse(i.text); } catch { return { raw: i.text }; } } } } if (r && r.data) return r; return r; }
    function handleToolResult(r) { const p = parseToolResult(r); if (p && p.success === false) { renderError(p.error || 'Failed'); return; } const d = p?.data || p; if (d) render(d); else renderError('Unexpected data format'); }
    window.addEventListener('message', e => { const m = e.data; if (!m || typeof m !== 'object') return; if (m.jsonrpc === '2.0') { if (m.method === 'ui/initialize') { window.parent.postMessage({ jsonrpc: '2.0', id: m.id, result: { protocolVersion: '0.1.0', capabilities: {} } }, '*'); } else if (m.method === 'ui/toolResult') handleToolResult(m.params); } if (m.type === 'toolResult') handleToolResult(m.data); });
    window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/ready', params: {} }, '*');
  </script>
</body>
</html>
