<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuckDuckGo News Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-orange-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"/></svg>
        <h2 id="query-header" class="text-lg font-semibold text-slate-800"></h2>
        <span class="ml-auto inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-orange-100 text-orange-700">DuckDuckGo News</span>
      </div>

      <div id="results-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    // NOTE: innerHTML usage below is safe because all dynamic values pass through
    // escapeHtml() which uses textContent-based escaping to prevent XSS.
    const state = { initialized: false };

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('query-header').textContent = 'News for \u201c' + (data.query || '') + '\u201d';

      const container = document.getElementById('results-container');
      container.innerHTML = '';

      const results = data.results || [];
      results.forEach(function(item) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-orange-300 hover:shadow-sm transition-all';

        const sourceBadge = item.source
          ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-teal-100 text-teal-700">' + escapeHtml(item.source) + '</span>'
          : '';

        const dateBadge = item.date
          ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600">' + escapeHtml(item.date) + '</span>'
          : '';

        card.innerHTML =
          '<div class="flex items-start justify-between gap-3 mb-2">' +
            '<a href="' + escapeHtml(item.url || '') + '" target="_blank" rel="noopener noreferrer" class="text-sm font-semibold text-orange-600 hover:text-orange-800 hover:underline leading-snug">' + escapeHtml(item.title || '') + '</a>' +
          '</div>' +
          '<div class="flex items-center gap-2 mb-2">' +
            sourceBadge + dateBadge +
          '</div>' +
          '<p class="text-xs text-slate-400 mb-2 truncate">' + escapeHtml(item.url || '') + '</p>' +
          '<p class="text-sm text-slate-600 leading-relaxed line-clamp-3">' + escapeHtml(item.snippet || '') + '</p>';

        container.appendChild(card);
      });

      if (results.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">No news results found</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
