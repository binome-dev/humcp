<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAG Run Status</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-gray-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">DAG Run Status</h2>
      </div>

      <div class="bg-white rounded-lg border border-slate-200 p-4 space-y-3">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-xs text-slate-400 uppercase tracking-wider">DAG ID</p>
            <p id="dag-id" class="text-sm font-semibold text-slate-800 mt-0.5"></p>
          </div>
          <span id="state-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
        </div>

        <div id="run-id-row" class="hidden">
          <p class="text-xs text-slate-400 uppercase tracking-wider">Run ID</p>
          <p id="run-id" class="text-sm text-slate-700 mt-0.5 font-mono"></p>
        </div>

        <div id="execution-date-row" class="hidden">
          <p class="text-xs text-slate-400 uppercase tracking-wider">Execution Date</p>
          <p id="execution-date" class="text-sm text-slate-700 mt-0.5"></p>
        </div>

        <div class="flex flex-wrap gap-x-6 gap-y-2">
          <div id="start-date-row" class="hidden">
            <p class="text-xs text-slate-400 uppercase tracking-wider">Start</p>
            <p id="start-date" class="text-sm text-slate-700 mt-0.5"></p>
          </div>
          <div id="end-date-row" class="hidden">
            <p class="text-xs text-slate-400 uppercase tracking-wider">End</p>
            <p id="end-date" class="text-sm text-slate-700 mt-0.5"></p>
          </div>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function stateBadgeClasses(s) {
      const val = (s || '').toLowerCase();
      if (val === 'success') return 'bg-emerald-100 text-emerald-700';
      if (val === 'running' || val === 'queued') return 'bg-blue-100 text-blue-700';
      if (val === 'failed') return 'bg-red-100 text-red-700';
      return 'bg-gray-100 text-gray-700';
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('dag-id').textContent = data.dag_id || '';

      const badge = document.getElementById('state-badge');
      badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' + stateBadgeClasses(data.state);
      badge.textContent = data.state || 'unknown';

      if (data.dag_run_id || data.run_id) {
        document.getElementById('run-id-row').classList.remove('hidden');
        document.getElementById('run-id').textContent = data.dag_run_id || data.run_id;
      }

      if (data.execution_date) {
        document.getElementById('execution-date-row').classList.remove('hidden');
        document.getElementById('execution-date').textContent = data.execution_date;
      }

      if (data.start_date) {
        document.getElementById('start-date-row').classList.remove('hidden');
        document.getElementById('start-date').textContent = data.start_date;
      }

      if (data.end_date) {
        document.getElementById('end-date-row').classList.remove('hidden');
        document.getElementById('end-date').textContent = data.end_date;
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
