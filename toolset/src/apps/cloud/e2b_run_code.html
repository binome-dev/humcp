<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Execution</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-gray-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <h2 class="text-sm font-semibold text-slate-700">Code Execution</h2>
        </div>
        <div class="flex items-center gap-2">
          <span id="language-badge" class="hidden inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700"></span>
          <span id="status-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
        </div>
      </div>

      <div id="time-row" class="hidden text-xs text-slate-500"></div>

      <div id="output-section" class="hidden">
        <div class="bg-slate-900 rounded-lg overflow-hidden">
          <div class="px-4 py-2 bg-slate-800 border-b border-slate-700">
            <span class="text-xs text-slate-400 font-medium">output</span>
          </div>
          <pre class="p-4 overflow-x-auto max-h-[500px] overflow-y-auto"><code id="output-content" class="text-sm text-slate-300 font-mono whitespace-pre-wrap"></code></pre>
        </div>
      </div>

      <div id="error-section" class="hidden">
        <div class="bg-red-950 rounded-lg overflow-hidden">
          <div class="px-4 py-2 bg-red-900 border-b border-red-800">
            <span class="text-xs text-red-300 font-medium">error</span>
          </div>
          <pre class="p-4 overflow-x-auto max-h-[300px] overflow-y-auto"><code id="error-content" class="text-sm text-red-300 font-mono whitespace-pre-wrap"></code></pre>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const badge = document.getElementById('status-badge');
      if (data.error) {
        badge.textContent = 'error';
        badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700';
      } else {
        badge.textContent = 'success';
        badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700';
      }

      if (data.language) {
        const langBadge = document.getElementById('language-badge');
        langBadge.classList.remove('hidden');
        langBadge.textContent = data.language;
      }

      if (data.execution_time) {
        const timeEl = document.getElementById('time-row');
        timeEl.classList.remove('hidden');
        timeEl.textContent = 'Execution time: ' + data.execution_time;
      }

      const output = data.stdout || data.output || '';
      if (output) {
        document.getElementById('output-section').classList.remove('hidden');
        document.getElementById('output-content').textContent = output;
      }

      const stderr = data.stderr || data.error || '';
      if (stderr) {
        document.getElementById('error-section').classList.remove('hidden');
        document.getElementById('error-content').textContent = stderr;
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
