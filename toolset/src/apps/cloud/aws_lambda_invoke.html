<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lambda Invocation Result</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-gray-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <h2 class="text-lg font-semibold text-slate-800">Lambda Invocation</h2>
      </div>

      <div class="bg-white rounded-lg border border-slate-200 p-4 space-y-3">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs text-slate-400 uppercase tracking-wider">Function</p>
            <p id="function-name" class="text-sm font-semibold text-slate-800 mt-0.5"></p>
          </div>
          <span id="status-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
        </div>

        <div id="version-row" class="hidden">
          <p class="text-xs text-slate-400 uppercase tracking-wider">Executed Version</p>
          <p id="executed-version" class="text-sm text-slate-700 mt-0.5 font-mono"></p>
        </div>

        <div id="payload-section" class="hidden">
          <p class="text-xs text-slate-400 uppercase tracking-wider mb-1">Response Payload</p>
          <div class="bg-slate-800 rounded-lg overflow-hidden">
            <pre class="p-4 overflow-x-auto max-h-[400px] overflow-y-auto"><code id="payload-content" class="text-sm text-slate-300 font-mono whitespace-pre-wrap"></code></pre>
          </div>
        </div>
      </div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('function-name').textContent = data.function_name || '';

      const statusCode = data.status_code != null ? data.status_code : 0;
      const badge = document.getElementById('status-badge');
      badge.textContent = statusCode;
      if (statusCode >= 200 && statusCode < 300) {
        badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700';
      } else if (statusCode >= 400 && statusCode < 500) {
        badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700';
      } else {
        badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700';
      }

      if (data.executed_version) {
        document.getElementById('version-row').classList.remove('hidden');
        document.getElementById('executed-version').textContent = data.executed_version;
      }

      if (data.payload) {
        document.getElementById('payload-section').classList.remove('hidden');
        let formatted = data.payload;
        try { formatted = JSON.stringify(JSON.parse(data.payload), null, 2); } catch {}
        document.getElementById('payload-content').textContent = formatted;
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
