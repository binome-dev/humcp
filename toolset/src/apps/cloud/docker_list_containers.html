<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Containers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-gray-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        <span id="container-count" class="text-sm text-slate-500"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400">
        <svg class="w-8 h-8 mx-auto mb-2 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        <p class="text-sm">No containers found</p>
      </div>

      <div id="containers-list" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function statusBadgeClasses(status) {
      const s = (status || '').toLowerCase();
      if (s.includes('running') || s.includes('up')) {
        return 'bg-emerald-100 text-emerald-700';
      }
      if (s.includes('exited') || s.includes('stopped') || s.includes('dead')) {
        return 'bg-red-100 text-red-700';
      }
      return 'bg-gray-100 text-gray-700';
    }

    function formatPorts(ports) {
      if (!ports) return '';
      if (typeof ports === 'string') return ports;
      if (typeof ports === 'object') {
        return Object.entries(ports).map(function(entry) { return entry[0] + ' -> ' + entry[1]; }).join(', ');
      }
      return String(ports);
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const containers = data.containers || [];
      const count = data.count != null ? data.count : containers.length;
      document.getElementById('container-count').textContent = count + ' container' + (count !== 1 ? 's' : '');

      if (containers.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const list = document.getElementById('containers-list');
      while (list.firstChild) { list.removeChild(list.firstChild); }

      containers.forEach(function(c) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-4 hover:border-gray-400 hover:shadow-sm transition-all';

        const header = document.createElement('div');
        header.className = 'flex items-start justify-between gap-3 mb-2';

        const nameWrap = document.createElement('div');
        nameWrap.className = 'min-w-0';

        const nameEl = document.createElement('p');
        nameEl.className = 'text-sm font-semibold text-slate-800 truncate';
        nameEl.textContent = c.name || c.id || '';
        nameWrap.appendChild(nameEl);

        const idEl = document.createElement('p');
        idEl.className = 'text-xs text-slate-400 font-mono truncate';
        idEl.textContent = c.id || '';
        nameWrap.appendChild(idEl);

        header.appendChild(nameWrap);

        const badge = document.createElement('span');
        badge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium flex-shrink-0 ' + statusBadgeClasses(c.status);
        badge.textContent = c.status || 'unknown';
        header.appendChild(badge);

        card.appendChild(header);

        const meta = document.createElement('div');
        meta.className = 'flex flex-wrap gap-x-4 gap-y-1 text-xs text-slate-500';

        const imgEl = document.createElement('span');
        imgEl.textContent = 'Image: ' + (c.image || '');
        meta.appendChild(imgEl);

        if (c.ports) {
          const portsEl = document.createElement('span');
          portsEl.textContent = 'Ports: ' + formatPorts(c.ports);
          meta.appendChild(portsEl);
        }

        card.appendChild(meta);
        list.appendChild(card);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
