<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logarithm - Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="flex items-center justify-center min-h-[120px] p-8 bg-gradient-to-br from-cyan-50 via-white to-cyan-50 rounded-xl relative">
    <div id="loading" class="text-slate-400 text-sm">Waiting for data...</div>
    <div id="result" class="hidden flex items-center gap-6">
      <div class="flex items-baseline">
        <span id="log-label" class="font-bold text-2xl text-cyan-700"></span>
        <span id="log-base" class="font-mono text-sm text-cyan-600 ml-0.5"></span>
        <span id="val-n" class="font-mono font-bold text-3xl text-slate-800 ml-2"></span>
      </div>
      <span class="text-slate-400 text-4xl font-light">=</span>
      <span id="val-result" class="font-mono font-bold text-4xl text-cyan-600 bg-cyan-100 px-6 py-3 rounded-xl shadow-sm"></span>
    </div>
    <div id="base-badge" class="hidden absolute bottom-2 right-2 text-xs text-slate-500 bg-white px-2 py-1 rounded border border-cyan-200"></div>
    <div id="error" class="hidden text-red-600 text-sm font-medium"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function formatResult(val) {
      return val.toFixed(6).replace(/\.?0+$/, '');
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const isNatural = data.operation === 'ln';

      document.getElementById('log-label').textContent = 'log';

      if (isNatural) {
        const baseEl = document.getElementById('log-base');
        baseEl.textContent = 'e';
        baseEl.classList.add('italic');
      } else {
        document.getElementById('log-base').textContent = data.base;
      }

      document.getElementById('val-n').textContent = '(' + data.n.toLocaleString() + ')';
      document.getElementById('val-result').textContent = formatResult(data.result);

      const badge = document.getElementById('base-badge');
      badge.classList.remove('hidden');
      badge.textContent = isNatural ? 'Natural log (base e)' : `Base ${data.base}`;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try {
              return JSON.parse(item.text);
            } catch {
              return { raw: item.text };
            }
          }
        }
      }
      if (result && result.data) {
        return result;
      }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data && typeof data.n === 'number' && typeof data.result === 'number' && typeof data.operation === 'string') {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0',
            id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0',
      method: 'ui/ready',
      params: {}
    }, '*');
  </script>
</body>
</html>
