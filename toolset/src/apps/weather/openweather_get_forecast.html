<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Forecast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-sky-50 via-white to-sky-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-sky-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <h2 id="header" class="text-lg font-semibold text-slate-800"></h2>
      </div>
      <div id="forecasts-container" class="flex gap-3 overflow-x-auto pb-2"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getUnitSymbol(units) {
      if (units === 'imperial') return '\u00b0F';
      if (units === 'standard') return 'K';
      return '\u00b0C';
    }

    function getSpeedUnit(units) {
      if (units === 'imperial') return 'mph';
      return 'm/s';
    }

    function getWeatherEmoji(conditions) {
      if (!conditions || conditions.length === 0) return '\u2601';
      const main = conditions[0].main.toLowerCase();
      if (main.includes('clear')) return '\u2600';
      if (main.includes('cloud')) return '\u2601';
      if (main.includes('rain') || main.includes('drizzle')) return '\ud83c\udf27';
      if (main.includes('thunder')) return '\u26c8';
      if (main.includes('snow')) return '\u2744';
      if (main.includes('mist') || main.includes('fog') || main.includes('haze')) return '\ud83c\udf2b';
      return '\u2601';
    }

    function formatDateTime(dtTxt) {
      if (!dtTxt) return '';
      try {
        const d = new Date(dtTxt);
        const day = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const time = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        return { day: day, time: time };
      } catch {
        return { day: dtTxt, time: '' };
      }
    }

    function createForecastCard(entry, unitSym, speedUnit) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg border border-slate-200 p-4 min-w-[160px] flex-shrink-0 hover:border-sky-300 hover:shadow-sm transition-all';

      const dt = formatDateTime(entry.dt_txt);
      const emoji = getWeatherEmoji(entry.conditions);

      // Date/Time
      const dayLabel = document.createElement('div');
      dayLabel.className = 'text-xs font-medium text-slate-500';
      dayLabel.textContent = dt.day;
      const timeLabel = document.createElement('div');
      timeLabel.className = 'text-xs text-slate-400 mb-3';
      timeLabel.textContent = dt.time;

      // Weather emoji + temp
      const weatherRow = document.createElement('div');
      weatherRow.className = 'text-center mb-3';
      const emojiSpan = document.createElement('div');
      emojiSpan.className = 'text-3xl mb-1';
      emojiSpan.textContent = emoji;
      const tempSpan = document.createElement('div');
      tempSpan.className = 'text-xl font-bold text-slate-800';
      tempSpan.textContent = Math.round(entry.temperature) + unitSym;
      weatherRow.appendChild(emojiSpan);
      weatherRow.appendChild(tempSpan);

      // Description
      const descRow = document.createElement('div');
      descRow.className = 'text-xs text-slate-500 text-center capitalize mb-3';
      if (entry.conditions && entry.conditions.length > 0) {
        descRow.textContent = entry.conditions[0].description;
      }

      // Details
      const detailsDiv = document.createElement('div');
      detailsDiv.className = 'space-y-1 text-xs text-slate-400 border-t border-slate-100 pt-2';

      const humidityRow = document.createElement('div');
      humidityRow.className = 'flex justify-between';
      const humLabel = document.createElement('span');
      humLabel.textContent = 'Humidity';
      const humVal = document.createElement('span');
      humVal.className = 'font-medium text-slate-600';
      humVal.textContent = entry.humidity + '%';
      humidityRow.appendChild(humLabel);
      humidityRow.appendChild(humVal);

      const windRow = document.createElement('div');
      windRow.className = 'flex justify-between';
      const windLabel = document.createElement('span');
      windLabel.textContent = 'Wind';
      const windVal = document.createElement('span');
      windVal.className = 'font-medium text-slate-600';
      windVal.textContent = entry.wind_speed + ' ' + speedUnit;
      windRow.appendChild(windLabel);
      windRow.appendChild(windVal);

      detailsDiv.appendChild(humidityRow);
      detailsDiv.appendChild(windRow);

      card.appendChild(dayLabel);
      card.appendChild(timeLabel);
      card.appendChild(weatherRow);
      card.appendChild(descRow);
      card.appendChild(detailsDiv);

      return card;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const city = data.city || '';
      const country = data.country || '';
      const days = data.days || '';
      const headerText = city + (country ? ', ' + country : '') + ' \u2014 ' + days + '-day Forecast';
      document.getElementById('header').textContent = headerText;

      const unitSym = getUnitSymbol(data.units);
      const speedUnit = getSpeedUnit(data.units);

      const container = document.getElementById('forecasts-container');
      container.replaceChildren();

      const forecasts = data.forecasts || [];
      forecasts.forEach(function(entry) {
        container.appendChild(createForecastCard(entry, unitSym, speedUnit));
      });

      if (forecasts.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm w-full';
        empty.textContent = 'No forecast data available';
        container.appendChild(empty);
      }
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
