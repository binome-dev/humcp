<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h2 id="query-header" class="text-sm font-semibold text-slate-700"></h2>
        <span id="message-count" class="text-xs text-slate-400 ml-auto"></span>
      </div>

      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No messages matched your search</div>

      <div id="messages-list" class="space-y-2"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const queryHeader = document.getElementById('query-header');
      queryHeader.textContent = data.query ? 'Results for "' + data.query + '"' : 'Search Results';

      const messages = data.messages || [];
      const count = data.count != null ? data.count : messages.length;
      document.getElementById('message-count').textContent = count + ' result' + (count !== 1 ? 's' : '');

      if (messages.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      const list = document.getElementById('messages-list');
      while (list.firstChild) { list.removeChild(list.firstChild); }

      messages.forEach(msg => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-3 hover:border-blue-200 transition-all';

        const header = document.createElement('div');
        header.className = 'flex items-center gap-2 mb-1';

        const avatar = document.createElement('div');
        avatar.className = 'w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0';
        const avatarText = document.createElement('span');
        avatarText.className = 'text-xs font-bold text-blue-600';
        avatarText.textContent = (msg.user || '?').charAt(0).toUpperCase();
        avatar.appendChild(avatarText);

        const userName = document.createElement('span');
        userName.className = 'text-sm font-medium text-slate-700';
        userName.textContent = msg.user || 'Unknown';

        if (msg.channel) {
          const channelBadge = document.createElement('span');
          channelBadge.className = 'text-xs px-1.5 py-0.5 rounded bg-sky-50 text-sky-600 font-mono';
          channelBadge.textContent = '#' + msg.channel;
          header.appendChild(avatar);
          header.appendChild(userName);
          header.appendChild(channelBadge);
        } else {
          header.appendChild(avatar);
          header.appendChild(userName);
        }

        const ts = document.createElement('span');
        ts.className = 'text-xs text-slate-400 ml-auto';
        ts.textContent = msg.timestamp || '';
        header.appendChild(ts);

        const body = document.createElement('p');
        body.className = 'text-sm text-slate-600 leading-relaxed ml-8';
        body.textContent = msg.text || '';

        card.appendChild(header);
        card.appendChild(body);

        if (msg.permalink) {
          const linkRow = document.createElement('div');
          linkRow.className = 'ml-8 mt-1';
          const link = document.createElement('a');
          link.className = 'text-xs text-blue-500 hover:text-blue-700 hover:underline';
          link.href = msg.permalink;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = 'View in Slack';
          linkRow.appendChild(link);
          card.appendChild(linkRow);
        }

        list.appendChild(card);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
