<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slack Thread Replies</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-slate-50 via-white to-slate-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <h2 class="text-sm font-semibold text-slate-700">Thread Replies</h2>
        <span id="reply-count" class="text-xs text-slate-400 ml-auto"></span>
      </div>

      <div id="thread-info" class="text-xs text-slate-400 mb-2"></div>
      <div id="empty-state" class="hidden text-center py-8 text-slate-400 text-sm">No replies in this thread</div>
      <div id="messages-list" class="space-y-2 border-l-2 border-blue-200 pl-4"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text != null ? text : '');
      return div.innerHTML;
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('empty-state').classList.add('hidden');

      const messages = data.messages || [];
      const count = data.count != null ? data.count : messages.length;
      document.getElementById('reply-count').textContent = count + ' message' + (count !== 1 ? 's' : '');

      const list = document.getElementById('messages-list');
      while (list.firstChild) { list.removeChild(list.firstChild); }

      if (data.channel || data.thread_ts) {
        const parts = [];
        if (data.channel) parts.push('Channel: ' + data.channel);
        if (data.thread_ts) parts.push('Thread: ' + data.thread_ts);
        document.getElementById('thread-info').textContent = parts.join(' | ');
      }

      if (messages.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      messages.forEach(msg => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-slate-200 p-3';

        const header = document.createElement('div');
        header.className = 'flex items-center gap-2 mb-1';

        const user = document.createElement('span');
        user.className = 'font-medium text-sm text-blue-700';
        user.textContent = msg.user || 'Unknown';

        const ts = document.createElement('span');
        ts.className = 'text-xs text-slate-400';
        ts.textContent = msg.timestamp || '';

        header.appendChild(user);
        header.appendChild(ts);

        const content = document.createElement('p');
        content.className = 'text-sm text-slate-700 whitespace-pre-wrap';
        content.textContent = msg.text || '';

        card.appendChild(header);
        card.appendChild(content);
        list.appendChild(card);
      });
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) { render(data); } else { renderError('Unexpected data format'); }
    }

    const parentOrigin = document.referrer ? new URL(document.referrer).origin : null;

    window.addEventListener('message', (event) => {
      if (parentOrigin && event.origin !== parentOrigin) return;
      if (event.source !== window.parent) return;

      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({ jsonrpc: '2.0', id: msg.id, result: { protocolVersion: '0.1.0', capabilities: {} } }, parentOrigin || '*');
        } else if (msg.method === 'ui/toolResult') { handleToolResult(msg.params); }
      }
      if (msg.type === 'toolResult') { handleToolResult(msg.data); }
    });

    window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/ready', params: {} }, parentOrigin || '*');
  </script>
</body>
</html>
