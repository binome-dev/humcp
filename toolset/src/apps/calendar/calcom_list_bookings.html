<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cal.com Bookings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="app" class="p-6 bg-gradient-to-br from-blue-50 via-white to-blue-50 min-h-[120px]">
    <div id="loading" class="text-slate-400 text-sm text-center py-8">Waiting for data...</div>

    <div id="result" class="hidden space-y-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <h2 id="header" class="text-lg font-semibold text-slate-800"></h2>
      </div>

      <div id="bookings-container" class="space-y-3"></div>
    </div>

    <div id="error" class="hidden text-red-600 text-sm font-medium text-center py-8"></div>
  </div>

  <script type="module">
    const state = { initialized: false };

    function formatDateTime(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) +
          ' at ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      } catch { return dateStr; }
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const bookings = data.bookings || [];
      const filterText = data.status_filter ? ' (' + data.status_filter + ')' : '';
      document.getElementById('header').textContent = 'Bookings (' + bookings.length + ')' + filterText;

      const container = document.getElementById('bookings-container');
      while (container.firstChild) { container.removeChild(container.firstChild); }

      if (bookings.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-center py-8 text-slate-400 text-sm';
        empty.textContent = 'No bookings found';
        container.appendChild(empty);
        return;
      }

      bookings.forEach(function(booking) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg border border-blue-200 p-4 hover:border-blue-300 hover:shadow-sm transition-all';

        const header = document.createElement('div');
        header.className = 'flex items-start justify-between gap-3 mb-3';

        const titleEl = document.createElement('p');
        titleEl.className = 'text-sm font-semibold text-slate-800';
        titleEl.textContent = booking.title || 'Untitled Booking';
        header.appendChild(titleEl);

        if (booking.status) {
          const statusColors = {
            ACCEPTED: 'bg-green-100 text-green-700',
            PENDING: 'bg-amber-100 text-amber-700',
            CANCELLED: 'bg-red-100 text-red-700',
            REJECTED: 'bg-red-100 text-red-700'
          };
          const statusBadge = document.createElement('span');
          statusBadge.className = 'inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' +
            (statusColors[booking.status.toUpperCase()] || 'bg-slate-100 text-slate-600');
          statusBadge.textContent = booking.status;
          header.appendChild(statusBadge);
        }

        card.appendChild(header);

        const timeRow = document.createElement('div');
        timeRow.className = 'flex items-center gap-2 mb-2';
        const clockIcon = document.createElement('span');
        clockIcon.className = 'text-blue-500 text-xs';
        clockIcon.textContent = '\u{1f551}';
        const timeText = document.createElement('span');
        timeText.className = 'text-xs text-slate-600';
        const startStr = formatDateTime(booking.start_time);
        const endStr = booking.end_time ? formatDateTime(booking.end_time) : '';
        timeText.textContent = startStr + (endStr ? ' - ' + endStr : '');
        timeRow.appendChild(timeText);
        card.appendChild(timeRow);

        if (booking.attendee_name || booking.attendee_email) {
          const attendeeRow = document.createElement('div');
          attendeeRow.className = 'flex items-center gap-2';
          const attendeeText = document.createElement('span');
          attendeeText.className = 'text-xs text-slate-500';
          const parts = [];
          if (booking.attendee_name) parts.push(booking.attendee_name);
          if (booking.attendee_email) parts.push(booking.attendee_email);
          attendeeText.textContent = 'Attendee: ' + parts.join(' - ');
          attendeeRow.appendChild(attendeeText);
          card.appendChild(attendeeRow);
        }

        container.appendChild(card);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').textContent = message;
    }

    function parseToolResult(result) {
      if (result && result.content) {
        for (const item of result.content) {
          if (item.type === 'text' && item.text) {
            try { return JSON.parse(item.text); } catch { return { raw: item.text }; }
          }
        }
      }
      if (result && result.data) { return result; }
      return result;
    }

    function handleToolResult(result) {
      const parsed = parseToolResult(result);
      if (parsed && parsed.success === false) {
        renderError(parsed.error || 'Operation failed');
        return;
      }
      const data = parsed?.data || parsed;
      if (data) {
        render(data);
      } else {
        renderError('Unexpected data format');
      }
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      if (msg.jsonrpc === '2.0') {
        if (msg.method === 'ui/initialize') {
          state.initialized = true;
          window.parent.postMessage({
            jsonrpc: '2.0', id: msg.id,
            result: { protocolVersion: '0.1.0', capabilities: {} }
          }, '*');
        } else if (msg.method === 'ui/toolResult') {
          handleToolResult(msg.params);
        }
      }

      if (msg.type === 'toolResult') {
        handleToolResult(msg.data);
      }
    });

    window.parent.postMessage({
      jsonrpc: '2.0', method: 'ui/ready', params: {}
    }, '*');
  </script>
</body>
</html>
